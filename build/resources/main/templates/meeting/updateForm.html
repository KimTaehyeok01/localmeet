<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모임 수정 - LocalMeet</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/view/meetings">Local<span>Meet</span></a>
  <div class="navbar-menu">
    <a href="/view/meetings">모임 목록</a>
    <a href="/view/mypage">마이페이지</a>
  </div>
</nav>

<div class="container" style="max-width:680px;">

  <div class="page-header">
    <div>
      <div class="page-title">모임 수정 ✏️</div>
      <div class="page-subtitle">모임 정보를 수정하세요</div>
    </div>
  </div>

  <div class="card">
    <div class="card-body" style="padding:28px;">

      <div class="form-group">
        <label class="form-label">모임 제목 *</label>
        <input type="text" id="meetingTitle" class="form-control" th:value="${dto.meetingTitle}">
      </div>

      <div class="form-group">
        <label class="form-label">모임 내용 *</label>
        <textarea id="meetingContent" class="form-control" rows="5" th:text="${dto.meetingContent}"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">위치</label>
        <div class="input-group">
          <input type="text" id="meetingAddress" class="form-control" th:value="${dto.meetingAddress}" readonly>
          <button class="btn btn-gray" onclick="searchAddress()">📍 변경</button>
        </div>
        <input type="hidden" id="meetingLat" th:value="${dto.meetingLat}">
        <input type="hidden" id="meetingLng" th:value="${dto.meetingLng}">
      </div>

      <div class="map-wrap" style="margin-bottom:18px;">
        <div id="map" style="width:100%;height:220px;"></div>
      </div>

      <div class="form-group">
        <label class="form-label">최대 인원 *</label>
        <input type="number" id="meetingMax" class="form-control" min="2" th:value="${dto.meetingMax}" style="max-width:160px;">
      </div>

      <div style="display:flex; gap:10px; margin-top:8px;">
        <button class="btn btn-primary" style="flex:1;" onclick="updateMeeting()">수정 완료</button>
        <button class="btn btn-gray" th:onclick="|location.href='/view/meetings/${dto.meetingIdx}'|">취소</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script th:inline="javascript">
  const meetingIdx = /*[[${dto.meetingIdx}]]*/ 0;
  const initLat    = /*[[${dto.meetingLat}]]*/ null;
  const initLng    = /*[[${dto.meetingLng}]]*/ null;
  const kakaoMapApiKey = /*[[${kakaoMapApiKey}]]*/ '';
</script>
<script th:src="@{'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + ${kakaoMapApiKey} + '&libraries=services'}"></script>
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
  const token = localStorage.getItem('JWT_TOKEN');
  if (!token) { alert('로그인이 필요합니다.'); location.href = '/view/login'; }

  function showToast(msg, type='') {
    const c=document.getElementById('toastContainer'), t=document.createElement('div');
    t.className='toast '+type; t.textContent=msg; c.appendChild(t); setTimeout(()=>t.remove(),3000);
  }

  let map, marker, geocoder;
  kakao.maps.load(function () {
    geocoder = new kakao.maps.services.Geocoder();
    const center = new kakao.maps.LatLng(initLat || 37.5665, initLng || 126.9780);
    map = new kakao.maps.Map(document.getElementById('map'), { center, level: 4 });
    if (initLat && initLng) {
      marker = new kakao.maps.Marker({ map, position: center });
    }
  });

  function searchAddress() {
    new daum.Postcode({
      oncomplete: function (data) {
        const address = data.roadAddress || data.jibunAddress;
        document.getElementById('meetingAddress').value = address;
        geocoder.addressSearch(address, function (result, status) {
          if (status === kakao.maps.services.Status.OK) {
            const lat = result[0].y, lng = result[0].x;
            document.getElementById('meetingLat').value = lat;
            document.getElementById('meetingLng').value = lng;
            const coords = new kakao.maps.LatLng(lat, lng);
            map.setCenter(coords);
            if (marker) marker.setMap(null);
            marker = new kakao.maps.Marker({ map, position: coords });
          }
        });
      }
    }).open();
  }

  function updateMeeting() {
    const title   = document.getElementById('meetingTitle').value.trim();
    const content = document.getElementById('meetingContent').value.trim();
    if (!title || !content) { showToast('제목과 내용을 입력해주세요.', 'error'); return; }

    const params = new URLSearchParams({
      meetingTitle: title, meetingContent: content,
      meetingAddress: document.getElementById('meetingAddress').value,
      meetingLat: document.getElementById('meetingLat').value || '',
      meetingLng: document.getElementById('meetingLng').value || '',
      meetingMax: document.getElementById('meetingMax').value
    });

    fetch(`/api/meetings/${meetingIdx}/update`, {
      method: 'POST',
      headers: { 'Content-Type':'application/x-www-form-urlencoded', 'JWT_TOKEN': token },
      body: params.toString()
    })
    .then(r => r.text())
    .then(html => document.write(html));
  }
</script>
</body>
</html>
