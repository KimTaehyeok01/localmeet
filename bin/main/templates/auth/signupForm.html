<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 - LocalMeet</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/view/meetings">Local<span>Meet</span></a>
</nav>

<div class="container-sm">
  <div class="auth-card">
    <div class="auth-title">함께 시작해요 🗺️</div>
    <div class="auth-subtitle">LocalMeet에 가입하고 동네 모임을 찾아보세요</div>

    <div class="form-group">
      <label class="form-label">이메일</label>
      <div class="input-group">
        <input type="email" id="userEmail" class="form-control" placeholder="이메일 입력">
        <button class="btn btn-outline" onclick="checkEmail()">중복확인</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input type="password" id="userPassword" class="form-control" placeholder="4자 이상">
    </div>

    <div class="form-group">
      <label class="form-label">닉네임</label>
      <div class="input-group">
        <input type="text" id="userNickname" class="form-control" placeholder="2~10자">
        <button class="btn btn-outline" onclick="checkNickname()">중복확인</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">내 동네</label>
      <div class="input-group">
        <input type="text" id="userAddress" class="form-control" placeholder="주소 검색 (선택)" readonly>
        <button class="btn btn-gray" onclick="searchAddress()">검색</button>
      </div>
      <input type="hidden" id="userLat">
      <input type="hidden" id="userLng">
    </div>

    <button class="btn btn-primary btn-full" onclick="signup()">가입하기</button>

    <div class="auth-footer">
      이미 계정이 있으신가요? <a href="/view/login">로그인</a>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
  function showToast(msg, type = '') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function checkEmail() {
    const v = document.getElementById('userEmail').value.trim();
    if (!v) { showToast('이메일을 입력해주세요.', 'error'); return; }
    fetch(`/api/auth/check-email?userEmail=${encodeURIComponent(v)}`)
    .then(r => r.json())
    .then(exists => showToast(exists ? '이미 사용중인 이메일입니다.' : '사용 가능한 이메일입니다.', exists ? 'error' : 'success'));
  }

  function checkNickname() {
    const v = document.getElementById('userNickname').value.trim();
    if (!v) { showToast('닉네임을 입력해주세요.', 'error'); return; }
    fetch(`/api/auth/check-nickname?userNickname=${encodeURIComponent(v)}`)
    .then(r => r.json())
    .then(exists => showToast(exists ? '이미 사용중인 닉네임입니다.' : '사용 가능한 닉네임입니다.', exists ? 'error' : 'success'));
  }

  function searchAddress() {
    new daum.Postcode({
      oncomplete: function (data) {
        document.getElementById('userAddress').value = data.roadAddress || data.jibunAddress;
      }
    }).open();
  }

  function signup() {
    const email    = document.getElementById('userEmail').value.trim();
    const password = document.getElementById('userPassword').value;
    const nickname = document.getElementById('userNickname').value.trim();
    if (!email || !password || !nickname) { showToast('필수 항목을 입력해주세요.', 'error'); return; }

    const params = new URLSearchParams({
      userEmail: email, userPassword: password, userNickname: nickname,
      userAddress: document.getElementById('userAddress').value,
      userLat: document.getElementById('userLat').value || '',
      userLng: document.getElementById('userLng').value || ''
    });

    fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString()
    })
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(() => { showToast('가입 완료! 로그인해주세요.', 'success'); setTimeout(() => location.href = '/view/login', 1000); })
    .catch(() => showToast('가입에 실패했습니다. 입력값을 확인해주세요.', 'error'));
  }
</script>
</body>
</html>
