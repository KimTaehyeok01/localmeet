<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 페이지 - LocalMeet</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
    :root{
      --bg: #F4FAFE;
      --surface: #FFFFFF;
      --surface-2: #EBF4FB;
      --ink: #0B2036;
      --ink-2: #264766;
      --muted: #6B8AA8;
      --muted-2: #A6BED4;
      --line: #D7E6F2;
      --accent: #1FA6D6;
      --accent-2: #7DD4C0;
      --accent-3: #B8A6FF;
      --accent-4: #FFD447;
      --ok: #2CCB86;
      --warn: #FF8A4C;
      --danger: #FF5D78;
      --radius: 16px;
      --radius-lg: 22px;
      --radius-xl: 30px;
      --shadow-1: 0 1px 2px rgba(11,32,54,.05);
      --shadow-2: 0 4px 16px -6px rgba(31,166,214,.18), 0 1px 3px rgba(11,32,54,.05);
      --shadow-3: 0 20px 48px -16px rgba(31,166,214,.28), 0 2px 6px rgba(11,32,54,.06);
      --font-kr: 'Pretendard', system-ui, -apple-system, 'Noto Sans KR', sans-serif;
      --font-serif: 'Instrument Serif', ui-serif, serif;
      --font-en: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    *{ box-sizing: border-box; }
    body{
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-kr);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }
    body::before{
      content:'';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(55vw 50vh at 90% -10%, rgba(125,212,192,.42), transparent 60%),
        radial-gradient(50vw 55vh at -8% 20%, rgba(184,166,255,.36), transparent 60%),
        radial-gradient(45vw 50vh at 50% 110%, rgba(31,166,214,.2), transparent 60%);
    }
    body > *{ position: relative; z-index: 1; }

    .navbar{
      position: sticky; top: 14px; z-index: 30;
      max-width: 1240px;
      margin: 14px auto 0;
      width: calc(100% - 28px);
      background: color-mix(in oklab, var(--surface) 82%, transparent);
      backdrop-filter: saturate(1.3) blur(18px);
      -webkit-backdrop-filter: saturate(1.3) blur(18px);
      border: 1px solid var(--line);
      border-radius: 999px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 10px 22px;
      box-shadow: var(--shadow-1);
    }
    .navbar-brand{
      font-weight: 700; font-size: 18px;
      color: var(--ink); text-decoration: none;
      letter-spacing: -0.02em;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .navbar-brand::before{
      content:''; width: 26px; height: 26px; border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.85), transparent 50%),
        conic-gradient(from 200deg, var(--accent), var(--accent-2) 45%, var(--accent-3) 72%, var(--accent-4) 100%);
      box-shadow: 0 2px 8px -2px rgba(31,166,214,.4);
    }
    .navbar-brand span{
      background: linear-gradient(90deg, var(--accent), var(--accent-3));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .navbar-menu{ display: flex; align-items: center; gap: 6px; }
    .navbar-menu a{
      padding: 8px 14px;
      font-size: 14px;
      color: var(--ink-2);
      text-decoration: none;
      border-radius: 999px;
      transition: background .15s, color .15s;
      font-weight: 500;
    }
    .navbar-menu a:hover{ color: var(--accent); background: var(--surface-2); }

    .admin-wrap{
      max-width: 1180px;
      margin: 0 auto;
      padding: 34px 24px 70px;
    }
    .page-header{
      display: flex;
      align-items: end;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .page-title{
      font-size: clamp(32px, 3.4vw, 44px);
      line-height: 1.02;
      margin: 0;
      letter-spacing: -0.03em;
      font-weight: 800;
      color: var(--ink);
    }
    .page-title em{
      font-family: var(--font-serif);
      font-style: italic;
      color: var(--accent);
      font-weight: 400;
    }
    .page-subtitle{ color: var(--muted); margin-top: 8px; }

    .stat-row{ display:flex; gap:14px; margin-bottom:18px; }
    .stat-card{
      flex:1;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-2);
      padding: 16px 20px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before{
      content:'';
      position: absolute; right: -20px; bottom: -26px;
      width: 120px; height: 120px; border-radius: 50%;
      background: radial-gradient(circle, rgba(125,212,192,.45), transparent 70%);
    }
    .stat-card .num{
      font-size: 40px;
      line-height: 1;
      font-family: var(--font-en);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--ink);
      position: relative;
      z-index: 1;
    }
    .stat-card .label{
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    .admin-tabs{
      display:flex;
      gap:8px;
      margin-bottom:14px;
    }
    .admin-tab{
      border:1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      padding: 10px 18px;
      cursor:pointer;
      color: var(--ink-2);
      font-size: 13px;
      font-weight: 700;
      font-family: var(--font-kr);
      transition: background .15s, color .15s, border-color .15s;
    }
    .admin-tab.active{
      background: linear-gradient(135deg, var(--accent), #0E8AB8);
      color:#fff;
      border-color: transparent;
    }

    .panel{
      display:none;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-2);
      overflow: hidden;
    }
    .panel.active{ display:block; }
    .table-wrap{ overflow: auto; }
    .admin-table{
      width:100%;
      border-collapse: collapse;
      font-size: 13.5px;
      min-width: 980px;
    }
    .admin-table th{
      background: var(--surface-2);
      color: var(--ink-2);
      padding: 11px 12px;
      text-align:left;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      font-family: var(--font-mono);
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .admin-table td{
      padding: 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
      color: var(--ink);
    }
    .admin-table tr:last-child td{ border-bottom: none; }
    .admin-table tr:hover td{ background: color-mix(in oklab, var(--accent) 4%, white); }

    .badge-admin{
      display:inline-flex; align-items:center; gap:6px;
      padding:4px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      border:1px solid transparent;
    }
    .badge-admin::before{ content:''; width:6px; height:6px; border-radius:50%; }
    .badge-open{ background: color-mix(in oklab, var(--ok) 14%, white); color: color-mix(in oklab, var(--ok) 85%, var(--ink)); border-color: color-mix(in oklab, var(--ok) 28%, transparent); }
    .badge-open::before{ background: var(--ok); }
    .badge-full{ background: color-mix(in oklab, var(--warn) 14%, white); color: color-mix(in oklab, var(--warn) 85%, var(--ink)); border-color: color-mix(in oklab, var(--warn) 28%, transparent); }
    .badge-full::before{ background: var(--warn); }
    .badge-closed{ background: var(--surface-2); color: var(--muted); border-color: var(--line); }
    .badge-closed::before{ background: var(--muted-2); }
    .badge-role-admin{ background: color-mix(in oklab, var(--accent) 14%, white); color: var(--accent); border-color: color-mix(in oklab, var(--accent) 30%, transparent); }
    .badge-role-admin::before{ background: var(--accent); }
    .badge-role-user{ background: var(--surface-2); color: var(--ink-2); border-color: var(--line); }
    .badge-role-user::before{ background: var(--muted-2); }

    .status-select{
      font-size:12px;
      padding:6px 8px;
      border:1px solid var(--line);
      border-radius:10px;
      color: var(--ink-2);
      font-family: var(--font-kr);
      background: #fff;
    }

    .btn-sm{
      padding:6px 10px;
      font-size:12px;
      border-radius:10px;
      border:none;
      cursor:pointer;
      font-weight: 700;
      font-family: var(--font-kr);
    }
    .btn-danger-sm{
      background: color-mix(in oklab, var(--danger) 14%, white);
      color: color-mix(in oklab, var(--danger) 85%, var(--ink));
    }
    .btn-danger-sm:hover{ background: color-mix(in oklab, var(--danger) 24%, white); }

    .toast-container{
      position: fixed; left: 50%; bottom: 28px;
      transform: translateX(-50%);
      z-index: 100;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast{
      background: var(--ink); color: #fff;
      padding: 11px 20px;
      border-radius: 999px;
      font-size: 13px;
      box-shadow: var(--shadow-3);
      animation: toastIn .25s cubic-bezier(.2,.7,.2,1);
    }
    .toast.error{ background: var(--warn); }
    .toast.success{ background: var(--ok); }
    @keyframes toastIn{
      from{ opacity: 0; transform: translateY(10px); }
      to{ opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px){
      .admin-wrap{ padding: 20px 16px 44px; }
      .page-title{ font-size: 32px; }
      .stat-row{ flex-direction: column; }
    }
    @media (max-width: 480px){
      .navbar{
        width: calc(100% - 20px);
        margin-top: 10px;
        padding: 8px 10px 8px 16px;
      }
      .navbar-menu a{ display: none; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/view/meetings">Local<span>Meet</span></a>
  <div class="navbar-menu">
    <a href="/view/meetings">모임 목록</a>
    <span style="color:var(--muted);font-size:12px;font-weight:600;">🔐 관리자</span>
    <button onclick="doLogout()" style="background:none;border:none;cursor:pointer;color:var(--ink-2);font-size:13px;">로그아웃</button>
  </div>
</nav>

<div class="admin-wrap">
  <div class="page-header">
    <div>
      <h1 class="page-title">관리자 <em>콘솔</em></h1>
      <div class="page-subtitle">모임과 회원 데이터를 한 곳에서 관리합니다</div>
    </div>
  </div>

  <div class="stat-row">
    <div class="stat-card">
      <div class="num" id="statMeetings">-</div>
      <div class="label">전체 모임</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statUsers">-</div>
      <div class="label">전체 회원</div>
    </div>
  </div>

  <div class="admin-tabs">
    <button class="admin-tab active" onclick="switchTab('meetings')">📋 모임 관리</button>
    <button class="admin-tab" onclick="switchTab('users')">👥 회원 관리</button>
  </div>

  <div id="panel-meetings" class="panel active">
    <div class="table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>#</th>
            <th>제목</th>
            <th>작성자</th>
            <th>주소</th>
            <th>인원</th>
            <th>상태</th>
            <th>등록일</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="meetingTableBody">
          <tr><td colspan="8" style="text-align:center;color:var(--muted);">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="panel-users" class="panel">
    <div class="table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>#</th>
            <th>이메일</th>
            <th>닉네임</th>
            <th>권한</th>
            <th>주소</th>
            <th>가입일</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="userTableBody">
          <tr><td colspan="7" style="text-align:center;color:var(--muted);">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  const token = localStorage.getItem('JWT_TOKEN');
  if (!token) { location.href = '/view/login'; }

  function doLogout() { localStorage.removeItem('JWT_TOKEN'); location.href = '/view/login'; }

  function showToast(msg, type = '') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div'); t.className = 'toast ' + type; t.textContent = msg; c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function switchTab(tab) {
    document.querySelectorAll('.admin-tab').forEach((el, i) => {
      el.classList.toggle('active', (i === 0 && tab === 'meetings') || (i === 1 && tab === 'users'));
    });
    document.getElementById('panel-meetings').classList.toggle('active', tab === 'meetings');
    document.getElementById('panel-users').classList.toggle('active', tab === 'users');
  }

  const headers = { 'JWT_TOKEN': token };

  // 모임 목록 로드
  function loadMeetings() {
    fetch('/api/admin/meetings', { headers })
    .then(r => r.json())
    .then(data => {
      document.getElementById('statMeetings').textContent = data.length;
      const tbody = document.getElementById('meetingTableBody');
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--gray-400);">모임이 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(m => {
        const badgeClass = m.meetingStatus === 'OPEN' ? 'badge-open' : (m.meetingStatus === 'FULL' ? 'badge-full' : 'badge-closed');
        const statusText = m.meetingStatus === 'OPEN' ? '모집중' : (m.meetingStatus === 'FULL' ? '모집완료' : '종료');
        const date = m.createdAt ? m.createdAt.substring(0, 10) : '';
        return `<tr>
          <td>${m.meetingIdx}</td>
          <td><a href="/view/meetings/${m.meetingIdx}" style="color:var(--primary)">${m.meetingTitle}</a></td>
          <td>${m.userNickname}</td>
          <td>${m.meetingAddress || '-'}</td>
          <td>${m.currentCount} / ${m.meetingMax}</td>
          <td>
            <select class="status-select" onchange="changeStatus(${m.meetingIdx}, this.value)">
              <option value="OPEN" ${m.meetingStatus === 'OPEN' ? 'selected' : ''}>모집중</option>
              <option value="FULL" ${m.meetingStatus === 'FULL' ? 'selected' : ''}>모집완료</option>
              <option value="CLOSED" ${m.meetingStatus === 'CLOSED' ? 'selected' : ''}>종료</option>
            </select>
          </td>
          <td>${date}</td>
          <td><button class="btn-sm btn-danger-sm" onclick="deleteMeeting(${m.meetingIdx})">삭제</button></td>
        </tr>`;
      }).join('');
    })
    .catch(() => showToast('모임 목록 로드 실패 (권한 확인)', 'error'));
  }

  // 회원 목록 로드
  function loadUsers() {
    fetch('/api/admin/users', { headers })
    .then(r => r.json())
    .then(data => {
      document.getElementById('statUsers').textContent = data.length;
      const tbody = document.getElementById('userTableBody');
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--gray-400);">회원이 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(u => {
        const roleClass = u.userRole === 'ROLE_ADMIN' ? 'badge-role-admin' : 'badge-role-user';
        const roleText = u.userRole === 'ROLE_ADMIN' ? '관리자' : '일반';
        const date = u.createdAt ? u.createdAt.substring(0, 10) : '';
        const deleteBtn = u.userRole !== 'ROLE_ADMIN'
          ? `<button class="btn-sm btn-danger-sm" onclick="deleteUser(${u.userIdx}, '${u.userNickname}')">탈퇴</button>`
          : `<span style="color:var(--gray-300);font-size:0.8rem;">보호됨</span>`;
        return `<tr>
          <td>${u.userIdx}</td>
          <td>${u.userEmail}</td>
          <td>${u.userNickname}</td>
          <td><span class="badge-admin ${roleClass}">${roleText}</span></td>
          <td>${u.userAddress || '-'}</td>
          <td>${date}</td>
          <td>${deleteBtn}</td>
        </tr>`;
      }).join('');
    })
    .catch(() => showToast('회원 목록 로드 실패 (권한 확인)', 'error'));
  }

  function changeStatus(meetingIdx, status) {
    fetch(`/api/admin/meetings/${meetingIdx}/status?status=${status}`, { method: 'POST', headers })
    .then(r => r.json())
    .then(data => showToast(data.message, data.success ? 'success' : 'error'))
    .catch(() => showToast('서버 오류가 발생했습니다.', 'error'));
  }

  function deleteMeeting(meetingIdx) {
    if (!confirm('이 모임을 삭제하시겠습니까? 채팅 내역도 모두 삭제됩니다.')) return;
    fetch(`/api/admin/meetings/${meetingIdx}`, { method: 'DELETE', headers })
    .then(r => r.json())
    .then(data => {
      showToast(data.message, data.success ? 'success' : 'error');
      if (data.success) loadMeetings();
    })
    .catch(() => showToast('서버 오류가 발생했습니다.', 'error'));
  }

  function deleteUser(userIdx, nickname) {
    if (!confirm(`'${nickname}' 회원을 강제 탈퇴시키겠습니까?\n해당 회원의 모든 모임과 채팅이 삭제됩니다.`)) return;
    fetch(`/api/admin/users/${userIdx}`, { method: 'DELETE', headers })
    .then(r => r.json())
    .then(data => {
      showToast(data.message, data.success ? 'success' : 'error');
      if (data.success) { loadUsers(); loadMeetings(); }
    })
    .catch(() => showToast('서버 오류가 발생했습니다.', 'error'));
  }

  loadMeetings();
  loadUsers();
</script>
</body>
</html>
