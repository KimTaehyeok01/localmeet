<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메시지 - LocalMeet</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
    :root {
      --bg: #F4FAFE; --surface: #FFFFFF; --surface-2: #EBF4FB; --surface-3: #DCEBF7;
      --ink: #0B2036; --ink-2: #264766; --muted: #6B8AA8; --muted-2: #A6BED4;
      --line: #D7E6F2; --accent: #1FA6D6; --accent-2: #7DD4C0;
      --accent-3: #B8A6FF; --accent-4: #FFD447; --ok: #2CCB86; --warn: #FF8A4C;
      --radius: 16px; --radius-lg: 22px; --radius-xl: 32px;
      --shadow-1: 0 1px 2px rgba(11,32,54,.05);
      --shadow-2: 0 4px 16px -6px rgba(31,166,214,.18), 0 1px 3px rgba(11,32,54,.05);
      --shadow-3: 0 20px 48px -16px rgba(31,166,214,.28), 0 2px 6px rgba(11,32,54,.06);
      --font-kr: 'Pretendard', sans-serif; --font-en: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg); color: var(--ink);
      font-family: var(--font-kr); -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }
    body::before {
      content:''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(60vw 55vh at 85% -10%, rgba(125,212,192,.28), transparent 60%),
        radial-gradient(55vw 60vh at -5% 10%, rgba(184,166,255,.24), transparent 60%);
    }

    /* ── NAVBAR ── */
    .navbar {
      position: relative; z-index: 30;
      max-width: 1280px; width: 100%;
      margin: 14px auto 0; padding: 10px 14px 10px 22px;
      background: color-mix(in oklab, var(--surface) 85%, transparent);
      backdrop-filter: saturate(1.3) blur(18px);
      border: 1px solid var(--line); border-radius: 999px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: var(--shadow-1); flex-shrink: 0;
      width: calc(100% - 48px);
    }
    .navbar-brand {
      font-weight: 700; font-size: 18px; color: var(--ink);
      text-decoration: none; letter-spacing: -0.02em;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .navbar-brand::before {
      content:''; width: 26px; height: 26px; border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.85), transparent 50%),
        conic-gradient(from 200deg, var(--accent), var(--accent-2) 45%, var(--accent-3) 72%, var(--accent-4) 100%);
      box-shadow: 0 2px 8px -2px rgba(31,166,214,.4);
    }
    .navbar-brand span { background: linear-gradient(90deg, var(--accent), var(--accent-3)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .navbar-menu { display: flex; align-items: center; gap: 4px; }
    .navbar-menu a { padding: 8px 14px; font-size: 14px; color: var(--ink-2); text-decoration: none; border-radius: 999px; transition: background .15s, color .15s; font-weight: 500; }
    .navbar-menu a:hover { color: var(--accent); background: var(--surface-2); }
    .navbar-menu a.active { color: var(--accent); background: var(--surface-2); }
    .btn-primary-sm { padding: 9px 18px; font-size: 13.5px; font-weight: 600; color: #fff; background: linear-gradient(135deg, var(--accent), #0E8AB8); border: 0; border-radius: 999px; cursor: pointer; font-family: inherit; text-decoration: none; transition: transform .15s, filter .15s; box-shadow: 0 4px 14px -4px rgba(31,166,214,.5); }
    .nav-msg-btn { position: relative; width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--accent); background: color-mix(in oklab, var(--accent) 10%, white); display: grid; place-items: center; cursor: pointer; }
    .nav-msg-btn svg { width: 16px; height: 16px; stroke: var(--accent); fill: none; }

    /* ── 메인 레이아웃 ── */
    .msg-wrapper {
      flex: 1; overflow: hidden;
      max-width: 1280px; width: 100%;
      margin: 16px auto 16px;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 300px 1fr 220px;
      gap: 14px;
    }

    /* ── 왼쪽 사이드바 ── */
    .msg-sidebar {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--radius-xl); box-shadow: var(--shadow-2);
      display: flex; flex-direction: column; overflow: hidden;
      position: relative;
    }
    .msg-sidebar::before {
      content:''; position: absolute; top: -1px; left: 20px; right: 20px; height: 3px;
      background: linear-gradient(90deg, var(--accent-2), var(--accent), var(--accent-3));
      border-radius: 0 0 3px 3px;
    }
    .sidebar-header { padding: 20px 18px 14px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
    .sidebar-title { font-size: 16px; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; display: flex; align-items: center; justify-content: space-between; }
    .new-dm-btn {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #0E8AB8);
      border: none; cursor: pointer; display: grid; place-items: center;
      box-shadow: 0 4px 10px -4px rgba(31,166,214,.5);
      transition: transform .15s, filter .15s;
    }
    .new-dm-btn:hover { filter: brightness(1.1); transform: scale(1.06); }
    .new-dm-btn svg { width: 14px; height: 14px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; }
    .sidebar-search {
      margin-top: 12px; display: flex; align-items: center; gap: 8px;
      background: var(--surface-2); border: 1.5px solid transparent;
      border-radius: 12px; padding: 8px 12px; transition: border-color .2s;
    }
    .sidebar-search:focus-within { border-color: var(--accent); }
    .sidebar-search svg { width: 14px; height: 14px; stroke: var(--muted); flex-shrink: 0; fill: none; }
    .sidebar-search input { flex: 1; border: none; outline: none; background: transparent; font-size: 13px; font-family: var(--font-kr); color: var(--ink); }
    .sidebar-search input::placeholder { color: var(--muted-2); }

    .conv-list { flex: 1; overflow-y: auto; }
    .conv-list::-webkit-scrollbar { width: 4px; }
    .conv-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

    .conv-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; cursor: pointer;
      transition: background .12s; position: relative;
    }
    .conv-item:hover { background: var(--surface-2); }
    .conv-item.active { background: color-mix(in oklab, var(--accent) 8%, white); }
    .conv-item.active::before { content:''; position: absolute; left: 0; top: 10px; bottom: 10px; width: 3px; background: var(--accent); border-radius: 0 3px 3px 0; }

    .conv-avatar {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      display: grid; place-items: center;
      font-weight: 700; font-size: 16px; color: #fff; position: relative;
    }
    .conv-avatar-inner { width: 100%; height: 100%; border-radius: 50%; display: grid; place-items: center; }
    .conv-online { position: absolute; bottom: 0; right: 0; width: 11px; height: 11px; border-radius: 50%; background: var(--ok); border: 2.5px solid #fff; }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name { font-size: 13.5px; font-weight: 700; color: var(--ink); display: flex; justify-content: space-between; align-items: center; gap: 4px; }
    .conv-time { font-size: 10.5px; color: var(--muted-2); font-family: var(--font-mono); flex-shrink: 0; }
    .conv-preview { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-unread { width: 20px; height: 20px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #0E8AB8); color: #fff; font-size: 10px; font-weight: 700; display: grid; place-items: center; flex-shrink: 0; font-family: var(--font-en); }

    .conv-empty { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 13px; }
    .conv-empty .icon { font-size: 2rem; margin-bottom: 10px; opacity: .5; }

    /* ── 오른쪽 채팅창 ── */
    .msg-chat {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--radius-xl); box-shadow: var(--shadow-2);
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* 채팅 없을 때 빈 상태 */
    .chat-empty {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: var(--muted); gap: 12px;
    }
    .chat-empty .icon { font-size: 3rem; opacity: .35; }
    .chat-empty p { font-size: 15px; font-weight: 600; }
    .chat-empty small { font-size: 13px; color: var(--muted-2); }

    /* 채팅 헤더 */
    .chat-header {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 22px; border-bottom: 1px solid var(--line);
      background: var(--surface); flex-shrink: 0;
    }
    .chat-header-avatar {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      display: grid; place-items: center; font-weight: 700; font-size: 15px; color: #fff;
    }
    .chat-header-name { font-size: 15px; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; }
    .chat-header-sub { font-size: 11.5px; color: var(--muted); margin-top: 1px; font-family: var(--font-mono); letter-spacing: .06em; }

    /* 메시지 영역 */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 20px 22px 12px;
      display: flex; flex-direction: column; gap: 16px;
      background: var(--surface-2);
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

    .date-divider { text-align: center; font-size: 11px; font-family: var(--font-mono); color: var(--muted-2); letter-spacing: .08em; position: relative; margin: 4px 0; }
    .date-divider::before, .date-divider::after { content:''; position: absolute; top: 50%; width: calc(50% - 52px); height: 1px; background: var(--line); }
    .date-divider::before { left: 0; }
    .date-divider::after { right: 0; }

    .msg-row { display: flex; gap: 9px; align-items: flex-end; }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center; font-size: 11px; font-weight: 700; color: #fff; }
    .msg-bubbles { display: flex; flex-direction: column; gap: 3px; max-width: 60%; }
    .msg-row.mine .msg-bubbles { align-items: flex-end; }
    .msg-sender { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 2px; padding: 0 4px; }
    .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.55; word-break: break-word; }
    .msg-bubble.other { background: #fff; border: 1px solid var(--line); color: var(--ink); border-radius: 4px 18px 18px 18px; box-shadow: var(--shadow-1); }
    .msg-bubble.mine { background: linear-gradient(135deg, var(--accent), #0E8AB8); color: #fff; border-radius: 18px 18px 4px 18px; box-shadow: 0 5px 14px -5px rgba(31,166,214,.5); }
    .msg-time { font-size: 10px; color: var(--muted-2); padding: 0 4px; font-family: var(--font-mono); }
    .msg-row.mine .msg-time { text-align: right; }

    /* 입력창 */
    .chat-input-area {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 18px; border-top: 1px solid var(--line);
      background: #fff; flex-shrink: 0;
    }
    .chat-input-wrap {
      flex: 1; display: flex; align-items: center;
      background: var(--surface-2); border: 1.5px solid transparent;
      border-radius: 14px; padding: 10px 14px; transition: border-color .2s, box-shadow .2s;
    }
    .chat-input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 12%, transparent); }
    .chat-input-wrap input { flex: 1; border: none; outline: none; background: transparent; font-size: 14px; font-family: var(--font-kr); color: var(--ink); }
    .chat-input-wrap input::placeholder { color: var(--muted-2); }
    .chat-send-btn {
      background: linear-gradient(135deg, var(--accent), #0E8AB8); color: #fff; border: none;
      width: 40px; height: 40px; border-radius: 50%; display: grid; place-items: center;
      cursor: pointer; flex-shrink: 0;
      box-shadow: 0 4px 14px -4px rgba(31,166,214,.6);
      transition: transform .15s, filter .15s;
    }
    .chat-send-btn:hover { filter: brightness(1.1); transform: scale(1.05); }
    .chat-send-btn svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── 새 DM 모달 ── */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(11,32,54,.25); backdrop-filter: blur(4px); z-index: 50; display: flex; align-items: center; justify-content: center; }
    .modal { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: 28px; width: 420px; box-shadow: var(--shadow-3); }
    .modal-title { font-size: 17px; font-weight: 800; color: var(--ink); margin-bottom: 18px; letter-spacing: -0.02em; }
    .modal-search { display: flex; gap: 8px; margin-bottom: 14px; }
    .modal-search input { flex: 1; border: 1.5px solid var(--line); border-radius: 12px; padding: 10px 14px; font-size: 14px; font-family: var(--font-kr); outline: none; color: var(--ink); transition: border-color .2s; }
    .modal-search input:focus { border-color: var(--accent); }
    .modal-search button { background: linear-gradient(135deg, var(--accent), #0E8AB8); color: #fff; border: none; border-radius: 12px; padding: 10px 18px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font-kr); }
    .modal-results { max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .modal-result-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: var(--radius); border: 1px solid var(--line); cursor: pointer; transition: background .12s, border-color .12s; }
    .modal-result-item:hover { background: var(--surface-2); border-color: var(--accent); }
    .modal-result-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: grid; place-items: center; font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0; }
    .modal-result-name { font-size: 14px; font-weight: 700; color: var(--ink); }
    .modal-empty { text-align: center; color: var(--muted); font-size: 13px; padding: 20px; }
    .modal-close-btn { margin-top: 16px; width: 100%; padding: 10px; border: 1.5px solid var(--line); border-radius: 12px; background: transparent; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; font-family: var(--font-kr); transition: border-color .15s; }
    .modal-close-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 토스트 ── */
    .toast-container { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast { background: var(--ink); color: #fff; padding: 11px 20px; border-radius: 999px; font-size: 13px; box-shadow: var(--shadow-3); animation: toastIn .25s cubic-bezier(.2,.7,.2,1); }
    .toast.error { background: var(--warn); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── 친구 목록 사이드바 ── */
    .friend-sidebar {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--radius-xl); box-shadow: var(--shadow-2);
      display: flex; flex-direction: column; overflow: hidden;
      position: relative; width: 220px;
    }
    .friend-sidebar::before {
      content:''; position: absolute; top: -1px; left: 14px; right: 14px; height: 3px;
      background: linear-gradient(90deg, var(--accent-3), var(--accent-2));
      border-radius: 0 0 3px 3px;
    }
    .friend-header {
      padding: 16px 16px 10px;
      border-bottom: 1px solid var(--line); flex-shrink: 0;
    }
    .friend-title {
      font-size: 13.5px; font-weight: 800; color: var(--ink);
      display: flex; align-items: center; gap: 8px;
    }
    .friend-count {
      font-size: 11px; font-weight: 600; color: var(--muted);
      background: var(--surface-2); border: 1px solid var(--line);
      padding: 1px 7px; border-radius: 999px;
      font-family: var(--font-mono);
    }
    .friend-list { flex: 1; overflow-y: auto; padding: 6px 0; }
    .friend-list::-webkit-scrollbar { width: 3px; }
    .friend-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
    .friend-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; cursor: pointer;
      transition: background .12s;
    }
    .friend-item:hover { background: var(--surface-2); }
    .friend-avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: grid; place-items: center;
      font-size: 13px; font-weight: 700; color: #fff; overflow: hidden;
    }
    .friend-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .friend-name { font-size: 13px; font-weight: 600; color: var(--ink); min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .friend-dm-btn {
      margin-left: auto; flex-shrink: 0;
      width: 26px; height: 26px; border-radius: 50%;
      background: color-mix(in oklab, var(--accent) 12%, white);
      border: 1.5px solid color-mix(in oklab, var(--accent) 30%, transparent);
      display: grid; place-items: center; cursor: pointer;
      font-size: 12px; transition: background .12s;
    }
    .friend-dm-btn:hover { background: var(--accent); }
    .friend-empty { padding: 28px 16px; text-align: center; color: var(--muted); font-size: 12.5px; }
    .friend-empty .icon { font-size: 1.8rem; margin-bottom: 8px; opacity: .4; }

    /* 햄버거 */
    .hamburger-btn{display:none;flex-direction:column;gap:5px;padding:9px 10px;cursor:pointer;background:var(--surface-2);border:1.5px solid var(--line);border-radius:10px}
    .hamburger-btn span{display:block;width:20px;height:2px;background:var(--ink-2);border-radius:2px;transition:all .22s}
    .hamburger-btn.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .hamburger-btn.open span:nth-child(2){opacity:0;transform:scaleX(0)}
    .hamburger-btn.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    .mobile-menu{display:none;position:fixed;top:74px;left:12px;right:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:8px;z-index:29;box-shadow:var(--shadow-3);animation:mmIn .18s cubic-bezier(.2,.7,.2,1)}
    .mobile-menu.open{display:block}
    @keyframes mmIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .mobile-menu a,.mobile-menu .mm-btn{display:flex;align-items:center;gap:10px;padding:13px 16px;border-radius:10px;font-size:14.5px;font-weight:600;color:var(--ink-2);text-decoration:none;background:none;border:none;width:100%;cursor:pointer;font-family:var(--font-kr);transition:background .12s,color .12s;text-align:left}
    .mobile-menu a:hover,.mobile-menu .mm-btn:hover{background:var(--surface-2);color:var(--accent)}
    .mobile-menu a.mm-active{background:color-mix(in oklab,var(--accent) 10%,white);color:var(--accent)}
    .mm-divider{height:1px;background:var(--line);margin:4px 8px}
    .mm-btn.danger{color:var(--warn)}
    .mm-btn.danger:hover{background:color-mix(in oklab,var(--warn) 10%,white)}

    /* ── 반응형 ── */
    @media (max-width: 1100px) { .friend-sidebar { display: none; } }
    @media (max-width: 760px) {
      .navbar { width: calc(100% - 20px); margin-top: 10px; padding: 8px 10px 8px 16px; }
      .hamburger-btn { display: flex; }
      .navbar-menu { display: none !important; }
      .msg-wrapper { grid-template-columns: 1fr; padding: 0 10px; margin: 10px auto 10px; gap: 0; }
      .msg-sidebar { border-radius: 16px; }
      .msg-chat { display: none; }
      .msg-chat.mobile-open {
        display: flex;
        position: fixed; inset: 0; z-index: 40;
        border-radius: 0;
      }
      .chat-header { padding: 14px 16px; }
      .chat-messages { padding: 16px 14px 10px; }
      .chat-input-area { padding: 10px 14px; }
    }
    @media (max-width: 400px) {
      .sidebar-header { padding: 16px 14px 10px; }
      .conv-item { padding: 11px 12px; }
      .conv-avatar { width: 38px; height: 38px; }
    }

    /* 모바일 뒤로가기 버튼 */
    .mobile-back-btn {
      display: none;
      align-items: center; gap: 6px;
      background: none; border: none;
      color: var(--accent); font-size: 14px; font-weight: 700;
      cursor: pointer; padding: 0; font-family: var(--font-kr);
    }
    @media (max-width: 760px) { .mobile-back-btn { display: flex; } }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a class="navbar-brand" href="/view/meetings">Local<span>Meet</span></a>
  <div class="navbar-menu" id="navMenu">
    <a href="/view/meetings">모임 탐색</a>
    <a href="/view/messages" class="active">💬 메시지</a>
  </div>
  <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMobileMenu()" aria-label="메뉴">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="mobile-menu" id="mobileMenu"></div>

<!-- 메인 레이아웃 -->
<div class="msg-wrapper">

  <!-- 왼쪽: 대화 목록 -->
  <div class="msg-sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">
        메시지
        <button class="new-dm-btn" onclick="openNewDMModal()" title="새 대화 시작">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="sidebar-search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input type="text" id="convSearch" placeholder="대화 검색" oninput="filterConvs(this.value)">
      </div>
    </div>
    <div class="conv-list" id="convList">
      <div class="conv-empty"><div class="icon">💬</div><p>대화 목록을 불러오는 중...</p></div>
    </div>
  </div>

  <!-- 오른쪽: 채팅창 -->
  <div class="msg-chat" id="msgChat">
    <div class="chat-empty" id="chatEmpty">
      <div class="icon">💬</div>
      <p>대화를 선택하거나 새 메시지를 시작하세요</p>
      <small>왼쪽 목록에서 대화를 클릭하거나 + 버튼으로 새 대화를 시작하세요.</small>
    </div>
  </div>

  <!-- 오른쪽: 친구 목록 -->
  <div class="friend-sidebar">
    <div class="friend-header">
      <div class="friend-title">
        👥 친구
        <span class="friend-count" id="friendCount">0</span>
      </div>
    </div>
    <div class="friend-list" id="friendList">
      <div class="friend-empty"><div class="icon">👥</div>친구가 없습니다</div>
    </div>
  </div>

</div>

<!-- 새 DM 모달 -->
<div class="modal-backdrop" id="newDMModal" style="display:none;" onclick="closeModalOnBackdrop(event)">
  <div class="modal">
    <div class="modal-title">✉️ 새 대화 시작</div>
    <div class="modal-search">
      <input type="text" id="userSearchInput" placeholder="닉네임으로 검색" onkeypress="if(event.key==='Enter') searchUsers()">
      <button onclick="searchUsers()">검색</button>
    </div>
    <div class="modal-results" id="userSearchResults">
      <div class="modal-empty">닉네임을 입력하고 검색하세요.</div>
    </div>
    <button class="modal-close-btn" onclick="closeNewDMModal()">닫기</button>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script>
const token = localStorage.getItem('JWT_TOKEN');
let myUserIdx = null;
let myNickname = null;
let activeConvIdx = null;
let stompClient = null;
let allConvs = [];
let currentSubscription = null;

// ── 인증 체크 ──────────────────────────────────────────────────────────
if (!token) { location.href = '/view/login'; }

// ── 네비바 ──────────────────────────────────────────────────────────────
const navMenu = document.getElementById('navMenu');
fetch('/api/auth/mypage', { headers: { 'JWT_TOKEN': token } })
  .then(r => r.json())
  .then(user => {
    myUserIdx = user.userIdx;
    myNickname = user.userNickname;
    const isAdmin = user.userRole === 'ROLE_ADMIN';
    document.getElementById('navMenu').innerHTML =
      (isAdmin ? `<a href="/view/admin">관리자</a>` : '')
      + `<a href="/view/meetings">모임 탐색</a>`
      + `<a href="/view/messages" class="active">💬 메시지</a>`
      + `<a href="/view/mypage">마이페이지</a>`
      + `<button class="btn-primary-sm" onclick="doLogout()">로그아웃</button>`;
    document.getElementById('mobileMenu').innerHTML =
      `<a href="/view/meetings">🏠 모임 탐색</a>`
      + (isAdmin ? `<a href="/view/admin">🛡 관리자 페이지</a>` : '')
      + `<a href="/view/messages" class="mm-active">💬 메시지</a>`
      + `<a href="/view/mypage">👤 마이페이지</a>`
      + `<div class="mm-divider"></div>`
      + `<button class="mm-btn danger" onclick="doLogout()">🚪 로그아웃</button>`;
    loadConversations();
    loadFriends();
    connectWebSocket();
  })
  .catch(() => { location.href = '/view/login'; });

// URL 파라미터로 특정 대화방 자동 열기 (?conv=123)
const urlConvIdx = new URLSearchParams(location.search).get('conv');

function toggleMobileMenu() {
  document.getElementById('hamburgerBtn').classList.toggle('open');
  document.getElementById('mobileMenu').classList.toggle('open');
}
document.addEventListener('click', e => {
  const menu = document.getElementById('mobileMenu');
  const btn = document.getElementById('hamburgerBtn');
  if (menu && !menu.contains(e.target) && btn && !btn.contains(e.target)) {
    menu.classList.remove('open'); btn.classList.remove('open');
  }
});

function closeMobileChat() {
  const chatEl = document.getElementById('msgChat');
  chatEl.classList.remove('mobile-open');
  activeConvIdx = null;
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
}

function doLogout() {
  localStorage.removeItem('JWT_TOKEN');
  document.cookie = 'JWT_TOKEN=; path=/; max-age=0';
  location.href = '/view/login';
}

// ── 아바타 색상 ─────────────────────────────────────────────────────────
const AVATAR_COLORS = [
  'linear-gradient(135deg,#1FA6D6,#7DD4C0)',
  'linear-gradient(135deg,#B8A6FF,#9B7DFF)',
  'linear-gradient(135deg,#FFD447,#FFB800)',
  'linear-gradient(135deg,#2CCB86,#1A9E65)',
  'linear-gradient(135deg,#FF8A4C,#FF6B2B)',
];
function avatarColor(idx) { return AVATAR_COLORS[(idx || 0) % AVATAR_COLORS.length]; }
function avatarInitial(name) { return name ? name.charAt(0) : '?'; }

// ── 대화 목록 로드 ──────────────────────────────────────────────────────
function loadConversations() {
  fetch('/api/messages/conversations', { headers: { 'JWT_TOKEN': token } })
    .then(r => r.json())
    .then(list => {
      allConvs = list;
      renderConvList(list);
    })
    .catch(() => {
      document.getElementById('convList').innerHTML =
        '<div class="conv-empty"><div class="icon">⚠️</div><p>불러오기 실패</p></div>';
    });
}

function renderConvList(list) {
  // URL 파라미터로 온 경우 해당 대화방 자동 오픈
  if (urlConvIdx && list.length > 0) {
    const target = list.find(c => String(c.convIdx) === urlConvIdx);
    if (target) {
      setTimeout(() => openConversation(target.convIdx, target.partnerNickname, target.partnerUserIdx), 100);
    }
  }
  const el = document.getElementById('convList');
  if (!list || list.length === 0) {
    el.innerHTML = '<div class="conv-empty"><div class="icon">💬</div><p>아직 대화가 없어요</p><small style="font-size:12px;color:var(--muted-2)">+ 버튼으로 새 대화를 시작하세요</small></div>';
    return;
  }
  el.innerHTML = list.map(c => {
    const isActive = c.convIdx === activeConvIdx;
    const lastTime = c.lastMessageTime ? formatTime(c.lastMessageTime) : '';
    const preview = c.lastMessage
      ? c.lastMessage.substring(0, 24) + (c.lastMessage.length > 24 ? '...' : '')
      : '대화를 시작해보세요';
    return `
      <div class="conv-item ${isActive ? 'active' : ''}" onclick="openConversation(${c.convIdx}, '${escHtml(c.partnerNickname)}', ${c.partnerUserIdx})">
        <div class="conv-avatar">
          <div class="conv-avatar-inner" style="background:${avatarColor(c.partnerUserIdx)}">
            ${avatarInitial(c.partnerNickname)}
          </div>
        </div>
        <div class="conv-info">
          <div class="conv-name">
            <span>${escHtml(c.partnerNickname)}</span>
            <span class="conv-time">${lastTime}</span>
          </div>
          <div class="conv-preview">${escHtml(preview)}</div>
        </div>
        ${c.unreadCount > 0 ? `<div class="conv-unread">${c.unreadCount}</div>` : ''}
      </div>`;
  }).join('');
}

function filterConvs(keyword) {
  if (!keyword.trim()) { renderConvList(allConvs); return; }
  renderConvList(allConvs.filter(c =>
    c.partnerNickname.includes(keyword) || (c.lastMessage || '').includes(keyword)
  ));
}

// ── 대화방 열기 ─────────────────────────────────────────────────────────
function openConversation(convIdx, partnerNickname, partnerUserIdx) {
  activeConvIdx = convIdx;

  // 사이드바 활성 상태 업데이트
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');

  // 헤더 + 채팅창 렌더
  const chatEl = document.getElementById('msgChat');
  chatEl.classList.add('mobile-open');
  chatEl.innerHTML = `
    <div class="chat-header">
      <button class="mobile-back-btn" onclick="closeMobileChat()">← 뒤로</button>
      <div class="chat-header-avatar" style="background:${avatarColor(partnerUserIdx)}">
        ${avatarInitial(partnerNickname)}
      </div>
      <div style="flex:1">
        <div class="chat-header-name">${escHtml(partnerNickname)}</div>
        <div class="chat-header-sub">1:1 대화</div>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <div class="chat-input-wrap">
        <input type="text" id="dmInput" placeholder="메시지를 입력하세요..." maxlength="500">
      </div>
      <button class="chat-send-btn" onclick="sendDM()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>`;

  document.getElementById('dmInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') sendDM();
  });

  // 메시지 로드
  loadMessages(convIdx);

  // WebSocket 구독 변경
  subscribeConv(convIdx);

  // 목록 unread 뱃지 제거
  allConvs = allConvs.map(c => c.convIdx === convIdx ? { ...c, unreadCount: 0 } : c);
}

// ── 메시지 로드 ─────────────────────────────────────────────────────────
function loadMessages(convIdx) {
  fetch(`/api/messages/conversations/${convIdx}`, { headers: { 'JWT_TOKEN': token } })
    .then(r => r.json())
    .then(msgs => renderMessages(msgs))
    .catch(() => showToast('메시지를 불러올 수 없습니다.', 'error'));
}

function renderMessages(msgs) {
  const box = document.getElementById('chatMessages');
  if (!box) return;
  if (!msgs || msgs.length === 0) {
    box.innerHTML = '<div style="text-align:center;color:var(--muted-2);font-size:13px;margin:auto;">첫 메시지를 보내보세요!</div>';
    return;
  }
  let lastDate = '';
  box.innerHTML = msgs.map(m => {
    const isMine = m.senderIdx === myUserIdx;
    const msgDate = m.createdAt ? m.createdAt.substring(0, 10) : '';
    let divider = '';
    if (msgDate !== lastDate) {
      divider = `<div class="date-divider">${formatDate(m.createdAt)}</div>`;
      lastDate = msgDate;
    }
    const time = m.createdAt ? m.createdAt.substring(11, 16) : '';
    return divider + `
      <div class="msg-row ${isMine ? 'mine' : ''}">
        ${!isMine ? `<div class="msg-avatar" style="background:${avatarColor(m.senderIdx)}">${avatarInitial(m.senderNickname)}</div>` : ''}
        <div class="msg-bubbles">
          ${!isMine ? `<div class="msg-sender">${escHtml(m.senderNickname)}</div>` : ''}
          <div class="msg-bubble ${isMine ? 'mine' : 'other'}">${escHtml(m.dmContent)}</div>
          <div class="msg-time">${time}</div>
        </div>
        ${isMine ? `<div class="msg-avatar" style="background:${avatarColor(myUserIdx)}">${avatarInitial(myNickname)}</div>` : ''}
      </div>`;
  }).join('');
  box.scrollTop = box.scrollHeight;
}

function appendMessage(m) {
  const box = document.getElementById('chatMessages');
  if (!box) return;
  const empty = box.querySelector('[style*="margin:auto"]');
  if (empty) empty.remove();
  const isMine = m.senderIdx === myUserIdx;
  const time = m.createdAt ? String(m.createdAt).substring(11, 16) : '';
  const div = document.createElement('div');
  div.className = `msg-row ${isMine ? 'mine' : ''}`;
  div.innerHTML = `
    ${!isMine ? `<div class="msg-avatar" style="background:${avatarColor(m.senderIdx)}">${avatarInitial(m.senderNickname)}</div>` : ''}
    <div class="msg-bubbles">
      ${!isMine ? `<div class="msg-sender">${escHtml(m.senderNickname)}</div>` : ''}
      <div class="msg-bubble ${isMine ? 'mine' : 'other'}">${escHtml(m.dmContent)}</div>
      <div class="msg-time">${time}</div>
    </div>
    ${isMine ? `<div class="msg-avatar" style="background:${avatarColor(myUserIdx)}">${avatarInitial(myNickname)}</div>` : ''}`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;

  // 사이드바 preview 업데이트
  allConvs = allConvs.map(c => c.convIdx === activeConvIdx
    ? { ...c, lastMessage: m.dmContent, lastMessageTime: m.createdAt, unreadCount: 0 }
    : c
  );
  renderConvList(allConvs);
  document.querySelectorAll('.conv-item')[
    allConvs.findIndex(c => c.convIdx === activeConvIdx)
  ]?.classList.add('active');
}

// ── 메시지 전송 ─────────────────────────────────────────────────────────
function sendDM() {
  const input = document.getElementById('dmInput');
  if (!input || !activeConvIdx) return;
  const content = input.value.trim();
  if (!content) return;
  input.value = '';

  fetch(`/api/messages/conversations/${activeConvIdx}/send`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'JWT_TOKEN': token },
    body: JSON.stringify({ content })
  })
  .then(async r => {
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || '전송 실패'); }
    return r.json();
  })
  .then(dto => appendMessage(dto))
  .catch(e => showToast(e.message, 'error'));
}

// ── WebSocket ───────────────────────────────────────────────────────────
function connectWebSocket() {
  const socket = new SockJS('/ws/chat');
  stompClient = Stomp.over(socket);
  stompClient.debug = null;
  stompClient.connect({ 'JWT_TOKEN': token || '' }, () => {});
}

function subscribeConv(convIdx) {
  if (!stompClient || !stompClient.connected) return;
  if (currentSubscription) { currentSubscription.unsubscribe(); }
  currentSubscription = stompClient.subscribe(`/topic/dm/${convIdx}`, frame => {
    const msg = JSON.parse(frame.body);
    if (msg.senderIdx !== myUserIdx) {
      appendMessage(msg);
    }
  });
}

// ── 친구 목록 ────────────────────────────────────────────────────────────
function loadFriends() {
  fetch('/api/friends', { headers: { 'JWT_TOKEN': token } })
    .then(r => r.json())
    .then(friends => {
      const list = document.getElementById('friendList');
      const countEl = document.getElementById('friendCount');
      if (countEl) countEl.textContent = friends.length;
      if (!friends || friends.length === 0) {
        list.innerHTML = '<div class="friend-empty"><div class="icon">👥</div>아직 친구가 없어요</div>';
        return;
      }
      list.innerHTML = friends.map(f => {
        const avatarHtml = f.profileImg
          ? `<div class="friend-avatar"><img src="${f.profileImg}" alt=""></div>`
          : `<div class="friend-avatar" style="background:${avatarColor(f.userIdx)}">${avatarInitial(f.userNickname)}</div>`;
        return `
          <div class="friend-item">
            ${avatarHtml}
            <span class="friend-name">${escHtml(f.userNickname)}</span>
            <div class="friend-dm-btn" onclick="startDMWithFriend(${f.userIdx},'${escHtml(f.userNickname)}')" title="메시지 보내기">💬</div>
          </div>`;
      }).join('');
    })
    .catch(() => {});
}

function startDMWithFriend(userIdx, nickname) {
  fetch(`/api/messages/conversations/dm/${userIdx}`, {
    method: 'POST', headers: { 'JWT_TOKEN': token }
  })
  .then(r => r.json())
  .then(data => {
    if (data.convIdx) {
      // 대화방이 목록에 없으면 먼저 로드
      loadConversations();
      setTimeout(() => openConversation(data.convIdx, nickname, userIdx), 250);
    }
  })
  .catch(() => showToast('메시지를 열 수 없습니다.', 'error'));
}

// ── 새 DM 모달 ──────────────────────────────────────────────────────────
function openNewDMModal() {
  document.getElementById('newDMModal').style.display = 'flex';
  document.getElementById('userSearchInput').focus();
}
function closeNewDMModal() {
  document.getElementById('newDMModal').style.display = 'none';
  document.getElementById('userSearchInput').value = '';
  document.getElementById('userSearchResults').innerHTML = '<div class="modal-empty">닉네임을 입력하고 검색하세요.</div>';
}
function closeModalOnBackdrop(e) {
  if (e.target === document.getElementById('newDMModal')) closeNewDMModal();
}

function searchUsers() {
  const nickname = document.getElementById('userSearchInput').value.trim();
  if (!nickname) return;
  fetch(`/api/users/search?nickname=${encodeURIComponent(nickname)}`, {
    headers: { 'JWT_TOKEN': token }
  })
  .then(r => r.json())
  .then(users => {
    const el = document.getElementById('userSearchResults');
    if (!users || users.length === 0) {
      el.innerHTML = '<div class="modal-empty">검색 결과가 없어요.</div>';
      return;
    }
    el.innerHTML = users.map(u => `
      <div class="modal-result-item" onclick="startDM(${u.userIdx}, '${escHtml(u.userNickname)}')">
        <div class="modal-result-avatar">${avatarInitial(u.userNickname)}</div>
        <div class="modal-result-name">${escHtml(u.userNickname)}</div>
      </div>`).join('');
  })
  .catch(() => showToast('검색 중 오류가 발생했습니다.', 'error'));
}

function startDM(targetUserIdx, targetNickname) {
  fetch(`/api/messages/conversations/dm/${targetUserIdx}`, {
    method: 'POST', headers: { 'JWT_TOKEN': token }
  })
  .then(r => r.json())
  .then(data => {
    closeNewDMModal();
    loadConversations();
    setTimeout(() => openConversation(data.convIdx, targetNickname, targetUserIdx), 200);
  })
  .catch(() => showToast('대화방을 열 수 없습니다.', 'error'));
}

// ── 유틸 ────────────────────────────────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return '방금';
  if (diff < 3600) return Math.floor(diff / 60) + '분 전';
  if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
  return d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return '오늘';
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return '어제';
  return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
}

function showToast(msg, type = '') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + type; t.textContent = msg; c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
</body>
</html>
