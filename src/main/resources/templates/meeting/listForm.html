<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모임 목록 - LocalMeet</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
    /* ─────────────────────────────
       TOKENS — 따뜻한 에디토리얼 팔레트
    ───────────────────────────── */
    :root{
      /* 시원한 스카이 + 민트 + 라벤더 팔레트 */
      --bg: #F4FAFE;
      --surface: #FFFFFF;
      --surface-2: #EBF4FB;
      --surface-3: #DCEBF7;
      --ink: #0B2036;
      --ink-2: #264766;
      --muted: #6B8AA8;
      --muted-2: #A6BED4;
      --line: #D7E6F2;
      --line-strong: #B9CFE3;
      --accent: #1FA6D6;           /* 스카이 블루 */
      --accent-2: #7DD4C0;         /* 민트 */
      --accent-3: #B8A6FF;         /* 라벤더 */
      --accent-4: #FFD447;         /* 선샤인 */
      --ok: #2CCB86;
      --warn: #FF8A4C;
      --radius-sm: 10px;
      --radius: 16px;
      --radius-lg: 22px;
      --radius-xl: 32px;
      --shadow-1: 0 1px 2px rgba(11,32,54,.05);
      --shadow-2: 0 4px 16px -6px rgba(31,166,214,.18), 0 1px 3px rgba(11,32,54,.05);
      --shadow-3: 0 20px 48px -16px rgba(31,166,214,.28), 0 2px 6px rgba(11,32,54,.06);
      --font-kr: 'Pretendard', system-ui, -apple-system, 'Noto Sans KR', sans-serif;
      --font-serif: 'Instrument Serif', 'Times New Roman', ui-serif, serif;
      --font-en: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }

    /* 밝은 앰비언트 그라데이션 블롭 */
    body::before{
      content:'';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(60vw 55vh at 85% -10%, rgba(125,212,192,.35), transparent 60%),
        radial-gradient(55vw 60vh at -5% 10%, rgba(184,166,255,.32), transparent 60%),
        radial-gradient(50vw 55vh at 50% 110%, rgba(31,166,214,.18), transparent 60%);
    }
    body::after{
      content:'';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: .35;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.13 0 0 0 0 0.21 0 0 0 0.04 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }
    body > *{ position: relative; z-index: 1; }

    body{
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-kr);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }

    /* ─────────────────────────────
       NAVBAR — 플로팅 필
    ───────────────────────────── */
    .navbar{
      position: sticky; top: 14px; z-index: 30;
      max-width: 1240px;
      margin: 14px auto 0;
      background: color-mix(in oklab, var(--surface) 82%, transparent);
      backdrop-filter: saturate(1.3) blur(18px);
      -webkit-backdrop-filter: saturate(1.3) blur(18px);
      border: 1px solid var(--line);
      border-radius: 999px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 10px 22px;
      box-shadow: var(--shadow-1);
    }
    .navbar-brand{
      font-weight: 700; font-size: 18px;
      color: var(--ink); text-decoration: none;
      letter-spacing: -0.02em;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .navbar-brand::before{
      content:''; width: 26px; height: 26px; border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.85), transparent 50%),
        conic-gradient(from 200deg, var(--accent), var(--accent-2) 45%, var(--accent-3) 72%, var(--accent-4) 100%);
      box-shadow: 0 2px 8px -2px rgba(31,166,214,.4);
    }
    .navbar-brand span{
      background: linear-gradient(90deg, var(--accent), var(--accent-3));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .navbar-menu{ display: flex; align-items: center; gap: 4px; }
    .navbar-menu a{
      padding: 8px 14px; font-size: 14px;
      color: var(--ink-2); text-decoration: none;
      border-radius: 999px;
      transition: background .15s, color .15s;
      font-weight: 500;
    }
    .navbar-menu a:hover{ color: var(--accent); background: var(--surface-2); }
    .btn-primary-sm{
      padding: 9px 18px; font-size: 13.5px; font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #0E8AB8);
      border: 0; border-radius: 999px;
      cursor: pointer; font-family: inherit;
      text-decoration: none;
      transition: transform .15s, box-shadow .15s, filter .15s;
      box-shadow: 0 4px 14px -4px rgba(31,166,214,.5);
    }
    .btn-primary-sm:hover{ filter: brightness(1.05); transform: translateY(-1px); box-shadow: 0 8px 22px -6px rgba(31,166,214,.6); }

    /* ─────────────────────────────
       HERO — 플로팅 글래스 + 장식 블롭
    ───────────────────────────── */
    .hero{
      background: transparent;
      border-bottom: 0;
      padding: 84px 28px 40px;
      text-align: left;
      position: relative;
      overflow: visible;
    }
    .hero-blob{
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      z-index: 0;
      pointer-events: none;
    }
    .hero-blob.a{ top: 40px; right: 8%; width: 280px; height: 280px; background: radial-gradient(circle, rgba(125,212,192,.6), transparent 65%); }
    .hero-blob.b{ top: 180px; right: 28%; width: 200px; height: 200px; background: radial-gradient(circle, rgba(255,212,71,.5), transparent 65%); }
    .hero-blob.c{ top: 280px; left: -40px; width: 240px; height: 240px; background: radial-gradient(circle, rgba(184,166,255,.45), transparent 65%); }

    .hero-inner{
      position: relative; z-index: 1;
      max-width: 1180px; margin: 0 auto;
      display: grid; grid-template-columns: 1.3fr .9fr; align-items: end; gap: 48px;
    }
    .hero-eyebrow{
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--surface);
      color: var(--ink-2);
      font-size: 12.5px;
      font-weight: 600;
      padding: 7px 14px 7px 10px;
      border-radius: 999px;
      margin-bottom: 28px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow-1);
      letter-spacing: -0.005em;
    }
    .hero-eyebrow::before{
      content:''; width: 18px; height: 18px; border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.8), transparent 55%),
        conic-gradient(from 180deg, var(--accent-2), var(--accent), var(--accent-3), var(--accent-4), var(--accent-2));
    }
    .hero-title{
      font-size: clamp(44px, 6vw, 76px);
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.045em;
      line-height: 0.98;
      margin: 0 0 22px;
      text-wrap: balance;
    }
    .hero-title span{
      color: var(--accent);
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 400;
      letter-spacing: -0.02em;
      display: inline-block;
      position: relative;
      padding: 0 .1em;
    }
    .hero-title span::after{
      content:'';
      position: absolute;
      left: 2%; right: 2%; bottom: .06em;
      height: .32em;
      background: linear-gradient(90deg, var(--accent-4), var(--accent-2));
      opacity: .45;
      z-index: -1;
      border-radius: 999px;
    }
    .hero-sub{
      color: var(--ink-2);
      font-size: 17px;
      margin: 0;
      line-height: 1.55;
      max-width: 36ch;
      font-weight: 500;
    }

    /* 히어로 우측 통계 카드 */
    .hero-stat-stack{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-self: end;
    }
    .hero-stat{
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 18px 16px;
      box-shadow: var(--shadow-2);
      position: relative;
      overflow: hidden;
    }
    .hero-stat::before{
      content:'';
      position: absolute; inset: auto -20% -30% auto;
      width: 120px; height: 120px; border-radius: 50%;
      background: radial-gradient(circle, var(--chip-color, var(--accent-2)) 0, transparent 70%);
      opacity: .35;
    }
    .hero-stat .label{
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .hero-stat .value{
      font-family: var(--font-en);
      font-size: 34px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.03em;
      margin-top: 6px;
      font-variant-numeric: tabular-nums;
    }
    .hero-stat .value em{
      font-style: normal;
      font-size: 15px;
      color: var(--muted);
      margin-left: 4px;
      font-weight: 500;
    }
    .hero-stat.a{ --chip-color: var(--accent-2); }
    .hero-stat.b{ --chip-color: var(--accent-3); }

    /* ─────────────────────────────
       검색바 — 큰 플로팅 필
    ───────────────────────────── */
    .search-wrap{
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 7px 7px 24px;
      max-width: 720px;
      margin: 36px 0 0;
      gap: 10px;
      box-shadow: var(--shadow-2);
      transition: border-color .2s, box-shadow .2s, transform .2s;
    }
    .search-wrap:focus-within{
      border-color: var(--accent);
      box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 16%, transparent), var(--shadow-3);
      transform: translateY(-1px);
    }
    .search-wrap::before{
      content:'';
      width: 18px; height: 18px; flex: none;
      background: var(--accent);
      -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><path d='m20 20-3.5-3.5'/></svg>") center / contain no-repeat;
              mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><path d='m20 20-3.5-3.5'/></svg>") center / contain no-repeat;
    }
    .search-wrap input{
      flex: 1;
      border: none; outline: none;
      font-size: 15.5px;
      font-family: var(--font-kr);
      color: var(--ink);
      background: transparent;
      padding: 10px 0;
    }
    .search-wrap input::placeholder{ color: var(--muted-2); }
    .search-btn{
      background: linear-gradient(135deg, var(--accent), #0E8AB8);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-kr);
      transition: transform .15s, filter .15s, box-shadow .15s;
      white-space: nowrap;
      letter-spacing: -0.005em;
      box-shadow: 0 4px 14px -4px rgba(31,166,214,.5);
    }
    .search-btn:hover{ filter: brightness(1.05); transform: translateY(-1px); box-shadow: 0 8px 22px -6px rgba(31,166,214,.6); }
    .all-btn{
      background: var(--surface-2);
      color: var(--ink-2);
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-kr);
      padding: 10px 16px;
      border-radius: 999px;
      transition: color .15s, background .15s;
      white-space: nowrap;
    }
    .all-btn:hover{ color: var(--accent); background: color-mix(in oklab, var(--accent) 12%, var(--surface)); }

    /* ─────────────────────────────
       BODY LAYOUT
    ───────────────────────────── */
    .page-body{
      max-width: 1180px;
      margin: 0 auto;
      padding: 52px 28px 120px;
    }

    /* ─────────────────────────────
       지도 섹션 — 큼직한 라운드 + 민트 액센트
    ───────────────────────────── */
    .map-card{
      background: var(--surface);
      border-radius: var(--radius-xl);
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: var(--shadow-2);
      margin-bottom: 56px;
      position: relative;
    }
    .map-card::before{
      content:'';
      position: absolute; top: -1px; left: 28px; right: 28px;
      height: 4px;
      background: linear-gradient(90deg, var(--accent-2), var(--accent), var(--accent-3));
      border-radius: 0 0 4px 4px;
    }
    .map-card-header{
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
    }
    .map-card-title{
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.005em;
    }
    .map-card-title::after{
      content:'지금 열린 모임들';
      font-family: var(--font-mono);
      font-weight: 500;
      font-size: 10.5px;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding-left: 10px;
      border-left: 1px solid var(--line);
      margin-left: 4px;
    }
    .map-dot{
      width: 8px; height: 8px;
      background: var(--ok);
      border-radius: 50%;
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--ok) 28%, transparent);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{ box-shadow: 0 0 0 3px color-mix(in oklab, var(--ok) 28%, transparent); }
      50%    { box-shadow: 0 0 0 7px color-mix(in oklab, var(--ok) 10%, transparent); }
    }
    #map{
      background:
        radial-gradient(circle at 30% 35%, rgba(125,212,192,.22), transparent 50%),
        radial-gradient(circle at 75% 70%, rgba(184,166,255,.2), transparent 50%),
        var(--surface-2);
    }

    /* ─────────────────────────────
       섹션 헤더
    ───────────────────────────── */
    .section-header{
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 20px;
    }
    .section-title{
      font-size: clamp(28px, 3vw, 40px);
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.035em;
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .section-title::before{
      content:'';
      width: 8px; height: 28px;
      border-radius: 4px;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
    }
    .section-count{
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 600;
      padding-bottom: 6px;
    }

    /* ─────────────────────────────
       모임 카드 — 티켓 스타일 (좌측 컬러 바 + 펀치 홀)
    ───────────────────────────── */
    .meeting-grid{
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }
    .meeting-card{
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-1);
      cursor: pointer;
      overflow: hidden;
      transition: transform .22s cubic-bezier(.2,.7,.2,1),
                  box-shadow .22s ease,
                  border-color .22s ease;
      display: flex;
      position: relative;
    }
    .meeting-card:hover{
      transform: translateY(-4px);
      box-shadow: var(--shadow-3);
      border-color: color-mix(in oklab, var(--accent) 45%, var(--line));
    }
    .meeting-card:hover .card-stripe{ width: 80px; }
    .meeting-card:hover .card-go{
      opacity: 1;
      transform: translate(0, 0) rotate(0);
    }

    /* 좌측 세로 컬러 바 (기존 card-stripe 재활용, 세로로) */
    .card-stripe{
      width: 6px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      flex-shrink: 0;
      transition: width .22s cubic-bezier(.2,.7,.2,1);
      position: relative;
    }
    .card-stripe::before, .card-stripe::after{
      content:'';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--bg);
    }
    .card-stripe::before{ top: 26px; }
    .card-stripe::after { bottom: 26px; }
    .card-stripe.full{ background: linear-gradient(180deg, var(--warn), #FFB066); }
    .card-stripe.closed{ background: linear-gradient(180deg, var(--muted-2), var(--line-strong)); }

    .card-inner{ padding: 24px 24px 22px; display: flex; flex-direction: column; gap: 10px; flex: 1; position: relative; }

    .card-go{
      position: absolute;
      top: 22px; right: 22px;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--surface-2);
      display: grid; place-items: center;
      opacity: 0;
      transform: translate(-6px, 6px) rotate(-20deg);
      transition: opacity .22s, transform .22s cubic-bezier(.2,.7,.2,1), background .15s;
      pointer-events: none;
    }
    .card-go::before{
      content: '→';
      font-family: var(--font-en);
      font-weight: 600;
      color: var(--accent);
      font-size: 18px;
    }
    .meeting-card:hover .card-go{ background: var(--accent); }
    .meeting-card:hover .card-go::before{ color: #fff; }

    .card-top{
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      margin-bottom: 2px;
    }
    .meeting-title{
      font-size: 20px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.3;
      margin-top: 10px;
      letter-spacing: -0.025em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-wrap: balance;
      padding-right: 44px;
    }
    .meeting-addr{
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: -0.005em;
      margin-top: 2px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .card-footer{
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px dashed var(--line);
      margin-top: auto;
      gap: 12px;
    }
    .card-count{
      font-family: var(--font-en);
      display: flex;
      align-items: baseline;
      gap: 2px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.015em;
    }
    .card-count span:first-of-type{
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
    }
    .card-count span:last-of-type{
      color: var(--muted-2);
      font-size: 14px;
      font-weight: 500;
    }
    .card-count::after{
      content: '명';
      font-family: var(--font-kr);
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      margin-left: 4px;
      align-self: center;
    }
    .card-author{
      font-size: 12px;
      color: var(--ink-2);
      background: var(--surface-2);
      padding: 5px 11px 5px 7px;
      border-radius: 999px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      max-width: 55%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-author::before{
      content:'';
      width: 18px; height: 18px; border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.8), transparent 60%),
        linear-gradient(135deg, var(--accent-2), var(--accent-3));
      flex: none;
    }

    /* 배지 — 둥글고 컬러 풍부하게 */
    .badge{
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 12px 5px 10px;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: -0.005em;
      border: 1px solid transparent;
    }
    .badge::before{ content: ''; width: 6px; height: 6px; border-radius: 50%; display: block; }
    .badge-open{
      background: color-mix(in oklab, var(--ok) 14%, var(--surface));
      color: color-mix(in oklab, var(--ok) 90%, var(--ink));
      border-color: color-mix(in oklab, var(--ok) 25%, transparent);
    }
    .badge-open::before{ background: var(--ok); box-shadow: 0 0 0 3px color-mix(in oklab, var(--ok) 28%, transparent); }
    .badge-full{
      background: color-mix(in oklab, var(--warn) 16%, var(--surface));
      color: color-mix(in oklab, var(--warn) 80%, var(--ink));
      border-color: color-mix(in oklab, var(--warn) 28%, transparent);
    }
    .badge-full::before{ background: var(--warn); }
    .badge-closed{
      background: var(--surface-2);
      color: var(--muted);
      border-color: var(--line);
    }
    .badge-closed::before{ background: var(--muted-2); }

    /* ─────────────────────────────
       FAB — 그라데이션 + 크게
    ───────────────────────────── */
    .fab{
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent-3) 120%);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 15px 24px 15px 20px;
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      box-shadow:
        0 14px 36px -10px rgba(31,166,214,.6),
        0 2px 6px rgba(11,32,54,.15),
        inset 0 1px 0 rgba(255,255,255,.3);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: transform .22s cubic-bezier(.2,.7,.2,1), box-shadow .22s, filter .15s;
      font-family: var(--font-kr);
      z-index: 50;
      letter-spacing: -0.005em;
    }
    .fab:hover{
      filter: brightness(1.06);
      transform: translateY(-3px) scale(1.02);
      box-shadow:
        0 20px 44px -10px rgba(31,166,214,.7),
        0 4px 10px rgba(11,32,54,.2);
    }

    /* ─────────────────────────────
       빈 상태
    ───────────────────────────── */
    .empty-state{
      text-align: center;
      padding: 80px 24px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px dashed var(--line-strong);
    }
    .empty-state .icon{
      font-size: 2.4rem; margin-bottom: 14px; opacity: 0.55;
    }
    .empty-state p{
      font-size: 15px;
      color: var(--muted);
      margin: 0;
      font-weight: 500;
    }

    /* ─────────────────────────────
       TOAST
    ───────────────────────────── */
    .toast-container{
      position: fixed; left: 50%; bottom: 36px;
      transform: translateX(-50%);
      z-index: 100;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast{
      background: var(--ink);
      color: #fff;
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 13.5px;
      letter-spacing: -0.005em;
      box-shadow: var(--shadow-3);
      animation: toastIn .25s cubic-bezier(.2,.7,.2,1);
    }
    .toast.error{ background: var(--warn); }
    @keyframes toastIn{
      from{ opacity: 0; transform: translateY(10px); }
      to{ opacity: 1; transform: translateY(0); }
    }

    /* ─────────────────────────────
       반응형
    ───────────────────────────── */
    @media (max-width: 860px){
      .hero-inner{ grid-template-columns: 1fr; gap: 28px; }
      .hero-stat-stack{ grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 720px){
      .navbar{ margin: 10px 12px 0; padding: 8px 10px 8px 16px; }
      .hero{ padding: 56px 20px 28px; }
      .hero-title{ font-size: 44px; }
      .search-wrap{ margin-top: 20px; padding: 6px 6px 6px 18px; }
      .search-btn{ padding: 10px 18px; }
      .all-btn{ display: none; }
      .page-body{ padding: 36px 16px 96px; }
      .section-title{ font-size: 26px; }
      .meeting-grid{ grid-template-columns: 1fr; gap: 14px; }
      .fab{ bottom: 20px; right: 16px; padding: 13px 20px 13px 16px; font-size: 14px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/view/meetings">Local<span>Meet</span></a>
  <div class="navbar-menu" id="navMenu">
    <a href="/view/meetings">모임 탐색</a>
  </div>
</nav>

<!-- 히어로 -->
<div class="hero">
  <div class="hero-blob a"></div>
  <div class="hero-blob b"></div>
  <div class="hero-blob c"></div>
  <div class="hero-inner">
    <div>
      <div class="hero-eyebrow">동네 모임 플랫폼</div>
      <h1 class="hero-title">우리 동네 <span>모임</span>을<br>찾아보세요</h1>
      <p class="hero-sub">관심사가 같은 이웃과 함께하는 즐거운 시간</p>
    </div>
    <div class="hero-stat-stack">
      <div class="hero-stat a">
        <div class="label">Live Now</div>
        <div class="value"><span id="statOpen" th:text="${#lists.size(list)}">0</span><em>개</em></div>
      </div>
      <div class="hero-stat b">
        <div class="label">This Week</div>
        <div class="value">24<em>개</em></div>
      </div>
    </div>
    <div class="search-wrap">
      <input type="text" id="keyword" placeholder="동네 이름으로 검색 (예: 마포구, 홍대)">
      <button class="all-btn" onclick="loadAll()">전체보기</button>
      <button class="search-btn" onclick="search()">검색</button>
    </div>
  </div>
</div>

<!-- 본문 -->
<div class="page-body">

  <!-- 지도 -->
  <div class="map-card">
    <div class="map-card-header">
      <div class="map-card-title">
        <div class="map-dot"></div>
        모임 위치
      </div>
    </div>
    <div id="map" style="width:100%; height:260px;"></div>
  </div>

  <!-- 모임 목록 -->
  <div class="section-header">
    <div class="section-title">전체 모임</div>
    <div class="section-count" id="listCount"></div>
  </div>

  <div id="meetingGrid" class="meeting-grid">
    <div th:each="m : ${list}" class="meeting-card"
         th:onclick="|location.href='/view/meetings/${m.meetingIdx}'|">
      <div th:classappend="${m.meetingStatus.name() == 'FULL'} ? 'full' : (${m.meetingStatus.name() == 'CLOSED'} ? 'closed' : '')"
           class="card-stripe"></div>
      <div class="card-inner">
        <div class="card-go"></div>
        <div class="card-top">
          <span th:classappend="${m.meetingStatus.name() == 'OPEN'} ? 'badge-open' : (${m.meetingStatus.name() == 'FULL'} ? 'badge-full' : 'badge-closed')"
                class="badge" th:text="${m.meetingStatus.value}">모집중</span>
        </div>
        <div class="meeting-title" th:text="${m.meetingTitle}">모임 제목</div>
        <div class="meeting-addr">
          📍 <span th:text="${m.meetingAddress != null ? m.meetingAddress : '위치 미지정'}">주소</span>
        </div>
        <div class="card-footer">
          <span class="card-count">
            <span th:text="${m.currentCount}">0</span><span>/ <span th:text="${m.meetingMax}">0</span></span>
          </span>
          <span class="card-author" th:text="${m.userNickname}">작성자</span>
        </div>
      </div>
    </div>

    <!-- 빈 상태 -->
    <div th:if="${#lists.isEmpty(list)}" class="empty-state" style="grid-column:1/-1;">
      <div class="icon">🏙️</div>
      <p>아직 모임이 없어요. 첫 번째 모임을 만들어보세요!</p>
    </div>
  </div>

</div>

<!-- FAB -->
<button class="fab" onclick="goWrite()">+ 모임 만들기</button>

<div class="toast-container" id="toastContainer"></div>

<script th:inline="javascript">
  const kakaoMapApiKey = /*[[${kakaoMapApiKey}]]*/ '';
  const initList = /*[[${list}]]*/ [];
</script>
<script th:src="@{'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + ${kakaoMapApiKey} + '&autoload=false'}"></script>
<script>
  // 네비게이션 로그인 상태 반영
  const token = localStorage.getItem('JWT_TOKEN');
  const navMenu = document.getElementById('navMenu');
  if (token) {
    const payload = JSON.parse(atob(token.split('.')[1]));
    const isAdmin = payload.roles && payload.roles.includes('ROLE_ADMIN');
    navMenu.innerHTML += (isAdmin ? `<a href="/view/admin">관리자</a>` : '')
      + `<a href="/view/mypage">마이페이지</a>
      <button class="btn-primary-sm" onclick="logout()">로그아웃</button>`;
  } else {
    navMenu.innerHTML += `<a href="/view/login">로그인</a>
      <a href="/view/signup" class="btn-primary-sm">회원가입</a>`;
  }
  function logout() { localStorage.removeItem('JWT_TOKEN'); document.cookie = 'JWT_TOKEN=; path=/; max-age=0'; location.reload(); }
  function goWrite() {
    if (!token) { showToast('로그인이 필요합니다.', 'error'); setTimeout(() => location.href='/view/login', 800); return; }
    location.href = '/view/meetings/write';
  }

  // 목록 카운트
  const listCountEl = document.getElementById('listCount');
  if (listCountEl && initList.length > 0) listCountEl.textContent = initList.length + '개의 모임';

  // 카카오맵
  if (typeof kakao !== 'undefined' && kakao.maps) {
    kakao.maps.load(function() {
      var container = document.getElementById('map');
      var options = { center: new kakao.maps.LatLng(37.5665, 126.9780), level: 7 };
      var map = new kakao.maps.Map(container, options);
      initList.forEach(function(m) {
        if (m.meetingLat && m.meetingLng) {
          var marker = new kakao.maps.Marker({
            map: map,
            position: new kakao.maps.LatLng(m.meetingLat, m.meetingLng),
            title: m.meetingTitle
          });
          kakao.maps.event.addListener(marker, 'click', function() {
            location.href = '/view/meetings/' + m.meetingIdx;
          });
        }
      });
    });
  }

  // 검색
  function search() {
    const keyword = document.getElementById('keyword').value.trim();
    if (!keyword) { showToast('검색어를 입력해주세요.', 'error'); return; }
    fetch(`/api/meetings/search?keyword=${encodeURIComponent(keyword)}`)
      .then(r => r.json()).then(data => renderGrid(data));
  }
  function loadAll() {
    document.getElementById('keyword').value = '';
    fetch('/api/meetings').then(r => r.json()).then(data => renderGrid(data));
  }
  document.getElementById('keyword').addEventListener('keypress', e => { if (e.key === 'Enter') search(); });

  function renderGrid(data) {
    const grid = document.getElementById('meetingGrid');
    if (listCountEl) listCountEl.textContent = data.length > 0 ? data.length + '개의 모임' : '';
    if (data.length === 0) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">🔍</div><p>검색 결과가 없어요.</p></div>';
      return;
    }
    grid.innerHTML = data.map(m => {
      const badgeClass  = m.meetingStatus === 'OPEN' ? 'badge-open' : (m.meetingStatus === 'FULL' ? 'badge-full' : 'badge-closed');
      const statusText  = m.meetingStatus === 'OPEN' ? '모집중' : (m.meetingStatus === 'FULL' ? '모집완료' : '종료');
      const stripeClass = m.meetingStatus === 'FULL' ? 'full' : (m.meetingStatus === 'CLOSED' ? 'closed' : '');
      return `
        <div class="meeting-card" onclick="location.href='/view/meetings/${m.meetingIdx}'">
          <div class="card-stripe ${stripeClass}"></div>
          <div class="card-inner">
            <div class="card-go"></div>
            <div class="card-top"><span class="badge ${badgeClass}">${statusText}</span></div>
            <div class="meeting-title">${m.meetingTitle}</div>
            <div class="meeting-addr">📍 ${m.meetingAddress || '위치 미지정'}</div>
            <div class="card-footer">
              <span class="card-count"><span>${m.currentCount}</span><span>/ ${m.meetingMax}</span></span>
              <span class="card-author">${m.userNickname}</span>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function showToast(msg, type = '') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }
</script>
</body>
</html>
