<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${dto.meetingTitle} + ' - LocalMeet'">모임 상세</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
    :root{
      --bg: #F4FAFE;
      --surface: #FFFFFF;
      --surface-2: #EBF4FB;
      --surface-3: #DCEBF7;
      --ink: #0B2036;
      --ink-2: #264766;
      --muted: #6B8AA8;
      --muted-2: #A6BED4;
      --line: #D7E6F2;
      --accent: #1FA6D6;
      --accent-2: #7DD4C0;
      --accent-3: #B8A6FF;
      --accent-4: #FFD447;
      --ok: #2CCB86;
      --warn: #FF8A4C;
      --danger: #FF5D78;
      --radius: 16px;
      --radius-lg: 22px;
      --radius-xl: 32px;
      --shadow-1: 0 1px 2px rgba(11,32,54,.05);
      --shadow-2: 0 4px 16px -6px rgba(31,166,214,.18), 0 1px 3px rgba(11,32,54,.05);
      --shadow-3: 0 20px 48px -16px rgba(31,166,214,.28), 0 2px 6px rgba(11,32,54,.06);
      --font-kr: 'Pretendard', system-ui, -apple-system, 'Noto Sans KR', sans-serif;
      --font-serif: 'Instrument Serif', ui-serif, serif;
      --font-en: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    *{ box-sizing: border-box; }
    body{
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-kr);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }
    body::before{
      content:'';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(55vw 50vh at 90% -10%, rgba(125,212,192,.42), transparent 60%),
        radial-gradient(50vw 55vh at -8% 20%, rgba(184,166,255,.36), transparent 60%),
        radial-gradient(45vw 50vh at 50% 110%, rgba(31,166,214,.2), transparent 60%);
    }
    body > *{ position: relative; z-index: 1; }

    .navbar{
      position: sticky; top: 14px; z-index: 30;
      max-width: 1240px;
      margin: 14px auto 0;
      width: calc(100% - 28px);
      background: color-mix(in oklab, var(--surface) 82%, transparent);
      backdrop-filter: saturate(1.3) blur(18px);
      -webkit-backdrop-filter: saturate(1.3) blur(18px);
      border: 1px solid var(--line);
      border-radius: 999px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 10px 22px;
      box-shadow: var(--shadow-1);
    }
    .navbar-brand{
      font-weight: 700; font-size: 18px;
      color: var(--ink); text-decoration: none;
      letter-spacing: -0.02em;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .navbar-brand::before{
      content:''; width: 26px; height: 26px; border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.85), transparent 50%),
        conic-gradient(from 200deg, var(--accent), var(--accent-2) 45%, var(--accent-3) 72%, var(--accent-4) 100%);
      box-shadow: 0 2px 8px -2px rgba(31,166,214,.4);
    }
    .navbar-brand span{
      background: linear-gradient(90deg, var(--accent), var(--accent-3));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .navbar-menu{ display: flex; align-items: center; gap: 6px; }
    .navbar-menu a{
      padding: 8px 14px;
      font-size: 14px;
      color: var(--ink-2);
      text-decoration: none;
      border-radius: 999px;
      transition: background .15s, color .15s;
      font-weight: 500;
    }
    .navbar-menu a:hover{ color: var(--accent); background: var(--surface-2); }

    .detail-hero{
      max-width: 1180px;
      margin: 18px auto 0;
      padding: 28px 24px 26px;
      border-radius: var(--radius-xl);
      background:
        radial-gradient(120% 90% at 0% 0%, rgba(184,166,255,.55), transparent 55%),
        radial-gradient(100% 80% at 100% 100%, rgba(125,212,192,.55), transparent 55%),
        linear-gradient(160deg, #0E6FA0 0%, #1FA6D6 50%, #2FB8C6 100%);
      color: #fff;
      box-shadow: var(--shadow-3);
    }
    .hero-inner{ max-width: 920px; }
    .back-link{
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,.78);
      text-decoration: none;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .back-link:hover{ color: #fff; }
    .hero-badge-row{ display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .hero-title{
      font-size: clamp(30px, 3.2vw, 42px);
      line-height: 1.08;
      letter-spacing: -0.03em;
      margin: 0 0 12px;
      font-weight: 800;
      text-wrap: balance;
    }
    .hero-meta{ display: flex; flex-wrap: wrap; gap: 14px 18px; }
    .hero-meta-item{ font-size: 13.5px; color: rgba(255,255,255,.84); }

    .h-badge{
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .h-badge::before{ content: ''; width: 6px; height: 6px; border-radius: 50%; display: block; }
    .h-badge-open{ background: rgba(44,203,134,.2); color: #d9ffed; border-color: rgba(44,203,134,.35); }
    .h-badge-open::before{ background: #8df0bf; }
    .h-badge-full{ background: rgba(255,138,76,.2); color: #ffe2d2; border-color: rgba(255,138,76,.35); }
    .h-badge-full::before{ background: #ffc19e; }
    .h-badge-closed{ background: rgba(255,255,255,.16); color: rgba(255,255,255,.74); border-color: rgba(255,255,255,.3); }
    .h-badge-closed::before{ background: rgba(255,255,255,.7); }
    .h-badge-category{
      background: rgba(255,255,255,.18);
      color: #fff;
      border-color: rgba(255,255,255,.35);
      font-weight: 600;
      letter-spacing: .01em;
    }
    .h-badge-category::before{ display: none; }

    .page-body{
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 24px 60px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .section-card{
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-2);
      overflow: hidden;
    }
    .section-card-header{
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex; align-items: center; gap: 8px;
    }

    .action-card{
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-2);
      padding: 14px;
      display: flex;
      gap: 10px;
    }
    .btn-join, .btn-edit, .btn-delete{
      border-radius: 999px;
      padding: 12px 18px;
      font-family: var(--font-kr);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: transform .15s, filter .15s, box-shadow .15s, background .15s;
    }
    .btn-join{
      flex: 1;
      background: linear-gradient(135deg, var(--accent), #0E8AB8);
      color: #fff;
      box-shadow: 0 6px 18px -6px rgba(31,166,214,.55);
    }
    .btn-join:hover{ filter: brightness(1.05); transform: translateY(-1px); }
    .btn-cancel{
      flex: 1;
      background: color-mix(in oklab, var(--danger) 12%, white);
      color: color-mix(in oklab, var(--danger) 85%, var(--ink));
      border: 1px solid color-mix(in oklab, var(--danger) 30%, transparent);
      border-radius: 999px;
      padding: 12px 18px;
      font-family: var(--font-kr);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s, filter .15s, background .15s;
    }
    .btn-cancel:hover{ background: color-mix(in oklab, var(--danger) 20%, white); }
    .btn-cancel-approved{
      flex: 1;
      background: color-mix(in oklab, var(--muted) 12%, white);
      color: var(--muted);
      border: 1px solid color-mix(in oklab, var(--muted) 30%, transparent);
      border-radius: 999px;
      padding: 12px 18px;
      font-family: var(--font-kr);
      font-size: 14px;
      font-weight: 700;
      cursor: not-allowed;
    }
    .btn-edit{
      flex: 1;
      background: var(--surface-2);
      color: var(--accent);
      border: 1px solid var(--line);
    }
    .btn-edit:hover{ background: color-mix(in oklab, var(--accent) 12%, white); }
    .btn-delete{
      background: color-mix(in oklab, var(--danger) 12%, white);
      color: color-mix(in oklab, var(--danger) 85%, var(--ink));
      border: 1px solid color-mix(in oklab, var(--danger) 30%, transparent);
    }
    .btn-delete:hover{ background: color-mix(in oklab, var(--danger) 20%, white); }

    .content-body{
      padding: 22px 20px;
      font-size: 15px;
      line-height: 1.85;
      color: var(--ink-2);
      white-space: pre-line;
    }

    .chat-box{
      height: 320px;
      overflow-y: auto;
      padding: 18px 20px;
      display: flex; flex-direction: column; gap: 12px;
      background: var(--surface-2);
    }
    /* 카카오톡 스타일 채팅 */
    .chat-row{
      display: flex; align-items: flex-end; gap: 8px;
    }
    .chat-row.mine{ flex-direction: row-reverse; }

    .chat-avatar{
      width: 32px; height: 32px; border-radius: 50%;
      flex-shrink: 0; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      align-self: flex-start;
    }
    .chat-avatar img{ width: 100%; height: 100%; object-fit: cover; }

    .chat-bubble-wrap{
      display: flex; flex-direction: column; gap: 3px; max-width: 72%;
      align-items: flex-start; /* 기본: 왼쪽 정렬, 버블이 내용 크기만큼만 늘어남 */
    }
    .chat-row.mine .chat-bubble-wrap{
      align-items: flex-end; /* 내 메시지: 오른쪽 정렬 */
    }

    .chat-msg-author{
      font-size: 11.5px; font-weight: 700; color: var(--accent);
      padding: 0 4px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .chat-msg-author:hover{ opacity: .7; text-decoration: underline; }
    .chat-msg-author.mine-author{
      color: var(--muted); cursor: default; text-decoration: none;
    }
    .chat-msg-author.mine-author:hover{ opacity: 1; }

    .chat-msg-content{
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 4px 14px 14px 14px;
      padding: 9px 14px;
      font-size: 13.5px;
      color: var(--ink);
      display: inline-block;      /* 내용 너비만큼만 차지 */
      max-width: 100%;            /* bubble-wrap 너비 초과 금지 */
      box-shadow: var(--shadow-1);
      word-break: keep-all;       /* 단어 단위로 줄바꿈 */
      overflow-wrap: break-word;  /* 아주 긴 단어는 강제 줄바꿈 */
      line-height: 1.55;
      white-space: pre-wrap;      /* 연속 공백 유지, 필요할 때만 줄바꿈 */
    }
    .chat-row.mine .chat-msg-content{
      background: linear-gradient(135deg, var(--accent), #0E8AB8);
      color: #fff;
      border: none;
      border-radius: 14px 4px 14px 14px;
      box-shadow: 0 4px 14px -4px rgba(31,166,214,.45);
    }
    .chat-msg-time{
      font-size: 10.5px; color: var(--muted-2); padding: 0 4px;
    }

    .chat-input-area{
      display: flex; gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid var(--line);
      background: #fff;
    }
    .chat-input-area input{
      flex: 1;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 13.5px;
      font-family: var(--font-kr);
      outline: none;
      color: var(--ink);
      transition: border-color .2s, box-shadow .2s;
    }
    .chat-input-area input:focus{
      border-color: var(--accent);
      box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 14%, transparent);
    }
    .chat-input-area input::placeholder{ color: var(--muted-2); }
    .chat-send-btn{
      background: linear-gradient(135deg, var(--accent), #0E8AB8);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-kr);
      white-space: nowrap;
    }
    .chat-send-btn:hover{ filter: brightness(1.06); }

    /* 유저 팝업 */
    .user-popup {
      position: fixed; z-index: 200;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-3);
      padding: 20px;
      width: 220px;
      display: none;
      animation: popupIn .18s cubic-bezier(.2,.7,.2,1);
    }
    @keyframes popupIn {
      from { opacity: 0; transform: scale(.94) translateY(4px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .user-popup-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      margin: 0 auto 10px;
      overflow: hidden;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }
    .user-popup-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-popup-name {
      text-align: center; font-size: 15px; font-weight: 800;
      color: var(--ink); letter-spacing: -0.02em; margin-bottom: 14px;
    }
    .user-popup-btn {
      width: 100%; padding: 9px 0;
      border-radius: 10px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 700; font-family: var(--font-kr);
      transition: filter .15s, transform .15s;
    }
    .user-popup-btn:hover { filter: brightness(1.06); transform: translateY(-1px); }
    .btn-friend-add {
      background: linear-gradient(135deg, var(--accent), #0E8AB8);
      color: #fff; box-shadow: 0 4px 12px -4px rgba(31,166,214,.5);
    }
    .btn-friend-pending { background: var(--surface-2); color: var(--muted); cursor: default; }
    .btn-friend-accepted { background: color-mix(in oklab, var(--ok) 12%, white); color: var(--ok); cursor: default; }
    .btn-dm { background: var(--surface-2); color: var(--ink-2); border: 1px solid var(--line); margin-top: 7px; }

    .toast-container{
      position: fixed; left: 50%; bottom: 28px;
      transform: translateX(-50%);
      z-index: 100;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast{
      background: var(--ink); color: #fff;
      padding: 11px 20px;
      border-radius: 999px;
      font-size: 13px;
      box-shadow: var(--shadow-3);
      animation: toastIn .25s cubic-bezier(.2,.7,.2,1);
    }
    .toast.error{ background: var(--warn); }
    .toast.success{ background: var(--ok); }
    @keyframes toastIn{
      from{ opacity: 0; transform: translateY(10px); }
      to{ opacity: 1; transform: translateY(0); }
    }

    /* 참가자 목록 */
    .member-list{
      display: flex; flex-wrap: wrap; gap: 10px;
      padding: 18px 20px;
    }
    .member-chip{
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      border: 1.5px solid;
    }
    .member-chip-avatar{
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0;
    }
    .member-chip.approved{
      background: color-mix(in oklab, var(--ok) 10%, white);
      color: color-mix(in oklab, var(--ok) 80%, var(--ink));
      border-color: color-mix(in oklab, var(--ok) 30%, transparent);
    }
    .member-chip.approved .member-chip-avatar{
      background: color-mix(in oklab, var(--ok) 20%, white);
      color: color-mix(in oklab, var(--ok) 90%, var(--ink));
    }
    .member-chip.pending{
      background: color-mix(in oklab, var(--warn) 10%, white);
      color: color-mix(in oklab, var(--warn) 80%, var(--ink));
      border-color: color-mix(in oklab, var(--warn) 30%, transparent);
    }
    .member-chip.pending .member-chip-avatar{
      background: color-mix(in oklab, var(--warn) 20%, white);
      color: color-mix(in oklab, var(--warn) 90%, var(--ink));
    }
    .member-empty{
      padding: 18px 20px;
      font-size: 13.5px;
      color: var(--muted);
    }

    /* 햄버거 메뉴 */
    .hamburger-btn{display:none;flex-direction:column;gap:5px;padding:9px 10px;cursor:pointer;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);border-radius:10px;transition:border-color .15s}
    .hamburger-btn span{display:block;width:20px;height:2px;background:#fff;border-radius:2px;transition:all .22s}
    .hamburger-btn.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .hamburger-btn.open span:nth-child(2){opacity:0;transform:scaleX(0)}
    .hamburger-btn.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    .mobile-menu{display:none;position:fixed;top:74px;left:12px;right:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:8px;z-index:29;box-shadow:var(--shadow-3);animation:mmIn .18s cubic-bezier(.2,.7,.2,1)}
    .mobile-menu.open{display:block}
    @keyframes mmIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .mobile-menu a,.mobile-menu .mm-btn{display:flex;align-items:center;gap:10px;padding:13px 16px;border-radius:10px;font-size:14.5px;font-weight:600;color:var(--ink-2);text-decoration:none;background:none;border:none;width:100%;cursor:pointer;font-family:var(--font-kr);transition:background .12s,color .12s;text-align:left}
    .mobile-menu a:hover,.mobile-menu .mm-btn:hover{background:var(--surface-2);color:var(--accent)}
    .mm-divider{height:1px;background:var(--line);margin:4px 8px}
    .mm-btn.danger{color:var(--warn)}
    .mm-btn.danger:hover{background:color-mix(in oklab,var(--warn) 10%,white)}

    @media (max-width: 760px){
      .navbar{ width: calc(100% - 24px); margin-top: 10px; padding: 8px 10px 8px 16px; }
      .hamburger-btn{ display: flex; }
      .navbar-menu{ display: none !important; }
      .detail-hero{ margin: 10px 12px 0; padding: 20px 18px 20px; border-radius: 22px; }
      .hero-title{ font-size: clamp(22px, 5vw, 32px); }
      .hero-meta{ gap: 8px 12px; }
      .hero-meta-item{ font-size: 12px; }
      .page-body{ padding: 12px 12px 46px; gap: 10px; }
      .action-card{ flex-direction: column; padding: 10px; gap: 8px; }
      .btn-join,.btn-cancel,.btn-cancel-approved,.btn-edit,.btn-delete{ padding: 11px 14px; font-size: 13px; }
      .chat-box{ height: 260px; padding: 14px 14px; }
      .chat-input-area{ padding: 10px 14px; gap: 6px; }
      .chat-input-area input{ padding: 9px 12px; font-size: 13px; }
      .member-list{ padding: 14px 14px; gap: 8px; }
      .member-chip{ font-size: 12px; padding: 6px 11px; }
      .section-card-header{ padding: 12px 16px; font-size: 10px; }
      .content-body{ padding: 16px 16px; font-size: 14px; }
    }
    @media (max-width: 400px){
      .hero-title{ font-size: 20px; }
      .detail-hero{ padding: 16px 14px; }
      .chat-row{ gap: 6px; }
      .msg-bubble{ padding: 8px 11px; font-size: 13px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/view/meetings">Local<span>Meet</span></a>
  <div class="navbar-menu" id="navMenu">
    <a href="/view/meetings">모임 목록</a>
  </div>
  <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMobileMenu()" aria-label="메뉴">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="mobile-menu" id="mobileMenu"></div>

<div class="detail-hero">
  <div class="hero-inner">
    <a href="/view/meetings" class="back-link">← 목록으로</a>
    <div class="hero-badge-row">
      <span id="statusBadge" class="h-badge">모집중</span>
      <span id="categoryBadge" class="h-badge h-badge-category" style="display:none;"></span>
    </div>
    <div class="hero-title" th:text="${dto.meetingTitle}">모임 제목</div>
    <div class="hero-meta">
      <div class="hero-meta-item">✍️ <span th:text="${dto.userNickname}">작성자</span></div>
      <div class="hero-meta-item">📍 <span th:text="${dto.meetingAddress != null ? dto.meetingAddress : '위치 미지정'}">주소</span></div>
      <div class="hero-meta-item">👥 <span th:text="${dto.currentCount}">0</span> / <span th:text="${dto.meetingMax}">0</span> 명</div>
      <div class="hero-meta-item">🕐 <span th:text="${#temporals.format(dto.createdAt, 'yyyy.MM.dd')}">날짜</span></div>
    </div>
  </div>
</div>

<div class="page-body">
  <div class="action-card" id="actionArea"></div>

  <div class="section-card">
    <div class="section-card-header">👥 참가자 목록</div>
    <div id="memberList" class="member-list">
      <span class="member-empty">불러오는 중...</span>
    </div>
  </div>

  <div class="section-card">
    <div class="section-card-header">📋 모임 소개</div>
    <div class="content-body" th:text="${dto.meetingContent}">모임 내용</div>
  </div>

  <div th:if="${dto.meetingLat != null}" class="section-card">
    <div class="section-card-header">📍 모임 위치</div>
    <div id="map" style="width:100%; height:240px;"></div>
  </div>

  <div class="section-card">
    <div class="section-card-header">💬 실시간 채팅</div>
    <div class="chat-box" id="chatBox">
      <div style="text-align:center; color:#9ca3af; font-size:0.85rem; margin:auto;">채팅 내역을 불러오는 중...</div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="메시지를 입력하세요 (로그인 필요)">
      <button class="chat-send-btn" onclick="sendChat()">전송</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- 유저 팝업 -->
<div class="user-popup" id="userPopup">
  <div class="user-popup-avatar" id="popupAvatar">🙋</div>
  <div class="user-popup-name" id="popupName"></div>
  <button class="user-popup-btn btn-friend-add" id="popupFriendBtn" onclick="sendFriendRequest()">👋 친구 추가</button>
  <button class="user-popup-btn btn-dm" onclick="startDM()">💬 1:1 메시지</button>
</div>

<script th:inline="javascript">
  const meetingIdx        = /*[[${meetingIdx}]]*/ 0;
  const meetingLat        = /*[[${dto.meetingLat}]]*/ null;
  const meetingLng        = /*[[${dto.meetingLng}]]*/ null;
  const meetingWriterNick = /*[[${dto.userNickname}]]*/ '';
  const meetingStatus     = /*[[${dto.meetingStatus.name()}]]*/ 'OPEN';
  const meetingCategory   = /*[[${dto.meetingCategory != null ? dto.meetingCategory.value : ''}]]*/ '';
  const kakaoMapApiKey    = /*[[${@environment.getProperty('kakao.map.api-key')}]]*/ '';
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script>
  const token = localStorage.getItem('JWT_TOKEN');

  // 네비 상태
  const navMenu = document.getElementById('navMenu');
  const mobileMenu = document.getElementById('mobileMenu');
  if (token) {
    fetch('/api/auth/mypage', { headers: { 'JWT_TOKEN': token } })
      .then(r => r.json())
      .then(u => {
        const isAdmin = u.userRole === 'ROLE_ADMIN';
        navMenu.innerHTML += (isAdmin ? `<a href="/view/admin">관리자</a>` : '')
          + `<a href="/view/messages">💬 메시지</a><a href="/view/mypage">마이페이지</a>
          <button onclick="doLogout()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;font-weight:600;padding:8px 14px;">로그아웃</button>`;
        mobileMenu.innerHTML =
          `<a href="/view/meetings">🏠 모임 목록</a>`
          + (isAdmin ? `<a href="/view/admin">🛡 관리자 페이지</a>` : '')
          + `<a href="/view/messages">💬 메시지</a>`
          + `<a href="/view/mypage">👤 마이페이지</a>`
          + `<div class="mm-divider"></div>`
          + `<button class="mm-btn danger" onclick="doLogout()">🚪 로그아웃</button>`;
      });
  } else {
    navMenu.innerHTML += `<a href="/view/login">로그인</a>`;
    mobileMenu.innerHTML = `<a href="/view/login">🔑 로그인</a>`;
  }

  function toggleMobileMenu() {
    document.getElementById('hamburgerBtn').classList.toggle('open');
    document.getElementById('mobileMenu').classList.toggle('open');
  }
  document.addEventListener('click', e => {
    const menu = document.getElementById('mobileMenu');
    const btn = document.getElementById('hamburgerBtn');
    if (menu && !menu.contains(e.target) && btn && !btn.contains(e.target)) {
      menu.classList.remove('open'); btn.classList.remove('open');
    }
  });
  function doLogout() { localStorage.removeItem('JWT_TOKEN'); document.cookie = 'JWT_TOKEN=; path=/; max-age=0'; location.href='/view/login'; }

  // 카테고리 배지
  if (meetingCategory) {
    const catBadge = document.getElementById('categoryBadge');
    catBadge.textContent = meetingCategory;
    catBadge.style.display = '';
  }

  // 히어로 배지 상태
  const badge = document.getElementById('statusBadge');
  const badgeMap = {
    OPEN:   ['h-badge-open',   '모집중'],
    FULL:   ['h-badge-full',   '모집완료'],
    CLOSED: ['h-badge-closed', '종료']
  };
  badge.className = 'h-badge ' + (badgeMap[meetingStatus]?.[0] || '');
  badge.textContent = badgeMap[meetingStatus]?.[1] || meetingStatus;

  // 액션 버튼
  const actionArea = document.getElementById('actionArea');
  if (token) {
    fetch('/api/auth/mypage', { headers: { 'JWT_TOKEN': token } })
    .then(r => r.json())
    .then(user => {
      if (user.userNickname === meetingWriterNick) {
        actionArea.innerHTML = `
          <button class="btn-edit" onclick="location.href='/view/meetings/${meetingIdx}/edit'">✏️ 모임 수정</button>
          <button class="btn-delete" onclick="deleteMeeting()">🗑️ 삭제</button>`;
      } else {
        // 참가 상태 확인
        fetch(`/api/meetings/${meetingIdx}/my-status`, { headers: { 'JWT_TOKEN': token } })
        .then(r => r.json())
        .then(res => {
          if (res.status === 'APPROVED') {
            actionArea.innerHTML = `<button class="btn-cancel-approved" disabled>✅ 참가 확정 (취소 불가)</button>`;
          } else if (res.status === 'PENDING') {
            actionArea.innerHTML = `<button class="btn-cancel" onclick="cancelMeeting()">❌ 참가 신청 취소</button>`;
          } else {
            actionArea.innerHTML = `<button class="btn-join" onclick="joinMeeting()">✋ 참가 신청하기</button>`;
          }
        })
        .catch(() => {
          actionArea.innerHTML = `<button class="btn-join" onclick="joinMeeting()">✋ 참가 신청하기</button>`;
        });
      }
    });
  } else {
    actionArea.innerHTML = `<button class="btn-join" onclick="location.href='/view/login'">로그인 후 참가 신청</button>`;
  }

  function showToast(msg, type = '') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div'); t.className='toast '+type; t.textContent=msg; c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function joinMeeting() {
    fetch(`/api/meetings/${meetingIdx}/join`, { method:'POST', headers:{'JWT_TOKEN':token} })
    .then(r => r.json())
    .then(data => {
      showToast(data.message, data.success ? 'success' : 'error');
      if (data.success) setTimeout(() => location.reload(), 1000);
      else loadMembers();
    })
    .catch(() => showToast('서버 오류가 발생했습니다.', 'error'));
  }

  // 참가자 목록 로드
  function loadMembers() {
    fetch(`/api/meetings/${meetingIdx}/members`)
    .then(r => r.json())
    .then(members => {
      const list = document.getElementById('memberList');
      if (!members || members.length === 0) {
        list.innerHTML = '<span class="member-empty">아직 참가 신청한 멤버가 없습니다.</span>';
        return;
      }
      list.innerHTML = members.map(m => {
        const initial = m.userNickname ? m.userNickname.charAt(0).toUpperCase() : '?';
        const cls     = m.approved ? 'approved' : 'pending';
        const label   = m.approved ? '✓ 확정' : '대기중';
        return `<div class="member-chip ${cls}">
          <span class="member-chip-avatar">${initial}</span>
          <span>${m.userNickname}</span>
          <span style="font-size:11px;opacity:.75;">${label}</span>
        </div>`;
      }).join('');
    })
    .catch(() => {
      document.getElementById('memberList').innerHTML = '<span class="member-empty">참가자 정보를 불러올 수 없습니다.</span>';
    });
  }
  loadMembers();

  function cancelMeeting() {
    if (!confirm('참가 신청을 취소하시겠습니까?')) return;
    fetch(`/api/meetings/${meetingIdx}/cancel`, { method:'DELETE', headers:{'JWT_TOKEN':token} })
    .then(r => r.json())
    .then(data => {
      showToast(data.message, data.success ? 'success' : 'error');
      if (data.success) setTimeout(() => location.reload(), 1000);
    })
    .catch(() => showToast('서버 오류가 발생했습니다.', 'error'));
  }

  function deleteMeeting() {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    fetch(`/api/meetings/${meetingIdx}`, { method:'DELETE', headers:{'JWT_TOKEN':token} })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        showToast(data.message, 'success');
        setTimeout(() => location.href = '/view/meetings', 800);
      } else {
        showToast(data.message || '삭제 실패', 'error');
      }
    })
    .catch(() => showToast('서버 오류가 발생했습니다.', 'error'));
  }

  // 카카오맵
  if (meetingLat && meetingLng) {
    const script = document.createElement('script');
    script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${kakaoMapApiKey}&autoload=false`;
    script.onload = function () {
      kakao.maps.load(function () {
        const coords = new kakao.maps.LatLng(meetingLat, meetingLng);
        const map = new kakao.maps.Map(document.getElementById('map'), { center: coords, level: 4 });
        new kakao.maps.Marker({ map, position: coords });
      });
    };
    document.head.appendChild(script);
  }

  // ── 채팅 ──
  let stompClient = null;
  const renderedChatIds = new Set();
  let myUserIdx = null;

  // myUserIdx를 먼저 받은 뒤 채팅 로드 (내 메시지 오른쪽 정렬 위해)
  function loadChatHistory() {
    fetch(`/api/chat/${meetingIdx}`)
    .then(r => r.json())
    .then(msgs => {
      const box = document.getElementById('chatBox');
      if (msgs.length === 0) {
        box.innerHTML = '<div style="text-align:center;color:#9ca3af;font-size:0.85rem;margin:auto;">첫 메시지를 남겨보세요!</div>';
      } else {
        box.innerHTML = '';
        msgs.forEach(m => appendChat(m));
      }
    });
  }

  if (token) {
    fetch('/api/auth/mypage', { headers: { 'JWT_TOKEN': token } })
      .then(r => r.json())
      .then(u => { myUserIdx = u.userIdx; })
      .finally(() => loadChatHistory());
  } else {
    loadChatHistory();
  }

  function connectChat() {
    const socket = new SockJS('/ws/chat');
    stompClient = Stomp.over(socket);
    stompClient.debug = null;
    stompClient.connect({ 'JWT_TOKEN': token || '' }, function () {
      stompClient.subscribe(`/topic/meeting/${meetingIdx}`, function (frame) {
        appendChat(JSON.parse(frame.body));
      });
    });
  }

  function sendChat() {
    if (!token) { showToast('로그인이 필요합니다.', 'error'); return; }
    const content = document.getElementById('chatInput').value.trim();
    if (!content) return;
    fetch(`/api/chat/${meetingIdx}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'JWT_TOKEN': token },
      body: JSON.stringify({ meetingIdx, chatContent: content })
    })
    .then(async r => {
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        throw new Error(err.message || '전송 실패');
      }
      return r.json();
    })
    .then(saved => {
      appendChat(saved);
      document.getElementById('chatInput').value = '';
    })
    .catch(e => showToast(e.message, 'error'));
  }

  function appendChat(msg) {
    if (msg.chatIdx && renderedChatIds.has(msg.chatIdx)) return;
    if (msg.chatIdx) renderedChatIds.add(msg.chatIdx);

    const box = document.getElementById('chatBox');
    const empty = box.querySelector('[style*="margin:auto"]');
    if (empty) empty.remove();

    const isMine = myUserIdx != null && msg.userIdx === myUserIdx;
    const initial = (msg.userNickname || '?').charAt(0);
    const avatarInner = msg.profileImg
      ? `<img src="${msg.profileImg}" alt="">`
      : initial;

    const time = msg.createdAt ? msg.createdAt.substring(11, 16) : '';
    const safeNick = (msg.userNickname || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    const safeImg  = (msg.profileImg  || '').replace(/'/g, "\\'");

    const row = document.createElement('div');
    row.className = 'chat-row' + (isMine ? ' mine' : '');

    if (isMine) {
      // 내 메시지: 버블 왼쪽 → 오른쪽, 아바타 맨 오른쪽
      row.innerHTML = `
        <div class="chat-bubble-wrap">
          <div class="chat-msg-content">${escChat(msg.chatContent)}</div>
          <span class="chat-msg-time" style="text-align:right;">${time}</span>
        </div>
        <div class="chat-avatar">${avatarInner}</div>`;
    } else {
      // 상대 메시지: 아바타 왼쪽, 닉네임 + 버블 오른쪽
      row.innerHTML = `
        <div class="chat-avatar">${avatarInner}</div>
        <div class="chat-bubble-wrap">
          <span class="chat-msg-author"
                onclick="showUserPopup(${msg.userIdx},'${safeNick}','${safeImg}',event)"
          >${escChat(msg.userNickname)}</span>
          <div class="chat-msg-content">${escChat(msg.chatContent)}</div>
          <span class="chat-msg-time">${time}</span>
        </div>`;
    }

    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
  }

  function escChat(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── 유저 팝업 ──
  let popupTargetUserIdx = null;

  function showUserPopup(userIdx, nickname, profileImg, event) {
    if (!token) return;
    event.stopPropagation();
    popupTargetUserIdx = userIdx;

    const popup = document.getElementById('userPopup');
    const avatarEl = document.getElementById('popupAvatar');
    const nameEl   = document.getElementById('popupName');
    const friendBtn = document.getElementById('popupFriendBtn');

    // 아바타
    avatarEl.innerHTML = profileImg
      ? `<img src="${profileImg}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="">`
      : `<span style="font-size:1.3rem">🙋</span>`;
    nameEl.textContent = nickname;

    // 버튼 초기화
    friendBtn.textContent = '👋 친구 추가';
    friendBtn.className = 'user-popup-btn btn-friend-add';
    friendBtn.disabled = false;

    // 팝업 위치 (position:fixed → viewport 좌표 그대로 사용)
    popup.style.display = 'block';
    const rect = event.target.getBoundingClientRect();
    const pw = popup.offsetWidth || 220;
    const ph = popup.offsetHeight || 160;
    let left = rect.left;
    let top  = rect.bottom + 6;
    if (left + pw > window.innerWidth - 12) left = window.innerWidth - pw - 12;
    if (top  + ph > window.innerHeight - 12) top = rect.top - ph - 6;
    popup.style.left = left + 'px';
    popup.style.top  = top  + 'px';

    // 친구 상태 조회
    fetch(`/api/friends/status/${userIdx}`, { headers: { 'JWT_TOKEN': token } })
      .then(r => r.json())
      .then(data => {
        if (data.status === 'ACCEPTED') {
          friendBtn.textContent = '✅ 이미 친구';
          friendBtn.className = 'user-popup-btn btn-friend-accepted';
          friendBtn.disabled = true;
        } else if (data.status === 'PENDING_SENT') {
          friendBtn.textContent = '⏳ 요청 보냄';
          friendBtn.className = 'user-popup-btn btn-friend-pending';
          friendBtn.disabled = true;
        } else if (data.status === 'PENDING_RECEIVED') {
          friendBtn.textContent = '✉️ 요청 수락하기';
          friendBtn.className = 'user-popup-btn btn-friend-add';
          friendBtn.disabled = false;
          friendBtn.dataset.friendIdx = data.friendIdx;
          friendBtn.onclick = () => acceptFriendRequest(data.friendIdx);
        }
      }).catch(() => {});
  }

  function sendFriendRequest() {
    if (!popupTargetUserIdx) return;
    fetch(`/api/friends/request/${popupTargetUserIdx}`, {
      method: 'POST', headers: { 'JWT_TOKEN': token }
    })
    .then(r => r.json())
    .then(data => {
      showToast(data.message, data.success ? 'success' : 'error');
      if (data.success) {
        const btn = document.getElementById('popupFriendBtn');
        btn.textContent = '⏳ 요청 보냄';
        btn.className = 'user-popup-btn btn-friend-pending';
        btn.disabled = true;
      }
    })
    .catch(() => showToast('오류가 발생했습니다.', 'error'));
  }

  function acceptFriendRequest(friendIdx) {
    fetch(`/api/friends/accept/${friendIdx}`, {
      method: 'POST', headers: { 'JWT_TOKEN': token }
    })
    .then(r => r.json())
    .then(data => {
      showToast(data.message, data.success ? 'success' : 'error');
      if (data.success) {
        const btn = document.getElementById('popupFriendBtn');
        btn.textContent = '✅ 이미 친구';
        btn.className = 'user-popup-btn btn-friend-accepted';
        btn.disabled = true;
      }
    });
  }

  function startDM() {
    if (!popupTargetUserIdx) return;
    fetch(`/api/messages/conversations/dm/${popupTargetUserIdx}`, {
      method: 'POST', headers: { 'JWT_TOKEN': token }
    })
    .then(r => r.json())
    .then(data => {
      if (data.convIdx) location.href = `/view/messages?conv=${data.convIdx}`;
    })
    .catch(() => showToast('메시지를 열 수 없습니다.', 'error'));
  }

  // 팝업 바깥 클릭 시 닫기
  document.addEventListener('click', e => {
    const popup = document.getElementById('userPopup');
    if (!popup.contains(e.target)) popup.style.display = 'none';
  });

  document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendChat(); });
  connectChat();
</script>
</body>
</html>
