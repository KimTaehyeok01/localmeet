<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${dto.meetingTitle} + ' - LocalMeet'">모임 상세</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/view/meetings">Local<span>Meet</span></a>
  <div class="navbar-menu" id="navMenu">
    <a href="/view/meetings">모임 목록</a>
  </div>
</nav>

<div class="container" style="max-width:800px;">

  <a href="/view/meetings" style="font-size:0.88rem; color:var(--gray-400); display:inline-flex; align-items:center; gap:4px; margin-bottom:16px;">
    ← 목록으로
  </a>

  <!-- 상세 헤더 -->
  <div class="detail-header">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
      <span id="statusBadge" class="badge">모집중</span>
    </div>
    <div class="detail-title" th:text="${dto.meetingTitle}">모임 제목</div>
    <div class="detail-meta">
      <span>✍️ <span th:text="${dto.userNickname}">작성자</span></span>
      <span>📍 <span th:text="${dto.meetingAddress != null ? dto.meetingAddress : '위치 미지정'}">주소</span></span>
      <span>👥 <span th:text="${dto.currentCount}">0</span> / <span th:text="${dto.meetingMax}">0</span> 명</span>
      <span>🕐 <span th:text="${#temporals.format(dto.createdAt, 'yyyy.MM.dd')}">날짜</span></span>
    </div>
    <div class="detail-actions" id="actionArea">
      <!-- JS로 버튼 렌더링 -->
    </div>
  </div>

  <!-- 내용 -->
  <div class="detail-content" th:text="${dto.meetingContent}">모임 내용</div>

  <!-- 지도 -->
  <div th:if="${dto.meetingLat != null}" class="map-wrap">
    <div id="map" style="width:100%;height:240px;"></div>
  </div>

  <!-- 채팅 -->
  <div class="chat-section">
    <div class="chat-header">💬 실시간 채팅</div>
    <div class="chat-box" id="chatBox">
      <div style="text-align:center; color:var(--gray-400); font-size:0.85rem; margin:auto;">채팅 내역을 불러오는 중...</div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="메시지를 입력하세요 (로그인 필요)">
      <button class="btn btn-primary" onclick="sendChat()">전송</button>
    </div>
  </div>

</div>

<div class="toast-container" id="toastContainer"></div>

<script th:inline="javascript">
  const meetingIdx          = /*[[${meetingIdx}]]*/ 0;
  const meetingLat          = /*[[${dto.meetingLat}]]*/ null;
  const meetingLng          = /*[[${dto.meetingLng}]]*/ null;
  const meetingWriterNick   = /*[[${dto.userNickname}]]*/ '';
  const meetingStatus       = /*[[${dto.meetingStatus.name()}]]*/ 'OPEN';
  const kakaoMapApiKey      = /*[[${@environment.getProperty('kakao.map.api-key')}]]*/ '';
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script>
  const token = localStorage.getItem('JWT_TOKEN');

  // 네비 상태
  const navMenu = document.getElementById('navMenu');
  if (token) {
    navMenu.innerHTML += `<a href="/view/mypage">마이페이지</a>
      <button onclick="doLogout()" style="background:none;border:none;cursor:pointer;color:var(--gray-600);font-size:0.9rem;">로그아웃</button>`;
  } else {
    navMenu.innerHTML += `<a href="/view/login">로그인</a>`;
  }
  function doLogout() { localStorage.removeItem('JWT_TOKEN'); location.href='/view/login'; }

  // 배지 상태
  const badge = document.getElementById('statusBadge');
  const badgeMap = { OPEN: ['badge-open','모집중'], FULL: ['badge-full','모집완료'], CLOSED: ['badge-closed','종료'] };
  badge.className = 'badge ' + (badgeMap[meetingStatus]?.[0] || '');
  badge.textContent = badgeMap[meetingStatus]?.[1] || meetingStatus;

  // 액션 버튼 (로그인 여부, 본인 여부 체크)
  const actionArea = document.getElementById('actionArea');
  if (token) {
    fetch('/api/auth/mypage', { headers: { 'JWT_TOKEN': token } })
    .then(r => r.json())
    .then(user => {
      if (user.userNickname === meetingWriterNick) {
        actionArea.innerHTML = `
          <button class="btn btn-outline" onclick="location.href='/view/meetings/${meetingIdx}/edit'">✏️ 수정</button>
          <button class="btn btn-danger" onclick="deleteMeeting()">🗑️ 삭제</button>`;
      } else {
        actionArea.innerHTML = `
          <button class="btn btn-primary" onclick="joinMeeting()">✋ 참가 신청</button>`;
      }
    });
  } else {
    actionArea.innerHTML = `<button class="btn btn-primary" onclick="location.href='/view/login'">로그인 후 참가 신청</button>`;
  }

  function showToast(msg, type = '') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div'); t.className='toast '+type; t.textContent=msg; c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function joinMeeting() {
    fetch(`/api/meetings/${meetingIdx}/join`, { method:'POST', headers:{'JWT_TOKEN':token} })
    .then(r => r.text()).then(msg => showToast(msg, 'success'));
  }

  function deleteMeeting() {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    fetch(`/api/meetings/${meetingIdx}/delete`, { headers:{'JWT_TOKEN':token} })
    .then(r => r.text()).then(html => document.write(html));
  }

  // 카카오맵
  if (meetingLat && meetingLng) {
    const script = document.createElement('script');
    script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${kakaoMapApiKey}&autoload=false`;
    script.onload = function () {
      kakao.maps.load(function () {
        const coords = new kakao.maps.LatLng(meetingLat, meetingLng);
        const map = new kakao.maps.Map(document.getElementById('map'), { center: coords, level: 4 });
        new kakao.maps.Marker({ map, position: coords });
      });
    };
    document.head.appendChild(script);
  }

  // ── 채팅 ──
  let stompClient = null;

  fetch(`/api/chat/${meetingIdx}`)
  .then(r => r.json())
  .then(msgs => {
    const box = document.getElementById('chatBox');
    if (msgs.length === 0) {
      box.innerHTML = '<div style="text-align:center;color:var(--gray-400);font-size:0.85rem;margin:auto;">첫 메시지를 남겨보세요!</div>';
    } else {
      box.innerHTML = '';
      msgs.forEach(m => appendChat(m));
    }
  });

  function connectChat() {
    const socket = new SockJS('/ws/chat');
    stompClient = Stomp.over(socket);
    stompClient.debug = null;
    stompClient.connect({ 'JWT_TOKEN': token || '' }, function () {
      stompClient.subscribe(`/topic/meeting/${meetingIdx}`, function (frame) {
        appendChat(JSON.parse(frame.body));
      });
    });
  }

  function sendChat() {
    if (!token) { showToast('로그인이 필요합니다.', 'error'); return; }
    const content = document.getElementById('chatInput').value.trim();
    if (!content) return;
    stompClient.send(`/app/chat/send/${meetingIdx}`, { 'JWT_TOKEN': token },
      JSON.stringify({ meetingIdx, chatContent: content }));
    document.getElementById('chatInput').value = '';
  }

  function appendChat(msg) {
    const box = document.getElementById('chatBox');
    // 안내 메시지 제거
    const empty = box.querySelector('[style*="margin:auto"]');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = 'chat-msg';
    const time = msg.createdAt ? msg.createdAt.substring(0,16).replace('T',' ') : '';
    div.innerHTML = `<span class="chat-msg-author">${msg.userNickname}</span>
      <span class="chat-msg-content">${msg.chatContent}</span>
      <span class="chat-msg-time">${time}</span>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendChat(); });
  connectChat();
</script>
</body>
</html>
