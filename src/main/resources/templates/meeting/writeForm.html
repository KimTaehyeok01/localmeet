<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모임 만들기 - LocalMeet</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
    :root{
      --bg: #F4FAFE;
      --surface: #FFFFFF;
      --surface-2: #EBF4FB;
      --ink: #0B2036;
      --ink-2: #264766;
      --muted: #6B8AA8;
      --muted-2: #A6BED4;
      --line: #D7E6F2;
      --accent: #1FA6D6;
      --accent-2: #7DD4C0;
      --accent-3: #B8A6FF;
      --accent-4: #FFD447;
      --ok: #2CCB86;
      --warn: #FF8A4C;
      --radius: 16px;
      --radius-lg: 22px;
      --radius-xl: 32px;
      --shadow-1: 0 1px 2px rgba(11,32,54,.05);
      --shadow-2: 0 4px 16px -6px rgba(31,166,214,.18), 0 1px 3px rgba(11,32,54,.05);
      --shadow-3: 0 20px 48px -16px rgba(31,166,214,.28), 0 2px 6px rgba(11,32,54,.06);
      --font-kr: 'Pretendard', system-ui, -apple-system, 'Noto Sans KR', sans-serif;
      --font-serif: 'Instrument Serif', ui-serif, serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    *{ box-sizing: border-box; }
    body{
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-kr);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }
    body::before{
      content:'';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(55vw 50vh at 90% -10%, rgba(125,212,192,.42), transparent 60%),
        radial-gradient(50vw 55vh at -8% 20%, rgba(184,166,255,.36), transparent 60%),
        radial-gradient(45vw 50vh at 50% 110%, rgba(31,166,214,.2), transparent 60%);
    }
    body > *{ position: relative; z-index: 1; }

    .navbar{
      position: sticky; top: 14px; z-index: 30;
      max-width: 1240px;
      margin: 14px auto 0;
      width: calc(100% - 28px);
      background: color-mix(in oklab, var(--surface) 82%, transparent);
      backdrop-filter: saturate(1.3) blur(18px);
      -webkit-backdrop-filter: saturate(1.3) blur(18px);
      border: 1px solid var(--line);
      border-radius: 999px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 10px 22px;
      box-shadow: var(--shadow-1);
    }
    .navbar-brand{
      font-weight: 700; font-size: 18px;
      color: var(--ink); text-decoration: none;
      letter-spacing: -0.02em;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .navbar-brand::before{
      content:''; width: 26px; height: 26px; border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.85), transparent 50%),
        conic-gradient(from 200deg, var(--accent), var(--accent-2) 45%, var(--accent-3) 72%, var(--accent-4) 100%);
      box-shadow: 0 2px 8px -2px rgba(31,166,214,.4);
    }
    .navbar-brand span{
      background: linear-gradient(90deg, var(--accent), var(--accent-3));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .navbar-menu a{
      padding: 8px 14px;
      font-size: 14px;
      color: var(--ink-2);
      text-decoration: none;
      border-radius: 999px;
      transition: background .15s, color .15s;
      font-weight: 500;
    }
    .navbar-menu a:hover{ color: var(--accent); background: var(--surface-2); }

    .page-hero{
      max-width: 1180px;
      margin: 18px auto 0;
      padding: 30px 24px;
      display: grid;
      grid-template-columns: 1fr;
      border-radius: var(--radius-xl);
      background:
        radial-gradient(120% 90% at 0% 0%, rgba(184,166,255,.55), transparent 55%),
        radial-gradient(100% 80% at 100% 100%, rgba(125,212,192,.55), transparent 55%),
        linear-gradient(160deg, #0E6FA0 0%, #1FA6D6 50%, #2FB8C6 100%);
      color: #fff;
      box-shadow: var(--shadow-3);
    }
    .hero-eyebrow{
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,255,255,.88);
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.24);
      padding: 6px 12px 6px 10px;
      border-radius: 999px;
      width: fit-content;
    }
    .hero-eyebrow::before{
      content:''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent-4);
      box-shadow: 0 0 0 3px rgba(255,212,71,.3);
    }
    .hero-title{
      margin: 16px 0 8px;
      font-size: clamp(34px, 3.8vw, 46px);
      letter-spacing: -0.03em;
      line-height: 1.03;
      font-weight: 800;
    }
    .hero-title em{
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 400;
      color: var(--accent-4);
    }
    .hero-sub{ margin: 0; color: rgba(255,255,255,.84); }

    .page-body{
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 24px 62px;
    }
    .form-card{
      max-width: 760px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-2);
      overflow: hidden;
    }
    .form-section{ padding: 24px 24px 0; }
    .form-section:last-of-type{ padding-bottom: 24px; }
    .form-section-title{
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .form-section-title::after{
      content:''; flex: 1; height: 1px; background: var(--line);
    }
    .field{ margin-bottom: 16px; }
    .field-label{
      display: block;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--ink-2);
      margin-bottom: 7px;
    }
    .field-label .required{ color: var(--accent); margin-left: 2px; }
    .field-label .optional{ color: var(--muted); margin-left: 6px; font-size: 11px; font-weight: 500; }
    .field-input{
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      font-size: 14px;
      font-family: var(--font-kr);
      color: var(--ink);
      background: #fff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field-input:focus{
      border-color: var(--accent);
      box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 14%, transparent);
    }
    .field-input::placeholder{ color: var(--muted-2); }
    .field-input[readonly]{ background: var(--surface-2); cursor: pointer; }
    textarea.field-input{ resize: vertical; min-height: 130px; line-height: 1.7; }

    .addr-row{ display: flex; gap: 10px; }
    .addr-row .field-input{ flex: 1; }
    .addr-btn{
      background: var(--surface-2);
      color: var(--ink-2);
      border: 1.5px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 12.5px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-kr);
      white-space: nowrap;
      transition: background .15s;
    }
    .addr-btn:hover{ background: var(--line); }

    .number-input-wrap{
      display: flex; align-items: center;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      width: fit-content;
      transition: border-color .2s, box-shadow .2s;
      background: #fff;
    }
    .number-input-wrap:focus-within{
      border-color: var(--accent);
      box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 14%, transparent);
    }
    .num-btn{
      background: var(--surface-2);
      border: none;
      padding: 12px 16px;
      font-size: 1.1rem;
      cursor: pointer;
      color: var(--ink-2);
      transition: background .15s, color .15s;
      font-family: var(--font-kr);
      line-height: 1;
    }
    .num-btn:hover{ background: color-mix(in oklab, var(--accent) 12%, white); color: var(--accent); }
    .num-display{
      min-width: 64px;
      text-align: center;
      font-size: 1.02rem;
      font-weight: 700;
      color: var(--ink);
      border: none;
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 12px 8px;
      font-family: var(--font-kr);
      outline: none;
      background: #fff;
    }

    .map-preview{
      display: none;
      border-top: 1px solid var(--line);
      overflow: hidden;
      background: var(--surface-2);
    }
    .map-preview-label{
      padding: 10px 24px;
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .form-actions{
      display: flex;
      gap: 10px;
      padding: 18px 24px 24px;
      border-top: 1px solid var(--line);
      background: #fff;
    }
    .btn-submit{
      flex: 1;
      background: linear-gradient(135deg, var(--accent), #0E8AB8);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 13px 22px;
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-kr);
      transition: transform .15s, filter .15s, box-shadow .15s;
      box-shadow: 0 6px 18px -6px rgba(31,166,214,.55);
    }
    .btn-submit:hover{
      filter: brightness(1.06);
      transform: translateY(-1px);
      box-shadow: 0 10px 26px -8px rgba(31,166,214,.65);
    }
    .btn-cancel{
      background: var(--surface-2);
      color: var(--ink-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 13px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-kr);
    }
    .btn-cancel:hover{ background: var(--line); }

    .toast-container{
      position: fixed; left: 50%; bottom: 28px;
      transform: translateX(-50%);
      z-index: 100;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast{
      background: var(--ink); color: #fff;
      padding: 11px 20px;
      border-radius: 999px;
      font-size: 13px;
      box-shadow: var(--shadow-3);
      animation: toastIn .25s cubic-bezier(.2,.7,.2,1);
    }
    .toast.error{ background: var(--warn); }
    .toast.success{ background: var(--ok); }
    @keyframes toastIn{
      from{ opacity: 0; transform: translateY(10px); }
      to{ opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 760px){
      .page-hero{ margin: 14px 16px 0; padding: 24px 20px; }
      .page-body{ padding: 14px 16px 46px; }
      .form-section{ padding: 20px 20px 0; }
      .form-actions{ padding: 16px 20px 20px; }
    }
    @media (max-width: 480px){
      .navbar{
        width: calc(100% - 20px);
        margin-top: 10px;
        padding: 8px 10px 8px 16px;
      }
      .addr-row{ flex-direction: column; }
      .form-actions{ flex-direction: column; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/view/meetings">Local<span>Meet</span></a>
  <div class="navbar-menu">
    <a href="/view/meetings">모임 목록</a>
    <a href="/view/mypage">마이페이지</a>
  </div>
</nav>

<div class="page-hero">
  <div class="hero-eyebrow">Create meeting</div>
  <div class="hero-title">새로운 <em>모임</em> 만들기</div>
  <p class="hero-sub">이웃들과 함께할 모임 정보를 입력해보세요</p>
</div>

<div class="page-body">
  <div class="form-card">

    <div class="form-section">
      <div class="form-section-title">기본 정보</div>

      <div class="field">
        <label class="field-label">모임 제목 <span class="required">*</span></label>
        <input type="text" id="meetingTitle" class="field-input" placeholder="어떤 모임인지 알려주세요">
      </div>

      <div class="field">
        <label class="field-label">모임 내용 <span class="required">*</span></label>
        <textarea id="meetingContent" class="field-input" rows="5"
                  placeholder="모임 소개, 활동 내용, 참가 조건 등을 적어주세요"></textarea>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">위치</div>

      <div class="field">
        <label class="field-label">주소 <span class="optional">선택사항</span></label>
        <div class="addr-row">
          <input type="text" id="meetingAddress" class="field-input" placeholder="주소를 검색해보세요" readonly>
          <button class="addr-btn" onclick="searchAddress()">📍 검색</button>
        </div>
        <input type="hidden" id="meetingLat">
        <input type="hidden" id="meetingLng">
      </div>
    </div>

    <div id="mapWrap" class="map-preview">
      <div class="map-preview-label">위치 미리보기</div>
      <div id="map" style="width:100%; height:220px;"></div>
    </div>

    <div class="form-section" style="padding-bottom:24px;">
      <div class="form-section-title">인원</div>

      <div class="field" style="margin-bottom:0;">
        <label class="field-label">최대 인원 <span class="required">*</span></label>
        <div class="number-input-wrap">
          <button class="num-btn" onclick="changeMax(-1)">−</button>
          <input type="number" id="meetingMax" class="num-display" min="2" value="10" readonly>
          <button class="num-btn" onclick="changeMax(1)">+</button>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-submit" onclick="saveMeeting()">모임 등록하기</button>
      <button class="btn-cancel" onclick="location.href='/view/meetings'">취소</button>
    </div>

  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script th:inline="javascript">
  const kakaoMapApiKey = /*[[${kakaoMapApiKey}]]*/ '';
</script>
<script th:src="@{'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + ${kakaoMapApiKey} + '&libraries=services'}"></script>
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
  const token = localStorage.getItem('JWT_TOKEN');
  if (!token) { alert('로그인이 필요합니다.'); location.href = '/view/login'; }

  function showToast(msg, type='') {
    const c = document.getElementById('toastContainer'), t = document.createElement('div');
    t.className = 'toast ' + type; t.textContent = msg; c.appendChild(t); setTimeout(() => t.remove(), 3000);
  }

  // 인원 +/- 조작
  function changeMax(delta) {
    const el = document.getElementById('meetingMax');
    const val = parseInt(el.value) + delta;
    if (val >= 2 && val <= 100) el.value = val;
  }

  let map, marker, geocoder;
  kakao.maps.load(function () {
    geocoder = new kakao.maps.services.Geocoder();
  });

  function searchAddress() {
    new daum.Postcode({
      oncomplete: function (data) {
        const address = data.roadAddress || data.jibunAddress;
        document.getElementById('meetingAddress').value = address;
        document.getElementById('mapWrap').style.display = 'block';

        if (!map) {
          map = new kakao.maps.Map(document.getElementById('map'), {
            center: new kakao.maps.LatLng(37.5665, 126.9780), level: 4
          });
        }

        geocoder.addressSearch(address, function (result, status) {
          if (status === kakao.maps.services.Status.OK) {
            const lat = result[0].y, lng = result[0].x;
            document.getElementById('meetingLat').value = lat;
            document.getElementById('meetingLng').value = lng;
            const coords = new kakao.maps.LatLng(lat, lng);
            map.setCenter(coords);
            if (marker) marker.setMap(null);
            marker = new kakao.maps.Marker({ map, position: coords });
          }
        });
      }
    }).open();
  }

  function saveMeeting() {
    const title   = document.getElementById('meetingTitle').value.trim();
    const content = document.getElementById('meetingContent').value.trim();
    const max     = document.getElementById('meetingMax').value;
    if (!title || !content) { showToast('제목과 내용을 입력해주세요.', 'error'); return; }

    const params = new URLSearchParams({
      meetingTitle: title, meetingContent: content,
      meetingAddress: document.getElementById('meetingAddress').value,
      meetingLat: document.getElementById('meetingLat').value || '',
      meetingLng: document.getElementById('meetingLng').value || '',
      meetingMax: max
    });

    fetch('/api/meetings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'JWT_TOKEN': token },
      body: params.toString()
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        showToast(data.message, 'success');
        setTimeout(() => location.href = '/view/meetings', 800);
      } else {
        showToast(data.message || '모임 등록 실패', 'error');
      }
    })
    .catch(() => showToast('서버 오류가 발생했습니다.', 'error'));
  }
</script>
</body>
</html>
