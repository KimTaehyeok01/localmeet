<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>лЎңк·ёмқё - LocalMeet</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- л„Өл№„кІҢмқҙм…ҳ -->
<nav class="navbar">
  <a class="navbar-brand" href="/view/meetings">Local<span>Meet</span></a>
</nav>

<div class="container-sm">
  <div class="auth-card">
    <div class="auth-title">лӢӨмӢң л§ҢлӮҳмҡ” рҹ‘Ӣ</div>
    <div class="auth-subtitle">LocalMeetм—җ лЎңк·ёмқён•ҳм„ёмҡ”</div>

    <div class="form-group">
      <label class="form-label">мқҙл©”мқј</label>
      <input type="email" id="userEmail" class="form-control" placeholder="мқҙл©”мқј мһ…л Ҙ">
    </div>
    <div class="form-group">
      <label class="form-label">л№„л°ҖлІҲнҳё</label>
      <input type="password" id="userPassword" class="form-control" placeholder="л№„л°ҖлІҲнҳё мһ…л Ҙ">
    </div>

    <button class="btn btn-primary btn-full" onclick="login()">лЎңк·ёмқё</button>

    <div class="auth-footer">
      кі„м •мқҙ м—ҶмңјмӢ к°Җмҡ”? <a href="/view/signup">нҡҢмӣҗк°Җмһ…</a>
    </div>
  </div>
</div>

<!-- нҶ мҠӨнҠё -->
<div class="toast-container" id="toastContainer"></div>

<script>
  // мқҙлҜё лЎңк·ёмқёлҗң кІҪмҡ° мқҙлҸҷ
  if (localStorage.getItem('JWT_TOKEN')) location.href = '/view/meetings';

  function showToast(msg, type = '') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // Enter нӮӨ лЎңк·ёмқё
  document.addEventListener('keypress', e => { if (e.key === 'Enter') login(); });

  function login() {
    const userEmail    = document.getElementById('userEmail').value.trim();
    const userPassword = document.getElementById('userPassword').value;
    if (!userEmail || !userPassword) { showToast('мқҙл©”мқјкіј л№„л°ҖлІҲнҳёлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.', 'error'); return; }

    fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `userEmail=${encodeURIComponent(userEmail)}&userPassword=${encodeURIComponent(userPassword)}`
    })
    .then(res => res.text())
    .then(token => {
      if (token.startsWith('лЎңк·ёмқё мӢӨнҢЁ')) {
        showToast(token, 'error');
      } else {
        localStorage.setItem('JWT_TOKEN', token);
        showToast('лЎңк·ёмқё м„ұкіө!', 'success');
        setTimeout(() => location.href = '/view/meetings', 500);
      }
    })
    .catch(() => showToast('м„ңлІ„ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ.', 'error'));
  }
</script>
</body>
</html>
