<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - LocalMeet</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
    :root{
      --bg: #F4FAFE;
      --surface: #FFFFFF;
      --surface-2: #EBF4FB;
      --surface-3: #DCEBF7;
      --ink: #0B2036;
      --ink-2: #264766;
      --muted: #6B8AA8;
      --muted-2: #A6BED4;
      --line: #D7E6F2;
      --line-strong: #B9CFE3;
      --accent: #1FA6D6;
      --accent-2: #7DD4C0;
      --accent-3: #B8A6FF;
      --accent-4: #FFD447;
      --ok: #2CCB86;
      --warn: #FF8A4C;
      --radius-sm: 10px;
      --radius: 16px;
      --radius-lg: 22px;
      --radius-xl: 32px;
      --shadow-1: 0 1px 2px rgba(11,32,54,.05);
      --shadow-2: 0 4px 16px -6px rgba(31,166,214,.18), 0 1px 3px rgba(11,32,54,.05);
      --shadow-3: 0 20px 48px -16px rgba(31,166,214,.28), 0 2px 6px rgba(11,32,54,.06);
      --font-kr: 'Pretendard', system-ui, -apple-system, 'Noto Sans KR', sans-serif;
      --font-serif: 'Instrument Serif', ui-serif, serif;
      --font-en: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }

    *{ box-sizing: border-box; }
    html, body{ height: 100%; }
    body{
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-kr);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 앰비언트 블롭 */
    body::before{
      content:'';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(55vw 50vh at 90% -10%, rgba(125,212,192,.45), transparent 60%),
        radial-gradient(50vw 55vh at -8% 20%, rgba(184,166,255,.38), transparent 60%),
        radial-gradient(45vw 50vh at 50% 110%, rgba(31,166,214,.22), transparent 60%);
    }
    body::after{
      content:'';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: .3;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.13 0 0 0 0 0.21 0 0 0 0.04 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }
    body > *{ position: relative; z-index: 1; }

    /* NAVBAR */
    .navbar{
      flex: none;
      position: relative;
      max-width: 1240px;
      margin: 14px auto 0;
      width: calc(100% - 28px);
      background: color-mix(in oklab, var(--surface) 82%, transparent);
      backdrop-filter: saturate(1.3) blur(18px);
      -webkit-backdrop-filter: saturate(1.3) blur(18px);
      border: 1px solid var(--line);
      border-radius: 999px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 10px 22px;
      box-shadow: var(--shadow-1);
    }
    .navbar-brand{
      font-weight: 700; font-size: 18px;
      color: var(--ink); text-decoration: none;
      letter-spacing: -0.02em;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .navbar-brand::before{
      content:''; width: 26px; height: 26px; border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.85), transparent 50%),
        conic-gradient(from 200deg, var(--accent), var(--accent-2) 45%, var(--accent-3) 72%, var(--accent-4) 100%);
      box-shadow: 0 2px 8px -2px rgba(31,166,214,.4);
    }
    .navbar-brand span{
      background: linear-gradient(90deg, var(--accent), var(--accent-3));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-right{
      font-size: 13px;
      color: var(--muted);
    }
    .nav-right a{
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      margin-left: 6px;
    }
    .nav-right a:hover{ text-decoration: underline; }

    /* MAIN — 스크롤 없이 뷰포트에 맞춤 */
    .login-wrap{
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 1240px;
      width: 100%;
      margin: 0 auto;
      padding: 16px 24px 24px;
      align-items: stretch;
    }

    /* LEFT — 브랜드 패널 */
    .brand-panel{
      position: relative;
      border-radius: var(--radius-xl);
      overflow: hidden;
      background:
        radial-gradient(120% 90% at 0% 0%, rgba(184,166,255,.55), transparent 55%),
        radial-gradient(100% 80% at 100% 100%, rgba(125,212,192,.55), transparent 55%),
        linear-gradient(160deg, #0E6FA0 0%, #1FA6D6 50%, #2FB8C6 100%);
      color: #fff;
      padding: 40px 40px 36px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 0;
      box-shadow: var(--shadow-3);
    }
    .brand-panel::before{
      content:'';
      position: absolute;
      top: -60px; right: -60px;
      width: 240px; height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,212,71,.55), transparent 60%);
      filter: blur(8px);
    }
    .brand-panel::after{
      content:'';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.25), transparent 60%);
    }

    .brand-inner{ position: relative; z-index: 1; }

    .brand-eyebrow{
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,.85);
      padding: 6px 12px 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      backdrop-filter: blur(6px);
    }
    .brand-eyebrow::before{
      content:''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent-4);
      box-shadow: 0 0 0 3px rgba(255,212,71,.3);
    }
    .brand-title{
      font-family: var(--font-kr);
      font-weight: 800;
      font-size: clamp(32px, 3.4vw, 46px);
      line-height: 1.02;
      letter-spacing: -0.035em;
      margin: 22px 0 16px;
      text-wrap: balance;
    }
    .brand-title em{
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 400;
      color: var(--accent-4);
      font-size: 1.02em;
    }
    .brand-sub{
      font-size: 15px;
      line-height: 1.55;
      color: rgba(255,255,255,.82);
      max-width: 38ch;
      margin: 0;
    }

    /* 브랜드 패널 하단 통계 */
    .brand-footer{
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
    }
    .brand-stat{
      padding: 14px 16px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      backdrop-filter: blur(8px);
    }
    .brand-stat .n{
      font-family: var(--font-en);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }
    .brand-stat .l{
      font-size: 11.5px;
      color: rgba(255,255,255,.7);
      margin-top: 2px;
    }

    /* RIGHT — 폼 카드 */
    .login-box{
      display: flex;
      flex-direction: column;
      min-height: 0;
      justify-content: center;
    }
    .login-header{
      margin-bottom: 20px;
    }
    .login-eyebrow{
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }
    .login-title{
      font-size: clamp(28px, 3vw, 36px);
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.035em;
      line-height: 1.05;
      margin: 10px 0 6px;
    }
    .login-title em{
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }
    .login-sub{
      font-size: 14.5px;
      color: var(--muted);
      margin: 0;
    }

    .login-card{
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-2);
      padding: 24px;
    }

    /* 소셜 버튼 — 나란히 */
    .social-row{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .social-btn{
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      padding: 11px 14px;
      border-radius: 12px;
      font-size: 13.5px;
      font-weight: 700;
      cursor: pointer; text-decoration: none;
      border: 1px solid transparent;
      transition: filter .15s, transform .15s, box-shadow .15s;
      font-family: var(--font-kr);
      letter-spacing: -0.005em;
    }
    .social-btn:hover{ filter: brightness(.97); transform: translateY(-1px); box-shadow: var(--shadow-2); }
    .social-kakao{ background: #FEE500; color: #191919; }
    .social-naver{ background: #03C75A; color: #fff; }

    .divider{
      display: flex; align-items: center; gap: 12px;
      margin: 14px 0;
    }
    .divider::before, .divider::after{
      content:''; flex: 1; height: 1px; background: var(--line);
    }
    .divider span{
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* FIELDS */
    .field{ margin-bottom: 12px; }
    .field-label{
      display: block;
      font-size: 12.5px; font-weight: 600;
      color: var(--ink-2);
      margin-bottom: 6px;
      letter-spacing: -0.005em;
    }
    .field-input{
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      font-size: 14.5px;
      font-family: var(--font-kr);
      color: var(--ink);
      background: var(--surface);
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .field-input:focus{
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 14%, transparent);
    }
    .field-input::placeholder{ color: var(--muted-2); }

    .btn-login{
      width: 100%;
      padding: 13px 20px;
      margin-top: 6px;
      background: linear-gradient(135deg, var(--accent), #0E8AB8);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-kr);
      letter-spacing: -0.005em;
      box-shadow: 0 6px 18px -6px rgba(31,166,214,.55);
      transition: transform .15s, filter .15s, box-shadow .15s;
    }
    .btn-login:hover{
      filter: brightness(1.06);
      transform: translateY(-1px);
      box-shadow: 0 10px 26px -8px rgba(31,166,214,.65);
    }

    .login-footer{
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }
    .login-footer a{
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
      margin-left: 4px;
    }
    .login-footer a:hover{ text-decoration: underline; }

    /* TOAST */
    .toast-container{
      position: fixed; left: 50%; bottom: 28px;
      transform: translateX(-50%);
      z-index: 100;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast{
      background: var(--ink); color: #fff;
      padding: 11px 20px;
      border-radius: 999px;
      font-size: 13px;
      letter-spacing: -0.005em;
      box-shadow: var(--shadow-3);
      animation: toastIn .25s cubic-bezier(.2,.7,.2,1);
    }
    .toast.error{ background: var(--warn); }
    .toast.success{ background: var(--ok); }
    @keyframes toastIn{
      from{ opacity: 0; transform: translateY(10px); }
      to{ opacity: 1; transform: translateY(0); }
    }

    /* 반응형 — 모바일에선 브랜드 패널 숨김, 스크롤 허용 */
    @media (max-width: 900px){
      body{ overflow: auto; }
      .login-wrap{
        grid-template-columns: 1fr;
        padding: 16px 16px 40px;
      }
      .brand-panel{ display: none; }
    }
    @media (max-width: 480px){
      .navbar{ width: calc(100% - 20px); margin-top: 10px; padding: 8px 10px 8px 16px; }
      .login-card{ padding: 20px; }
      .social-row{ grid-template-columns: 1fr; }
    }
    @media (max-height: 680px) and (min-width: 901px){
      .brand-footer{ display: none; }
      .login-title{ font-size: 26px; margin: 6px 0 4px; }
      .login-card{ padding: 20px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/view/meetings">Local<span>Meet</span></a>
  <div class="nav-right">계정이 없으신가요? <a href="/view/signup">회원가입</a></div>
</nav>

<div class="login-wrap">

  <!-- LEFT — 브랜드 패널 -->
  <aside class="brand-panel">
    <div class="brand-inner">
      <span class="brand-eyebrow">동네 모임 플랫폼</span>
      <h2 class="brand-title">우리 동네,<br><em>이웃들과</em> 함께</h2>
      <p class="brand-sub">관심사가 같은 이웃들과 연결되는 가장 가까운 모임. 지금 로그인하고 근처의 새로운 만남을 시작해보세요.</p>
    </div>
    <div class="brand-footer">
      <div class="brand-stat"><div class="n">1,240+</div><div class="l">Active members</div></div>
      <div class="brand-stat"><div class="n">320</div><div class="l">This week</div></div>
      <div class="brand-stat"><div class="n">25</div><div class="l">자치구</div></div>
    </div>
  </aside>

  <!-- RIGHT — 로그인 폼 -->
  <div class="login-box">
    <div class="login-header">
      <div class="login-eyebrow">Welcome back</div>
      <h1 class="login-title">다시 만나요, <em>이웃님</em></h1>
      <p class="login-sub">LocalMeet에 로그인하고 모임을 탐색하세요</p>
    </div>

    <div class="login-card">
      <div class="social-row">
        <a href="/oauth2/authorization/kakao" class="social-btn social-kakao">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 3C6.48 3 2 6.48 2 10.8c0 2.7 1.68 5.07 4.2 6.48L5.1 21l4.62-2.4c.75.15 1.53.24 2.28.24 5.52 0 10-3.48 10-7.8S17.52 3 12 3z"/>
          </svg>
          카카오
        </a>
        <a href="/oauth2/authorization/naver" class="social-btn social-naver">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
            <path d="M16.273 12.845L7.376 0H0v24h7.727V11.155L16.624 24H24V0h-7.727z"/>
          </svg>
          네이버
        </a>
      </div>

      <div class="divider"><span>또는 이메일로</span></div>

      <div class="field">
        <label class="field-label">이메일</label>
        <input type="email" id="userEmail" class="field-input" placeholder="example@email.com">
      </div>
      <div class="field">
        <label class="field-label">비밀번호</label>
        <input type="password" id="userPassword" class="field-input" placeholder="비밀번호를 입력하세요">
      </div>

      <button class="btn-login" onclick="login()">로그인</button>
    </div>

    <div class="login-footer">
      아직 계정이 없으신가요?
      <a href="/view/signup">회원가입</a>
    </div>
  </div>

</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  if (localStorage.getItem('JWT_TOKEN')) location.href = '/view/meetings';

  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('error')) showToast('소셜 로그인에 실패했습니다. 다시 시도해주세요.', 'error');

  function showToast(msg, type = '') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  document.addEventListener('keypress', e => { if (e.key === 'Enter') login(); });

  function login() {
    const userEmail    = document.getElementById('userEmail').value.trim();
    const userPassword = document.getElementById('userPassword').value;
    if (!userEmail || !userPassword) { showToast('이메일과 비밀번호를 입력해주세요.', 'error'); return; }

    fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `userEmail=${encodeURIComponent(userEmail)}&userPassword=${encodeURIComponent(userPassword)}`
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        localStorage.setItem('JWT_TOKEN', data.token);
        document.cookie = 'JWT_TOKEN=' + data.token + '; path=/; SameSite=Strict';
        showToast('로그인 성공!', 'success');
        setTimeout(() => location.href = '/view/meetings', 500);
      } else {
        showToast(data.message || '로그인 실패', 'error');
      }
    })
    .catch(() => showToast('서버 오류가 발생했습니다.', 'error'));
  }
</script>
</body>
</html>
