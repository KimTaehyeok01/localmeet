<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - LocalMeet</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/view/meetings">Local<span>Meet</span></a>
</nav>

<div class="container-sm">
  <div class="auth-card">
    <div class="auth-title">다시 만나요 👋</div>
    <div class="auth-subtitle">LocalMeet에 로그인하세요</div>

    <!-- 소셜 로그인 버튼 -->
    <a href="/oauth2/authorization/kakao"
       class="btn btn-full"
       style="background:#FEE500;color:#000;justify-content:center;display:flex;align-items:center;gap:10px;margin-bottom:10px;border-radius:8px;padding:13px;font-weight:500;text-decoration:none;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 3C6.48 3 2 6.48 2 10.8c0 2.7 1.68 5.07 4.2 6.48L5.1 21l4.62-2.4c.75.15 1.53.24 2.28.24 5.52 0 10-3.48 10-7.8S17.52 3 12 3z"/>
      </svg>
      카카오로 로그인
    </a>
    <a href="/oauth2/authorization/naver"
       class="btn btn-full"
       style="background:#03C75A;color:#fff;justify-content:center;display:flex;align-items:center;gap:10px;margin-bottom:20px;border-radius:8px;padding:13px;font-weight:500;text-decoration:none;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M16.273 12.845L7.376 0H0v24h7.727V11.155L16.624 24H24V0h-7.727z"/>
      </svg>
      네이버로 로그인
    </a>

    <div class="auth-divider">또는 이메일로 로그인</div>

    <div class="form-group">
      <label class="form-label">이메일</label>
      <input type="email" id="userEmail" class="form-control" placeholder="이메일 입력">
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input type="password" id="userPassword" class="form-control" placeholder="비밀번호 입력">
    </div>

    <button class="btn btn-primary btn-full" onclick="login()">로그인</button>

    <div class="auth-footer">
      계정이 없으신가요? <a href="/view/signup">회원가입</a>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  if (localStorage.getItem('JWT_TOKEN')) location.href = '/view/meetings';

  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('error')) showToast('소셜 로그인에 실패했습니다. 다시 시도해주세요.', 'error');

  function showToast(msg, type = '') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  document.addEventListener('keypress', e => { if (e.key === 'Enter') login(); });

  function login() {
    const userEmail    = document.getElementById('userEmail').value.trim();
    const userPassword = document.getElementById('userPassword').value;
    if (!userEmail || !userPassword) { showToast('이메일과 비밀번호를 입력해주세요.', 'error'); return; }

    fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `userEmail=${encodeURIComponent(userEmail)}&userPassword=${encodeURIComponent(userPassword)}`
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        localStorage.setItem('JWT_TOKEN', data.token);
        showToast('로그인 성공!', 'success');
        setTimeout(() => location.href = '/view/meetings', 500);
      } else {
        showToast(data.message || '로그인 실패', 'error');
      }
    })
    .catch(() => showToast('서버 오류가 발생했습니다.', 'error'));
  }
</script>
</body>
</html>
