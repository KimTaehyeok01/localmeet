<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 중... - LocalMeet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- 주소 입력 필요 없을 때: 로딩 화면만 표시 -->
<div id="loadingScreen" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;">
    <div style="font-size:2rem;">🔐</div>
    <div style="font-size:1rem;color:var(--gray-600);">로그인 처리 중...</div>
</div>

<!-- 주소 입력 필요할 때 -->
<div id="addressScreen" style="display:none;align-items:center;justify-content:center;height:100vh;">
    <div class="auth-card" style="max-width:480px;width:100%;">
        <div class="auth-title">동네를 알려주세요 📍</div>
        <div class="auth-subtitle">내 동네를 설정하면 근처 모임을 찾을 수 있어요</div>

        <div class="form-group" style="margin-top:24px;">
            <label class="form-label">동네 주소</label>
            <div style="display:flex;gap:8px;">
                <input type="text" id="userAddress" class="form-control" placeholder="예: 서울 마포구 합정동" readonly>
                <button class="btn btn-secondary" onclick="searchAddress()" style="white-space:nowrap;">검색</button>
            </div>
        </div>
        <input type="hidden" id="userLat">
        <input type="hidden" id="userLng">

        <button class="btn btn-primary btn-full" style="margin-top:16px;" onclick="saveAddress()">저장하고 시작하기</button>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script th:inline="javascript">
    const token = /*[[${token}]]*/ '';
    const needAddress = /*[[${needAddress}]]*/ false;

    if (token) {
        localStorage.setItem('JWT_TOKEN', token);
        document.cookie = 'JWT_TOKEN=' + token + '; path=/; SameSite=Strict';

        if (needAddress) {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('addressScreen').style.display = 'flex';
            loadKakaoMap();
        } else {
            location.href = '/view/meetings';
        }
    } else {
        alert('로그인에 실패했습니다.');
        location.href = '/view/login';
    }

    function loadKakaoMap() {
        // 카카오 주소 검색 SDK 동적 로드
        const script = document.createElement('script');
        script.src = 'https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js';
        document.head.appendChild(script);
    }

    function searchAddress() {
        new daum.Postcode({
            oncomplete: function(data) {
                const fullAddress = data.address;
                document.getElementById('userAddress').value = fullAddress;

                // 카카오 지도 Geocoder로 좌표 변환
                fetch(`https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(fullAddress)}`, {
                    headers: { 'Authorization': 'KakaoAK 551598f35b84843c6fbfce522b0f2ffb' }
                })
                .then(r => r.json())
                .then(data => {
                    if (data.documents && data.documents.length > 0) {
                        document.getElementById('userLat').value = data.documents[0].y;
                        document.getElementById('userLng').value = data.documents[0].x;
                    }
                });
            }
        }).open();
    }

    function showToast(msg, type = '') {
        const c = document.getElementById('toastContainer');
        const t = document.createElement('div');
        t.className = 'toast ' + type;
        t.textContent = msg;
        c.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function saveAddress() {
        const userAddress = document.getElementById('userAddress').value.trim();
        const userLat = document.getElementById('userLat').value;
        const userLng = document.getElementById('userLng').value;

        if (!userAddress) { showToast('주소를 검색해주세요.', 'error'); return; }

        fetch('/api/auth/address', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'JWT_TOKEN': token
            },
            body: `userAddress=${encodeURIComponent(userAddress)}&userLat=${userLat}&userLng=${userLng}`
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                location.href = '/view/meetings';
            } else {
                showToast('저장에 실패했습니다.', 'error');
            }
        })
        .catch(() => showToast('서버 오류가 발생했습니다.', 'error'));
    }
</script>
</body>
</html>
