<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 - LocalMeet</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
    :root{
      --bg: #F4FAFE;
      --surface: #FFFFFF;
      --surface-2: #EBF4FB;
      --surface-3: #DCEBF7;
      --ink: #0B2036;
      --ink-2: #264766;
      --muted: #6B8AA8;
      --muted-2: #A6BED4;
      --line: #D7E6F2;
      --line-strong: #B9CFE3;
      --accent: #1FA6D6;
      --accent-2: #7DD4C0;
      --accent-3: #B8A6FF;
      --accent-4: #FFD447;
      --ok: #2CCB86;
      --warn: #FF8A4C;
      --danger: #FF5D78;
      --radius: 16px;
      --radius-lg: 22px;
      --radius-xl: 32px;
      --shadow-1: 0 1px 2px rgba(11,32,54,.05);
      --shadow-2: 0 4px 16px -6px rgba(31,166,214,.18), 0 1px 3px rgba(11,32,54,.05);
      --shadow-3: 0 20px 48px -16px rgba(31,166,214,.28), 0 2px 6px rgba(11,32,54,.06);
      --font-kr: 'Pretendard', system-ui, -apple-system, 'Noto Sans KR', sans-serif;
      --font-serif: 'Instrument Serif', ui-serif, serif;
      --font-en: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }

    *{ box-sizing: border-box; }
    html, body{ height: 100%; }
    body{
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-kr);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }

    body::before{
      content:'';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(55vw 50vh at 90% -10%, rgba(125,212,192,.42), transparent 60%),
        radial-gradient(50vw 55vh at -8% 20%, rgba(184,166,255,.35), transparent 60%),
        radial-gradient(45vw 50vh at 50% 110%, rgba(31,166,214,.2), transparent 60%);
    }
    body::after{
      content:'';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: .3;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.13 0 0 0 0 0.21 0 0 0 0.04 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }
    body > *{ position: relative; z-index: 1; }

    .navbar{
      position: sticky; top: 14px; z-index: 30;
      max-width: 1240px;
      margin: 14px auto 0;
      width: calc(100% - 28px);
      background: color-mix(in oklab, var(--surface) 82%, transparent);
      backdrop-filter: saturate(1.3) blur(18px);
      -webkit-backdrop-filter: saturate(1.3) blur(18px);
      border: 1px solid var(--line);
      border-radius: 999px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 10px 22px;
      box-shadow: var(--shadow-1);
    }
    .navbar-brand{
      font-weight: 700; font-size: 18px;
      color: var(--ink); text-decoration: none;
      letter-spacing: -0.02em;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .navbar-brand::before{
      content:''; width: 26px; height: 26px; border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.85), transparent 50%),
        conic-gradient(from 200deg, var(--accent), var(--accent-2) 45%, var(--accent-3) 72%, var(--accent-4) 100%);
      box-shadow: 0 2px 8px -2px rgba(31,166,214,.4);
    }
    .navbar-brand span{
      background: linear-gradient(90deg, var(--accent), var(--accent-3));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .navbar-menu{ display: flex; align-items: center; gap: 6px; }
    .navbar-menu a{
      padding: 8px 14px;
      font-size: 14px;
      color: var(--ink-2);
      text-decoration: none;
      border-radius: 999px;
      transition: background .15s, color .15s;
      font-weight: 500;
    }
    .navbar-menu a:hover{ color: var(--accent); background: var(--surface-2); }
    .btn-primary-sm{
      padding: 9px 18px;
      font-size: 13.5px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #0E8AB8);
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      transition: transform .15s, filter .15s, box-shadow .15s;
      box-shadow: 0 4px 14px -4px rgba(31,166,214,.5);
    }
    .btn-primary-sm:hover{
      filter: brightness(1.05);
      transform: translateY(-1px);
      box-shadow: 0 8px 22px -6px rgba(31,166,214,.6);
    }

    .mypage-wrap{
      max-width: 1180px;
      margin: 0 auto;
      padding: 36px 24px 72px;
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 24px;
      align-items: start;
    }

    .profile-card{
      position: relative;
      border-radius: var(--radius-xl);
      overflow: hidden;
      background:
        radial-gradient(120% 90% at 0% 0%, rgba(184,166,255,.55), transparent 55%),
        radial-gradient(100% 80% at 100% 100%, rgba(125,212,192,.55), transparent 55%),
        linear-gradient(160deg, #0E6FA0 0%, #1FA6D6 50%, #2FB8C6 100%);
      color: #fff;
      padding: 34px;
      box-shadow: var(--shadow-3);
    }
    .profile-card::before{
      content:'';
      position: absolute;
      top: -70px; right: -55px;
      width: 230px; height: 230px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,212,71,.52), transparent 62%);
      filter: blur(8px);
    }
    .profile-card::after{
      content:'';
      position: absolute;
      bottom: -45px; left: -45px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.23), transparent 60%);
    }
    .profile-inner{ position: relative; z-index: 1; }
    .profile-eyebrow{
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,.88);
      padding: 6px 12px 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
    }
    .profile-eyebrow::before{
      content:''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent-4);
      box-shadow: 0 0 0 3px rgba(255,212,71,.3);
    }
    .avatar-wrap{
      width: 88px; height: 88px;
      border-radius: 50%;
      margin: 20px 0 16px;
      background: rgba(255,255,255,.18);
      border: 3px solid rgba(255,255,255,.45);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.3rem;
      backdrop-filter: blur(8px);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: filter .2s;
    }
    .avatar-wrap:hover{ filter: brightness(0.85); }
    .avatar-wrap:hover::after{
      content: '📷';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      background: rgba(0,0,0,.28);
      border-radius: 50%;
    }
    /* 프로필 옵션 메뉴 */
    .avatar-menu {
      position: absolute;
      top: calc(100% + 10px);
      left: 50%; transform: translateX(-50%);
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      box-shadow: 0 8px 28px -6px rgba(11,32,54,.22);
      overflow: hidden;
      z-index: 50;
      min-width: 160px;
      display: none;
    }
    .avatar-menu.open { display: block; animation: menuIn .16s cubic-bezier(.2,.7,.2,1); }
    @keyframes menuIn { from{opacity:0;transform:translateX(-50%) translateY(-6px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    .avatar-menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      font-size: 13.5px; font-weight: 600; color: #0B2036;
      cursor: pointer;
      transition: background .12s;
      border-bottom: 1px solid #f1f5f9;
    }
    .avatar-menu-item:last-child { border-bottom: none; }
    .avatar-menu-item:hover { background: #f8fafc; }
    .avatar-menu-item.danger { color: #FF5D78; }
    .avatar-wrap img{
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .hero-nickname{
      font-size: clamp(30px, 3vw, 40px);
      font-weight: 800;
      line-height: 1.04;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .hero-email{
      font-size: 14px;
      color: rgba(255,255,255,.82);
      word-break: break-all;
    }
    .role-badge{
      margin-top: 14px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,.17);
      color: #fff;
      border: 1px solid rgba(255,255,255,.35);
      padding: 6px 14px 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .role-badge::before{
      content:'';
      width: 7px; height: 7px; border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(255,255,255,.25);
    }
    .role-badge.admin{
      background: rgba(255,212,71,.24);
      border-color: rgba(255,212,71,.46);
      color: #fff7d3;
    }
    .role-badge.admin::before{
      background: var(--accent-4);
      box-shadow: 0 0 0 3px rgba(255,212,71,.28);
    }

    .profile-meta{
      margin-top: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .meta-item{
      padding: 12px 14px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22);
      backdrop-filter: blur(8px);
    }
    .meta-label{
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.74);
      margin-bottom: 5px;
    }
    .meta-value{
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.01em;
    }
    .meta-value.muted{
      color: rgba(255,255,255,.68);
      font-weight: 500;
    }

    .right-stack{
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .panel-card{
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-2);
      overflow: hidden;
    }
    .panel-head{
      padding: 16px 22px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }
    .panel-dot{
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--ok) 28%, transparent);
    }

    .action-item{
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 17px 22px;
      border-bottom: 1px solid var(--line);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .action-item:last-child{ border-bottom: none; }
    .action-item:hover{ background: var(--surface-2); }
    .action-item-left{
      display: flex; align-items: center; gap: 12px;
    }
    .action-icon{
      width: 38px; height: 38px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.05rem;
      flex: none;
    }
    .action-icon.blue{
      background: color-mix(in oklab, var(--accent) 12%, white);
      color: var(--accent);
    }
    .action-icon.red{
      background: color-mix(in oklab, var(--danger) 12%, white);
      color: var(--danger);
    }
    .action-item-text{
      font-size: 14.5px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    .action-item-sub{
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted);
    }
    .action-arrow{
      color: var(--muted-2);
      font-size: 20px;
      line-height: 1;
    }
    .action-item.danger .action-item-text{ color: var(--danger); }
    .action-item.danger .action-arrow{ color: color-mix(in oklab, var(--danger) 60%, white); }

    .toast-container{
      position: fixed; left: 50%; bottom: 28px;
      transform: translateX(-50%);
      z-index: 100;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast{
      background: var(--ink); color: #fff;
      padding: 11px 20px; border-radius: 999px;
      font-size: 13px;
      box-shadow: var(--shadow-3);
      animation: toastIn .25s cubic-bezier(.2,.7,.2,1);
    }
    .toast.error{ background: var(--warn); }
    .toast.success{ background: var(--ok); }
    @keyframes toastIn{
      from{ opacity: 0; transform: translateY(10px); }
      to{ opacity: 1; transform: translateY(0); }
    }

    /* 활동 통계 배지 */
    .stat-row{
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .stat-chip{
      text-align: center;
      padding: 13px 8px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.13);
      border: 1px solid rgba(255,255,255,.22);
      backdrop-filter: blur(8px);
    }
    .stat-num{
      font-family: var(--font-en);
      font-size: 24px; font-weight: 800;
      line-height: 1; color: #fff;
    }
    .stat-label{
      margin-top: 6px;
      font-size: 11.5px; font-weight: 600;
      color: rgba(255,255,255,.78);
    }
    .profile-edit-btn{
      margin-top: 18px;
      width: 100%;
      padding: 12px;
      font-size: 13.5px; font-weight: 700;
      color: #fff;
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.34);
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .15s, transform .15s;
    }
    .profile-edit-btn:hover{ background: rgba(255,255,255,.26); transform: translateY(-1px); }

    /* 탭 */
    .tabs{
      display: flex;
      gap: 4px;
      padding: 6px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--line);
    }
    .tab-btn{
      flex: 1;
      padding: 11px 8px;
      font-size: 13.5px; font-weight: 700;
      color: var(--muted);
      background: none; border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: var(--font-kr);
      transition: background .15s, color .15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .tab-btn:hover{ color: var(--ink-2); }
    .tab-btn.active{
      color: var(--accent);
      background: var(--surface);
      box-shadow: var(--shadow-1);
    }
    .tab-badge{
      min-width: 18px; height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--danger); color: #fff;
      font-size: 10.5px; font-weight: 800;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .tab-pane{ display: none; }
    .tab-pane.active{ display: block; }

    /* 서브탭 */
    .subtabs{
      display: flex; gap: 6px;
      padding: 14px 18px 4px;
    }
    .subtab-btn{
      padding: 7px 15px;
      font-size: 12.5px; font-weight: 700;
      color: var(--muted);
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      cursor: pointer;
      font-family: var(--font-kr);
      transition: all .15s;
    }
    .subtab-btn.active{
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #0E8AB8);
      border-color: transparent;
    }
    .subpane{ display: none; }
    .subpane.active{ display: block; }

    /* 리스트 영역 */
    .list-area{
      max-height: 440px;
      overflow-y: auto;
      padding: 8px 10px 12px;
    }
    .list-row{
      display: flex; align-items: center; gap: 13px;
      padding: 13px 12px;
      border-radius: 14px;
      text-decoration: none; color: inherit;
      transition: background .14s;
    }
    .list-row:hover{ background: var(--surface-2); }
    .row-icon{
      width: 42px; height: 42px; flex: none;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.15rem;
      background: color-mix(in oklab, var(--accent) 12%, white);
    }
    .row-avatar{
      width: 42px; height: 42px; flex: none;
      border-radius: 50%;
      object-fit: cover;
      background: var(--surface-3);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      overflow: hidden;
    }
    .row-avatar img{ width: 100%; height: 100%; object-fit: cover; }
    .row-body{ flex: 1; min-width: 0; }
    .row-title{
      font-size: 14px; font-weight: 700; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .row-sub{
      margin-top: 3px;
      font-size: 12px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .status-pill{
      flex: none;
      padding: 5px 11px;
      border-radius: 999px;
      font-size: 11.5px; font-weight: 800;
    }
    .status-pill.approved{ background: color-mix(in oklab, var(--ok) 16%, white); color: #18895a; }
    .status-pill.pending{ background: color-mix(in oklab, var(--warn) 16%, white); color: #c2622a; }
    .status-pill.host{ background: color-mix(in oklab, var(--accent-3) 22%, white); color: #6b4fd8; }
    .status-pill.open{ background: color-mix(in oklab, var(--accent) 14%, white); color: var(--accent); }
    .status-pill.full{ background: var(--surface-3); color: var(--ink-2); }
    .status-pill.closed{ background: #f1f1f4; color: #9098a4; }

    .row-actions{ display: flex; gap: 6px; flex: none; }
    .btn-mini{
      padding: 7px 13px;
      font-size: 12px; font-weight: 700;
      border-radius: 999px;
      border: none; cursor: pointer;
      font-family: var(--font-kr);
      transition: filter .15s, transform .15s;
    }
    .btn-mini:hover{ transform: translateY(-1px); }
    .btn-mini.accept{ background: linear-gradient(135deg, var(--ok), #1FA37A); color: #fff; }
    .btn-mini.reject{ background: var(--surface-3); color: var(--ink-2); }

    /* 알림 아이템 */
    .noti-row{
      display: flex; align-items: flex-start; gap: 12px;
      padding: 13px 12px;
      border-radius: 14px;
      text-decoration: none; color: inherit;
      transition: background .14s;
      position: relative;
    }
    .noti-row:hover{ background: var(--surface-2); }
    .noti-row.unread{ background: color-mix(in oklab, var(--accent) 6%, white); }
    .noti-typeicon{
      width: 38px; height: 38px; flex: none;
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.05rem;
      background: color-mix(in oklab, var(--accent) 12%, white);
    }
    .noti-body{ flex: 1; min-width: 0; }
    .noti-text{ font-size: 13.5px; font-weight: 600; color: var(--ink); line-height: 1.45; }
    .noti-time{ margin-top: 4px; font-size: 11.5px; color: var(--muted-2); font-family: var(--font-mono); }
    .noti-unread-dot{
      width: 8px; height: 8px; border-radius: 50%; flex: none;
      background: var(--danger); margin-top: 6px;
    }

    .panel-head-row{
      display: flex; align-items: center; justify-content: space-between;
    }
    .head-action{
      font-size: 11.5px; font-weight: 700; color: var(--accent);
      background: none; border: none; cursor: pointer;
      font-family: var(--font-kr); letter-spacing: 0;
      text-transform: none;
    }
    .head-action:hover{ text-decoration: underline; }

    .empty-state{
      text-align: center;
      padding: 44px 20px;
      color: var(--muted);
    }
    .empty-state .emoji{ font-size: 2rem; display: block; margin-bottom: 10px; opacity: .8; }
    .empty-state .txt{ font-size: 13.5px; font-weight: 500; }
    .list-loading{ text-align: center; padding: 36px; color: var(--muted-2); font-size: 13px; }

    /* 정보 수정 모달 */
    .modal-overlay{
      position: fixed; inset: 0; z-index: 200;
      background: rgba(11,32,54,.42);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open{ display: flex; animation: ovIn .2s ease; }
    @keyframes ovIn{ from{opacity:0} to{opacity:1} }
    .modal{
      width: 100%; max-width: 440px;
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-3);
      overflow: hidden;
      animation: modalIn .24s cubic-bezier(.2,.7,.2,1);
    }
    @keyframes modalIn{ from{opacity:0; transform: translateY(16px) scale(.98)} to{opacity:1; transform: none} }
    .modal-head{
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title{ font-size: 17px; font-weight: 800; color: var(--ink); }
    .modal-close{
      width: 32px; height: 32px; border-radius: 10px;
      border: none; background: var(--surface-2); cursor: pointer;
      font-size: 17px; color: var(--muted); line-height: 1;
    }
    .modal-close:hover{ background: var(--surface-3); color: var(--ink); }
    .modal-body{ padding: 8px 24px 24px; }
    .edit-block{
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
    }
    .edit-block:last-child{ border-bottom: none; }
    .edit-block-title{
      font-size: 13px; font-weight: 800; color: var(--ink-2);
      margin-bottom: 11px;
      display: flex; align-items: center; gap: 7px;
    }
    .form-group{ margin-bottom: 10px; }
    .form-label{ display:block; font-size: 11.5px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
    .form-input{
      width: 100%;
      padding: 11px 14px;
      font-size: 14px;
      border: 1.5px solid var(--line-strong);
      border-radius: 12px;
      font-family: var(--font-kr);
      color: var(--ink);
      background: var(--surface);
      transition: border-color .15s;
    }
    .form-input:focus{ outline: none; border-color: var(--accent); }
    .btn-save{
      padding: 10px 18px;
      font-size: 13px; font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #0E8AB8);
      border: none; border-radius: 10px; cursor: pointer;
      font-family: var(--font-kr);
      transition: filter .15s, transform .15s;
    }
    .btn-save:hover{ filter: brightness(1.05); transform: translateY(-1px); }
    .edit-row{ display: flex; gap: 8px; align-items: flex-end; }
    .edit-row .form-group{ flex: 1; margin-bottom: 0; }

    @media (max-width: 980px){
      .mypage-wrap{ grid-template-columns: 1fr; padding: 22px 16px 52px; }
    }
    /* 햄버거 메뉴 */
    .hamburger-btn{display:none;flex-direction:column;gap:5px;padding:9px 10px;cursor:pointer;background:var(--surface-2);border:1.5px solid var(--line);border-radius:10px;transition:border-color .15s}
    .hamburger-btn:hover{border-color:var(--accent)}
    .hamburger-btn span{display:block;width:20px;height:2px;background:var(--ink-2);border-radius:2px;transition:all .22s}
    .hamburger-btn.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .hamburger-btn.open span:nth-child(2){opacity:0;transform:scaleX(0)}
    .hamburger-btn.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    .mobile-menu{display:none;position:fixed;top:74px;left:12px;right:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:8px;z-index:29;box-shadow:var(--shadow-3);animation:mmIn .18s cubic-bezier(.2,.7,.2,1)}
    .mobile-menu.open{display:block}
    @keyframes mmIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .mobile-menu a,.mobile-menu .mm-btn{display:flex;align-items:center;gap:10px;padding:13px 16px;border-radius:10px;font-size:14.5px;font-weight:600;color:var(--ink-2);text-decoration:none;background:none;border:none;width:100%;cursor:pointer;font-family:var(--font-kr);transition:background .12s,color .12s;text-align:left}
    .mobile-menu a:hover,.mobile-menu .mm-btn:hover{background:var(--surface-2);color:var(--accent)}
    .mobile-menu a.mm-active{background:color-mix(in oklab,var(--accent) 10%,white);color:var(--accent)}
    .mm-divider{height:1px;background:var(--line);margin:4px 8px}
    .mm-btn.danger{color:var(--warn)}
    .mm-btn.danger:hover{background:color-mix(in oklab,var(--warn) 10%,white)}

    @media (max-width: 600px){
      .navbar{ width: calc(100% - 20px); margin-top: 10px; padding: 8px 10px 8px 16px; }
      .hamburger-btn{ display: flex; }
      .navbar-menu{ display: none !important; }
      .mypage-wrap{ padding: 14px 12px 52px; gap: 14px; }
      .profile-card{ padding: 22px 20px; border-radius: 22px; }
      .hero-nickname{ font-size: clamp(26px, 7vw, 36px); }
      .hero-email{ font-size: 13px; }
      .avatar-wrap{ width: 76px; height: 76px; font-size: 2rem; }
      .profile-meta{ grid-template-columns: 1fr 1fr; gap: 8px; }
      .meta-item{ padding: 10px 12px; }
      .meta-label{ font-size: 10px; }
      .meta-value{ font-size: 13px; }
      .panel-head{ padding: 13px 16px; }
      .action-item{ padding: 14px 16px; }
      .action-item-text{ font-size: 13.5px; }
      .action-item-sub{ font-size: 11px; }
      .action-icon{ width: 34px; height: 34px; font-size: 0.95rem; }
      .stat-row{ gap: 8px; margin-top: 14px; }
      .stat-chip{ padding: 11px 6px; }
      .stat-num{ font-size: 21px; }
      .stat-label{ font-size: 10.5px; }
      .tab-btn{ font-size: 12.5px; padding: 10px 6px; }
      .list-area{ max-height: 60vh; }
      .modal{ border-radius: 22px; }
      .modal-head{ padding: 16px 18px; }
      .modal-body{ padding: 6px 18px 18px; }
    }
    @media (max-width: 380px){
      .profile-meta{ grid-template-columns: 1fr; }
      .hero-nickname{ font-size: 24px; }
      .tab-btn .tab-badge{ display: none !important; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/view/meetings">Local<span>Meet</span></a>
  <div class="navbar-menu" id="navMenu">
    <a href="/view/meetings">모임 목록</a>

<div class="mobile-menu" id="mobileMenu"></div>

<main class="mypage-wrap">
  <section class="profile-card">
    <div class="profile-inner">

      <div class="avatar-wrap" onclick="toggleAvatarMenu(event)" title="프로필 사진 변경" style="position:relative;overflow:visible;">
        <div style="width:100%;height:100%;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;">

          <div class="avatar-menu-item danger" id="resetMenuBtn" onclick="resetProfileImg()" style="display:none;">

      </div>
      <input type="file" id="profileImgInput" accept="image/*" style="display:none;" onchange="uploadProfileImg(this)">

      <div class="profile-meta">

      <div class="stat-row">
        <div class="stat-chip">
          <div class="stat-num" id="statCreated">0</div>
          <div class="stat-label">개설한 모임</div>
        </div>
        <div class="stat-chip">
          <div class="stat-num" id="statJoined">0</div>
          <div class="stat-label">참가한 모임</div>
        </div>
        <div class="stat-chip">
          <div class="stat-num" id="statFriends">0</div>
          <div class="stat-label">친구</div>
        </div>
      </div>

      <button class="profile-edit-btn" onclick="openEditModal()">⚙️ 내 정보 수정</button>
    </div>
  </section>

  <section class="right-stack">
    <div class="panel-card">
      <div class="panel-head">
        <div class="panel-dot"></div>
        빠른 작업
      </div>
      <div class="action-item" onclick="location.href='/view/meetings/write'">
        <div class="action-item-left">
          <div class="action-icon blue">➕</div>
          <div>
            <div class="action-item-text">모임 만들기</div>
            <div class="action-item-sub">새로운 동네 모임을 시작해보세요</div>
          </div>
        </div>
        <div class="action-arrow">›</div>
      </div>
      <div class="action-item danger" onclick="logout()">
        <div class="action-item-left">
          <div class="action-icon red">🚪</div>
          <div>
            <div class="action-item-text">로그아웃</div>
            <div class="action-item-sub">계정에서 안전하게 로그아웃합니다</div>
          </div>
        </div>
        <div class="action-arrow">›</div>
      </div>
    </div>

    <div class="panel-card">
      <div class="tabs">
        <button class="tab-btn active" data-tab="meetings" onclick="switchTab('meetings')">📋 내 모임</button>
        <button class="tab-btn" data-tab="friends" onclick="switchTab('friends')">
          👥 친구 <span class="tab-badge" id="friendReqBadge" style="display:none;">0</span>
        </button>

      <!-- 내 모임 탭 -->
      <div class="tab-pane active" id="pane-meetings">
        <div class="subtabs">
          <button class="subtab-btn active" data-sub="created" onclick="switchSub('meetings','created')">만든 모임</button>
          <button class="subtab-btn" data-sub="joined" onclick="switchSub('meetings','joined')">참가한 모임</button>
        </div>
        <div class="subpane active" id="sub-created">
          <div class="list-area" id="listCreated"><div class="list-loading">불러오는 중…</div></div>
        </div>

        <div class="subtabs">
          <button class="subtab-btn active" data-sub="list" onclick="switchSub('friends','list')">친구 목록</button>
          <button class="subtab-btn" data-sub="requests" onclick="switchSub('friends','requests')">
            받은 요청 <span id="reqCountInline"></span>
          </button>
        </div>
        <div class="subpane active" id="sub-list">
          <div class="list-area" id="listFriends"><div class="list-loading">불러오는 중…</div></div>
        </div>
        <div class="subpane" id="sub-requests">

</main>

<!-- 정보 수정 모달 -->
<div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeEditModal()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">내 정보 수정</div>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <!-- 닉네임 -->

<div class="toast-container" id="toastContainer"></div>

<script th:src="@{/js/dm-notify.js}" defer></script>
<script>
  const token = localStorage.getItem('JWT_TOKEN');
  if (!token) { alert('로그인이 필요합니다.'); location.href = '/view/login'; }

  function showToast(msg, type = '') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // 모바일 메뉴 초기화 (마이페이지 로드 후 채움)
  function toggleMobileMenu() {
    document.getElementById('hamburgerBtn').classList.toggle('open');
    document.getElementById('mobileMenu').classList.toggle('open');
  }
  document.addEventListener('click', e => {
    const menu = document.getElementById('mobileMenu');
    const btn = document.getElementById('hamburgerBtn');
    if (menu && !menu.contains(e.target) && btn && !btn.contains(e.target)) {
      menu.classList.remove('open'); btn.classList.remove('open');
    }
  });

  fetch('/api/auth/mypage', { headers: { 'JWT_TOKEN': token } })
  .then(r => { if (!r.ok) { alert('인증이 만료되었습니다.'); location.href = '/view/login'; } return r.json(); })
  .then(u => {
    document.getElementById('nickname').textContent  = u.userNickname;
    document.getElementById('email').textContent     = u.userEmail;

    const roleEl = document.getElementById('role');
    if (u.userRole === 'ROLE_ADMIN') {
      roleEl.textContent = '관리자';
      roleEl.classList.add('admin');
    } else {
      roleEl.textContent = '일반회원';
    }

    const addrEl = document.getElementById('address');
    addrEl.textContent = u.userAddress || '미설정';
    if (!u.userAddress) addrEl.classList.add('muted');

    document.getElementById('createdAt').textContent = u.createdAt ? u.createdAt.substring(0, 10) : '-';

    // 모바일 메뉴 구성
    const isAdmin = u.userRole === 'ROLE_ADMIN';
    document.getElementById('navMenu').innerHTML =
      `<a href="/view/meetings">모임 목록</a>`
      + (isAdmin ? `<a href="/view/admin">관리자</a>` : '')
      + `<a href="/view/messages">💬 메시지</a>`
      + `<button class="btn-primary-sm" onclick="logout()">로그아웃</button>`;
    document.getElementById('mobileMenu').innerHTML =
      `<a href="/view/meetings">🏠 모임 탐색</a>`
      + (isAdmin ? `<a href="/view/admin">🛡 관리자 페이지</a>` : '')
      + `<a href="/view/messages">💬 메시지</a>`
      + `<a href="/view/mypage" class="mm-active">👤 마이페이지</a>`
      + `<div class="mm-divider"></div>`
      + `<button class="mm-btn danger" onclick="logout()">🚪 로그아웃</button>`;

    // 프로필 이미지 설정
    setAvatarImg(u.profileImg);

    // 정보 수정 모달 프리필
    document.getElementById('editNickname').value = u.userNickname || '';
    document.getElementById('editAddress').value  = u.userAddress || '';

    // 마이페이지 데이터 로드
    loadMyMeetings();
    loadFriends();
    loadReceivedRequests();
    loadNotifications();
  });

  function setAvatarImg(url) {
    const img      = document.getElementById('avatarImg');
    const emoji    = document.getElementById('avatarEmoji');
    const resetBtn = document.getElementById('resetMenuBtn');
    if (url) {
      img.src = url;
      img.style.display = 'block';
      emoji.style.display = 'none';
      if (resetBtn) resetBtn.style.display = '';
    } else {
      img.style.display = 'none';
      emoji.style.display = '';
      if (resetBtn) resetBtn.style.display = 'none';
    }
  }

  function toggleAvatarMenu(e) {
    e.stopPropagation();
    document.getElementById('avatarMenu').classList.toggle('open');
  }
  function closeAvatarMenu() {
    document.getElementById('avatarMenu').classList.remove('open');
  }
  document.addEventListener('click', () => closeAvatarMenu());

  function resetProfileImg() {
    if (!confirm('기본 프로필로 되돌리시겠습니까?')) return;
    closeAvatarMenu();
    fetch('/api/auth/profile-image', {
      method: 'DELETE',
      headers: { 'JWT_TOKEN': token }
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        setAvatarImg(null);
        showToast('기본 프로필로 변경되었습니다.', 'success');
      } else {
        showToast(data.message || '초기화 실패', 'error');
      }
    })
    .catch(() => showToast('오류가 발생했습니다.', 'error'));
  }

  function uploadProfileImg(input) {
    const file = input.files[0];
    if (!file) return;

    // 미리보기
    const reader = new FileReader();
    reader.onload = e => setAvatarImg(e.target.result);
    reader.readAsDataURL(file);

    const formData = new FormData();
    formData.append('file', file);

    fetch('/api/auth/profile-image', {
      method: 'POST',
      headers: { 'JWT_TOKEN': token },
      body: formData
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        showToast('프로필 사진이 변경되었습니다!', 'success');
        setAvatarImg(data.imgUrl);
      } else {
        showToast(data.message || '업로드 실패', 'error');
      }
    })
    .catch(() => showToast('업로드 중 오류가 발생했습니다.', 'error'));

    input.value = '';
  }

  // ===== 유틸 =====
  const authHeader = { 'JWT_TOKEN': token };
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function timeAgo(iso) {
    if (!iso) return '';
    const d = new Date(iso), now = new Date();
    const sec = Math.floor((now - d) / 1000);
    if (sec < 60) return '방금 전';
    if (sec < 3600) return Math.floor(sec/60) + '분 전';
    if (sec < 86400) return Math.floor(sec/3600) + '시간 전';
    if (sec < 604800) return Math.floor(sec/86400) + '일 전';
    return iso.substring(0, 10);
  }
  function emptyState(emoji, txt) {
    return `<div class="empty-state"><span class="emoji">${emoji}</span><div class="txt">${txt}</div></div>`;
  }

  // ===== 탭 전환 =====
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + tab));
    if (tab === 'noti') markVisibleNotiSeen();
  }
  function switchSub(tab, sub) {
    const pane = document.getElementById('pane-' + tab);
    pane.querySelectorAll('.subtab-btn').forEach(b => b.classList.toggle('active', b.dataset.sub === sub));
    pane.querySelectorAll('.subpane').forEach(p => p.classList.toggle('active', p.id === 'sub-' + sub));
  }

  // ===== 내 모임 =====
  const MEETING_STATUS = { OPEN: ['open','모집중'], FULL: ['full','마감'], CLOSED: ['closed','종료'] };
  function meetingRow(m, isJoined) {
    let pill;
    if (isJoined) {
      pill = m.myStatus === 'APPROVED'
        ? '<span class="status-pill approved">확정</span>'
        : '<span class="status-pill pending">대기중</span>';
    } else {
      const s = MEETING_STATUS[m.meetingStatus] || ['open', m.meetingStatus];
      pill = `<span class="status-pill ${s[0]}">${s[1]}</span>`;
    }
    return `<a class="list-row" href="/view/meetings/${m.meetingIdx}">
      <div class="row-icon">📍</div>
      <div class="row-body">
        <div class="row-title">${esc(m.meetingTitle)}</div>
        <div class="row-sub">${esc(m.meetingAddress || '장소 미정')} · ${m.currentCount}/${m.meetingMax}명</div>
      </div>
      ${pill}
    </a>`;
  }
  function loadMyMeetings() {
    fetch('/api/meetings/my/created', { headers: authHeader })
      .then(r => r.json())
      .then(list => {
        document.getElementById('statCreated').textContent = list.length;
        document.getElementById('listCreated').innerHTML = list.length
          ? list.map(m => meetingRow(m, false)).join('')
          : emptyState('🗒️', '아직 만든 모임이 없어요.');
      });
    fetch('/api/meetings/my/joined', { headers: authHeader })
      .then(r => r.json())
      .then(list => {
        document.getElementById('statJoined').textContent = list.length;
        document.getElementById('listJoined').innerHTML = list.length
          ? list.map(m => meetingRow(m, true)).join('')
          : emptyState('🙌', '아직 참가 신청한 모임이 없어요.');
      });
  }

  // ===== 친구 =====
  function avatarHtml(profileImg, fallback) {
    return profileImg
      ? `<div class="row-avatar"><img src="${esc(profileImg)}" alt=""></div>`
      : `<div class="row-avatar">${fallback}</div>`;
  }
  function loadFriends() {
    fetch('/api/friends', { headers: authHeader })
      .then(r => r.json())
      .then(list => {
        document.getElementById('statFriends').textContent = list.length;
        document.getElementById('listFriends').innerHTML = list.length
          ? list.map(f => `<div class="list-row">
              ${avatarHtml(f.profileImg, '🙂')}
              <div class="row-body"><div class="row-title">${esc(f.userNickname)}</div></div>
              <a class="btn-mini accept" href="/view/messages">💬 메시지</a>
            </div>`).join('')
          : emptyState('🧑‍🤝‍🧑', '아직 친구가 없어요.');
      });
  }
  function loadReceivedRequests() {
    fetch('/api/friends/received', { headers: authHeader })
      .then(r => r.json())
      .then(list => {
        const badge = document.getElementById('friendReqBadge');
        const inline = document.getElementById('reqCountInline');
        if (list.length) {
          badge.textContent = list.length; badge.style.display = '';
          inline.textContent = `(${list.length})`;
        } else {
          badge.style.display = 'none'; inline.textContent = '';
        }
        document.getElementById('listRequests').innerHTML = list.length
          ? list.map(f => `<div class="list-row" id="req-${f.friendIdx}">
              ${avatarHtml(f.profileImg, '🙋')}
              <div class="row-body"><div class="row-title">${esc(f.userNickname)}</div>
                <div class="row-sub">친구 요청을 보냈습니다</div></div>
              <div class="row-actions">
                <button class="btn-mini accept" onclick="acceptFriend(${f.friendIdx})">수락</button>
                <button class="btn-mini reject" onclick="rejectFriend(${f.friendIdx})">거절</button>
              </div>
            </div>`).join('')
          : emptyState('📭', '받은 친구 요청이 없어요.');
      });
  }
  function acceptFriend(friendIdx) {
    fetch('/api/friends/accept/' + friendIdx, { method: 'POST', headers: authHeader })
      .then(r => r.json())
      .then(d => {
        showToast(d.message, d.success ? 'success' : 'error');
        if (d.success) { loadReceivedRequests(); loadFriends(); }
      });
  }
  function rejectFriend(friendIdx) {
    fetch('/api/friends/reject/' + friendIdx, { method: 'POST', headers: authHeader })
      .then(r => r.json())
      .then(d => {
        showToast(d.message, d.success ? '' : 'error');
        if (d.success) loadReceivedRequests();
      });
  }

  // ===== 알림 내역 =====
  const NOTI_ICON = { MEETING: '📋', DM: '💬', FRIEND: '👥', GENERAL: '🔔' };
  let notiUnread = 0;
  function loadNotifications() {
    fetch('/api/notifications', { headers: authHeader })
      .then(r => r.json())
      .then(list => {
        notiUnread = list.filter(n => !n.read).length;
        updateNotiBadge();
        document.getElementById('listNoti').innerHTML = list.length
          ? list.map(n => {
              const icon = NOTI_ICON[n.notiType] || '🔔';
              const tag = n.link ? 'a' : 'div';
              const href = n.link ? `href="${esc(n.link)}"` : '';
              return `<${tag} class="noti-row ${n.read ? '' : 'unread'}" ${href}>
                <div class="noti-typeicon">${icon}</div>
                <div class="noti-body">
                  <div class="noti-text">${esc(n.content)}</div>
                  <div class="noti-time">${timeAgo(n.createdAt)}</div>
                </div>
                ${n.read ? '' : '<div class="noti-unread-dot"></div>'}
              </${tag}>`;
            }).join('')
          : emptyState('🔔', '받은 알림이 없어요.');
      });
  }
  function updateNotiBadge() {
    const badge = document.getElementById('notiBadge');
    if (notiUnread > 0) { badge.textContent = notiUnread > 99 ? '99+' : notiUnread; badge.style.display = ''; }
    else badge.style.display = 'none';
  }
  function markVisibleNotiSeen() {
    // 알림 탭을 열면 서버에 전체 읽음 처리 + 뱃지 제거 (목록의 unread 스타일은 유지)
    if (notiUnread === 0) return;
    fetch('/api/notifications/read-all', { method: 'POST', headers: authHeader })
      .then(() => { notiUnread = 0; updateNotiBadge(); });
  }
  function markAllNotiRead() {
    fetch('/api/notifications/read-all', { method: 'POST', headers: authHeader })
      .then(() => { notiUnread = 0; updateNotiBadge(); loadNotifications(); showToast('모든 알림을 읽음 처리했습니다.', 'success'); });
  }

  // ===== 정보 수정 모달 =====
  function openEditModal()  { document.getElementById('editModal').classList.add('open'); }
  function closeEditModal() { document.getElementById('editModal').classList.remove('open'); }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEditModal(); });

  function saveNickname() {
    const v = document.getElementById('editNickname').value.trim();
    if (!v) { showToast('닉네임을 입력해주세요.', 'error'); return; }
    fetch('/api/auth/nickname?userNickname=' + encodeURIComponent(v), { method: 'POST', headers: authHeader })
      .then(r => r.json())
      .then(d => {
        showToast(d.message, d.success ? 'success' : 'error');
        if (d.success) document.getElementById('nickname').textContent = v;
      });
  }
  function saveAddress() {
    const v = document.getElementById('editAddress').value.trim();
    if (!v) { showToast('동네를 입력해주세요.', 'error'); return; }
    fetch('/api/auth/address?userAddress=' + encodeURIComponent(v), { method: 'POST', headers: authHeader })
      .then(r => r.json())
      .then(d => {
        if (d.success) {
          showToast('동네가 변경되었습니다.', 'success');
          const addrEl = document.getElementById('address');
          addrEl.textContent = v; addrEl.classList.remove('muted');
        } else showToast('변경 실패', 'error');
      });
  }
  function savePassword() {
    const cur = document.getElementById('curPassword').value;
    const nw  = document.getElementById('newPassword').value;
    if (!cur || !nw) { showToast('비밀번호를 입력해주세요.', 'error'); return; }
    const params = 'currentPassword=' + encodeURIComponent(cur) + '&newPassword=' + encodeURIComponent(nw);
    fetch('/api/auth/password?' + params, { method: 'POST', headers: authHeader })
      .then(r => r.json())
      .then(d => {
        showToast(d.message, d.success ? 'success' : 'error');
        if (d.success) {
          document.getElementById('curPassword').value = '';
          document.getElementById('newPassword').value = '';
        }
      });
  }

  function logout() {
    localStorage.removeItem('JWT_TOKEN');
    document.cookie = 'JWT_TOKEN=; path=/; max-age=0';
    showToast('로그아웃 되었습니다.');
    setTimeout(() => location.href = '/view/login', 700);
  }
</script>
</body>
</html>
