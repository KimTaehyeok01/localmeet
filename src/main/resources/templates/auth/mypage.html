<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 - LocalMeet</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/view/meetings">Local<span>Meet</span></a>
  <div class="navbar-menu">
    <a href="/view/meetings">모임 목록</a>
    <button class="btn-primary-sm" onclick="logout()">로그아웃</button>
  </div>
</nav>

<div class="container">

  <!-- 프로필 카드 -->
  <div class="profile-card">
    <div class="profile-avatar">🙋</div>
    <div class="profile-info">
      <h2 id="nickname">불러오는 중...</h2>
      <p id="email"></p>
      <span class="profile-badge" id="role"></span>
    </div>
  </div>

  <!-- 정보 카드 -->
  <div class="card" style="margin-bottom:20px;">
    <div class="card-body">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
        <div>
          <div class="form-label">내 동네</div>
          <div id="address" style="font-size:0.95rem; color:var(--gray-800);">-</div>
        </div>
        <div>
          <div class="form-label">가입일</div>
          <div id="createdAt" style="font-size:0.95rem; color:var(--gray-800);">-</div>
        </div>
      </div>
    </div>
  </div>

  <div style="display:flex; gap:10px;">
    <button class="btn btn-outline" onclick="location.href='/view/meetings/write'">➕ 모임 만들기</button>
    <button class="btn btn-danger" onclick="logout()">로그아웃</button>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  const token = localStorage.getItem('JWT_TOKEN');
  if (!token) { alert('로그인이 필요합니다.'); location.href = '/view/login'; }

  function showToast(msg, type = '') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  fetch('/api/auth/mypage', { headers: { 'JWT_TOKEN': token } })
  .then(r => { if (!r.ok) { alert('인증이 만료되었습니다.'); location.href = '/view/login'; } return r.json(); })
  .then(u => {
    document.getElementById('nickname').textContent  = u.userNickname;
    document.getElementById('email').textContent     = u.userEmail;
    document.getElementById('role').textContent      = u.userRole === 'ROLE_ADMIN' ? '관리자' : '일반회원';
    document.getElementById('address').textContent   = u.userAddress || '미설정';
    document.getElementById('createdAt').textContent = u.createdAt ? u.createdAt.substring(0, 10) : '-';
  });

  function logout() {
    localStorage.removeItem('JWT_TOKEN');
    showToast('로그아웃 되었습니다.');
    setTimeout(() => location.href = '/view/login', 700);
  }
</script>
</body>
</html>
