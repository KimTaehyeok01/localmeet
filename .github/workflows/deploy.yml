name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Create application-secret.properties
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          KAKAO_MAP_API_KEY: ${{ secrets.KAKAO_MAP_API_KEY }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REDIRECT_URI: ${{ secrets.KAKAO_REDIRECT_URI }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_REDIRECT_URI: ${{ secrets.NAVER_REDIRECT_URI }}
        run: |
          cat > src/main/resources/application-secret.properties << EOF
          DB_HOST=$DB_HOST
          DB_PORT=$DB_PORT
          DB_NAME=$DB_NAME
          DB_USERNAME=$DB_USERNAME
          DB_PASSWORD=$DB_PASSWORD
          JWT_SECRET_KEY=$JWT_SECRET_KEY
          KAKAO_MAP_API_KEY=$KAKAO_MAP_API_KEY
          KAKAO_CLIENT_ID=$KAKAO_CLIENT_ID
          KAKAO_CLIENT_SECRET=$KAKAO_CLIENT_SECRET
          KAKAO_REDIRECT_URI=$KAKAO_REDIRECT_URI
          NAVER_CLIENT_ID=$NAVER_CLIENT_ID
          NAVER_CLIENT_SECRET=$NAVER_CLIENT_SECRET
          NAVER_REDIRECT_URI=$NAVER_REDIRECT_URI
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "~/localmeet"
          strip_components: 2

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/localmeet

            # 기존 프로세스 종료
            if [ -f app.pid ]; then
              kill -9 $(cat app.pid) 2>/dev/null || true
              rm -f app.pid
            fi
            sleep 2

            # 새 버전 실행
            nohup java -jar *.jar > app.log 2>&1 &
            echo $! > app.pid
            sleep 5

            # 실행 확인
            if kill -0 $(cat app.pid) 2>/dev/null; then
              echo "배포 성공 (PID: $(cat app.pid))"
            else
              echo "배포 실패 - 로그:"
              tail -30 app.log
              exit 1
            fi
