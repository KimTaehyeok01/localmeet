name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Create application-secret.properties
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          KAKAO_MAP_API_KEY: ${{ secrets.KAKAO_MAP_API_KEY }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REDIRECT_URI: ${{ secrets.KAKAO_REDIRECT_URI }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_REDIRECT_URI: ${{ secrets.NAVER_REDIRECT_URI }}
        run: |
          cat > src/main/resources/application-secret.properties << EOF
          DB_HOST=$DB_HOST
          DB_PORT=$DB_PORT
          DB_NAME=$DB_NAME
          DB_USERNAME=$DB_USERNAME
          DB_PASSWORD=$DB_PASSWORD
          JWT_SECRET_KEY=$JWT_SECRET_KEY
          KAKAO_MAP_API_KEY=$KAKAO_MAP_API_KEY
          KAKAO_CLIENT_ID=$KAKAO_CLIENT_ID
          KAKAO_CLIENT_SECRET=$KAKAO_CLIENT_SECRET
          KAKAO_REDIRECT_URI=$KAKAO_REDIRECT_URI
          NAVER_CLIENT_ID=$NAVER_CLIENT_ID
          NAVER_CLIENT_SECRET=$NAVER_CLIENT_SECRET
          NAVER_REDIRECT_URI=$NAVER_REDIRECT_URI
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar -x test

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 to known hosts
        run: ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy JAR to EC2
        run: |
          scp build/libs/*.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/localmeet/

      - name: Deploy on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash -s << 'ENDSSH'
          cd ~/localmeet

          if [ -f app.pid ]; then
            kill -9 $(cat app.pid) 2>/dev/null || true
            rm -f app.pid
          fi
          sleep 2

          nohup java -jar *.jar > app.log 2>&1 &
          echo $! > app.pid
          sleep 5

          if kill -0 $(cat app.pid) 2>/dev/null; then
            echo "배포 성공 (PID: $(cat app.pid))"
          else
            echo "배포 실패 - 로그:"
            tail -30 app.log
            exit 1
          fi
          ENDSSH
