name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Create application-secret.properties
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          KAKAO_MAP_API_KEY: ${{ secrets.KAKAO_MAP_API_KEY }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REDIRECT_URI: ${{ secrets.KAKAO_REDIRECT_URI }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_REDIRECT_URI: ${{ secrets.NAVER_REDIRECT_URI }}
        run: |
          cat > src/main/resources/application-secret.properties << EOF
          DB_HOST=$DB_HOST
          DB_PORT=$DB_PORT
          DB_NAME=$DB_NAME
          DB_USERNAME=$DB_USERNAME
          DB_PASSWORD=$DB_PASSWORD
          JWT_SECRET_KEY=$JWT_SECRET_KEY
          KAKAO_MAP_API_KEY=$KAKAO_MAP_API_KEY
          KAKAO_CLIENT_ID=$KAKAO_CLIENT_ID
          KAKAO_CLIENT_SECRET=$KAKAO_CLIENT_SECRET
          KAKAO_REDIRECT_URI=$KAKAO_REDIRECT_URI
          NAVER_CLIENT_ID=$NAVER_CLIENT_ID
          NAVER_CLIENT_SECRET=$NAVER_CLIENT_SECRET
          NAVER_REDIRECT_URI=$NAVER_REDIRECT_URI
          FASTAPI_URL=http://localhost:8000
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar -x test

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          echo "=== Key first line ==="
          head -1 ~/.ssh/deploy_key.pem
          echo "=== Key fingerprint ==="
          ssh-keygen -l -f ~/.ssh/deploy_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment directory on EC2
        run: |
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "mkdir -p ~/localmeet"

      - name: Copy JAR to EC2
        run: |
          scp -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no \
            build/libs/*.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/localmeet/

      - name: Copy FastAPI to EC2
        run: |
          scp -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no -r \
            fastapi \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/localmeet/

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash -s << 'ENDSSH'
          cd ~/localmeet || { echo "[진단] cd ~/localmeet 실패 (폴더 없음)"; exit 1; }

          echo "===== [진단] 배포 전 시스템 상태 ====="
          echo "--- 메모리(MB) ---"; free -m
          echo "--- 디스크 ---"; df -h /
          echo "--- jar 파일 ---"; ls -lah *.jar 2>&1
          echo "--- java 버전 ---"; java -version 2>&1
          echo "--- MySQL 상태 ---"; systemctl is-active mysql 2>/dev/null || systemctl is-active mysqld 2>/dev/null || echo "확인불가"
          echo "====================================="

          # 기존 Java 프로세스 종료 (방식 무관하게 전부 종료)
          pkill -f "java.*jar" 2>/dev/null || true
          sleep 3

          nohup java -Xms128m -Xmx512m -Duser.timezone=Asia/Seoul -jar *.jar > app.log 2>&1 &
          echo $! > app.pid
          sleep 15

          if kill -0 $(cat app.pid) 2>/dev/null; then
            echo "배포 성공 (PID: $(cat app.pid))"
          else
            echo "===== [진단] 배포 실패 - app.log 전체 ====="
            cat app.log 2>&1 || echo "(app.log 비어있음 또는 없음)"
            echo "===== [진단] 커널 OOM/kill 메시지 ====="
            dmesg 2>/dev/null | grep -iE "oom|out of memory|killed process" | tail -10 || echo "(dmesg 접근 불가 - sudo 필요할 수 있음)"
            echo "===== [진단] 배포 실패 후 메모리(MB) ====="
            free -m
            exit 1
          fi
          ENDSSH
